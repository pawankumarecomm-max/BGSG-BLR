function cleanRowsForSupabase(table,rows){
  const cfg=DB_SCHEMA[table];
  if(!cfg) return rows || [];
  return (rows || []).filter(r=>r && r.id).map(r=>{
    const out={};
    cfg.fields.forEach(k=>{
      let v=r[k];
      if(cfg.nums.includes(k)){
        out[k]=(v==='' || v===undefined || v===null) ? null : Number(v);
      }else if(cfg.dates.includes(k)){
        out[k]=(v==='' || v===undefined || v===null) ? null : String(v).slice(0,10);
      }else{
        out[k]=(v===undefined || v===null) ? '' : v;
      }
    });
    return out;
  });
}
function detailedSupabaseError(err){
  if(!err) return 'Unknown Supabase error';
  return [err.message, err.details, err.hint, err.code].filter(Boolean).join(' | ');
}
function useSupabaseState(table,key,initial){
  const localKey=`bp_${table}_cloud_v2`;
  const [state,setState]=useState(()=>{
    try{const raw=localStorage.getItem(localKey);return raw?JSON.parse(raw):initial}catch(e){return initial}
  });
  const [loaded,setLoaded]=useState(false);
  const [sync,setSync]=useState({table,status: sb?'Connecting':'Local only', error:''});

  useEffect(()=>{
    let alive=true;
    async function load(){
      if(!sb){ setLoaded(true); return; }
      try{
        setSync({table,status:'Loading cloud',error:''});
        const {data,error}=await sb.from(table).select('*').order('id',{ascending:true});
        if(error) throw error;
        if(!alive) return;
        if(data && data.length){
          setState(data);
          localStorage.setItem(localKey,JSON.stringify(data));
        }else{
          const seed=cleanRowsForSupabase(table,(state && state.length ? state : initial));
          if(seed.length){
            const {error:seedErr}=await sb.from(table).upsert(seed,{onConflict:'id'});
            if(seedErr) throw seedErr;
          }
          setState(seed);
          localStorage.setItem(localKey,JSON.stringify(seed));
        }
        setSync({table,status:'Cloud synced',error:''});
      }catch(err){
        console.error('Supabase load error for',table,err);
        if(alive) setSync({table,status:'Cloud error',error:detailedSupabaseError(err)});
      }finally{ if(alive) setLoaded(true); }
    }
    load();
    return()=>{alive=false};
  },[table]);

  useEffect(()=>{
    try{localStorage.setItem(localKey,JSON.stringify(state))}catch(e){}
    if(!sb || !loaded) return;
    const timer=setTimeout(async()=>{
      try{
        const cleaned=cleanRowsForSupabase(table,state);
        if(cleaned.length){
          const {error}=await sb.from(table).upsert(cleaned,{onConflict:'id'});
          if(error) throw error;
        }
        setSync({table,status:'Cloud synced',error:''});
      }catch(err){
        console.error('Supabase save error for',table,err);
        setSync({table,status:'Save error',error:detailedSupabaseError(err)});
      }
    },650);
    return()=>clearTimeout(timer);
  },[table,state,loaded]);

  return [state,setState,sync];
}
function genId(prefix,arr){
  const nums=arr.map(x=>parseInt(String(x.id||'').replace(prefix,''),10)).filter(Boolean);
  return `${prefix}${String(nums.length?Math.max(...nums)+1:1).padStart(3,'0')}`;
}
function nextIdFactory(prefix,existing){
  let max=(existing||[]).map(x=>parseInt(String(x.id||'').replace(prefix,''),10)).filter(Boolean).reduce((a,b)=>Math.max(a,b),0);
  return ()=>`${prefix}${String(++max).padStart(3,'0')}`;
}
function exportCSV(data,filename){
  if(!data.length){alert('No rows to export');return}
  const keys=Object.keys(data[0]);
  const csv=[keys.join(','),...data.map(r=>keys.map(k=>`"${String(r[k]??'').replaceAll('"','""')}"`).join(','))].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=filename;a.click();
}

function makeMetrics(skus,orders,receipts,dispatches,rmOrders=[],customerOrders=[],customerSplits=[],vendorSplits=[]){

  const dispatchByOrder={}; dispatches.forEach(d=>{if(d.orderId){if(!dispatchByOrder[d.orderId])dispatchByOrder[d.orderId]={kg:0,pcs:0};dispatchByOrder[d.orderId].kg+=safeNum(d.qtyKG);dispatchByOrder[d.orderId].pcs+=safeNum(d.qtyPCS)}});

  const dispatchBySku={}; dispatches.forEach(d=>{if(!dispatchBySku[d.sku])dispatchBySku[d.sku]={kg:0,pcs:0};dispatchBySku[d.sku].kg+=safeNum(d.qtyKG);dispatchBySku[d.sku].pcs+=safeNum(d.qtyPCS)});
  const receiptByVendorSplit={}; receipts.forEach(r=>{if(r.vendorSplitId){if(!receiptByVendorSplit[r.vendorSplitId])receiptByVendorSplit[r.vendorSplitId]={kg:0,pcs:0};receiptByVendorSplit[r.vendorSplitId].kg+=safeNum(r.receivedKG);receiptByVendorSplit[r.vendorSplitId].pcs+=safeNum(r.receivedPCS)}});
  const dispatchByCustomerOrder={}; const dispatchByCustomerSplit={};
  dispatches.forEach(d=>{
    if(d.customerOrderId){if(!dispatchByCustomerOrder[d.customerOrderId])dispatchByCustomerOrder[d.customerOrderId]={kg:0,pcs:0};dispatchByCustomerOrder[d.customerOrderId].kg+=safeNum(d.qtyKG);dispatchByCustomerOrder[d.customerOrderId].pcs+=safeNum(d.qtyPCS)}

  });
  const vendorSplitRows=vendorSplits.map(vs=>{const o=orders.find(x=>x.id===vs.vendorOrderId)||{}; const rec=receiptByVendorSplit[vs.id]||{kg:0,pcs:0}; const pending=Math.max(0,safeNum(vs.qtyPCS)-rec.pcs); return {...vs,order:o,vendor:o.vendor,client:o.client,sku:o.sku,receivedPCS:rec.pcs,receivedKG:rec.kg,pendingPCS:pending};});
  const customerSplitRows=customerSplits.map(sp=>{const co=customerOrders.find(x=>x.id===sp.customerOrderId)||{}; const d=dispatchByCustomerSplit[sp.id]||{kg:0,pcs:0}; const pending=Math.max(0,safeNum(sp.qtyPCS)-d.pcs); return {...sp,order:co,client:co.client,sku:co.sku,orderRef:co.orderRef,dispatchedPCS:d.pcs,dispatchedKG:d.kg,pendingPCS:pending};});
  const customerOrderRows=customerOrders.map(co=>{
    const splits=customerSplitRows.filter(s=>s.customerOrderId===co.id && s.status!=='Cancelled');
    const splitQty=splits.reduce((a,s)=>a+safeNum(s.qtyPCS),0);
    const totalQty=splitQty || safeNum(co.totalQtyPCS);
    const d=dispatchByCustomerOrder[co.id]||{kg:0,pcs:0};
    const pendingDispatch=Math.max(0,totalQty-d.pcs);

  });

function AlertLine({title,value,sub,color}){return <div className={`kpi ${color}`} style={{padding:13}}><label>{title}</label><strong style={{fontSize:22}}>{value}</strong><small>{sub}</small></div>}
function StatusBadge({status,pendingFG}){let color='gray'; if(status==='Closed')color='green'; else if(status==='Ready to Dispatch')color='blue'; else if(status==='In Production')color='amber'; else if(status==='Delayed')color='red'; if(pendingFG===0 && status!=='Cancelled') color='green'; return <Badge color={color}>{pendingFG===0 && status!=='Cancelled'?'FG Complete':status}</Badge>}


function SplitScheduleEditor({title,splits,setSplits,dateLabel='Date',qtyLabel='Qty PCS',statusOptions=['Pending','Done','Cancelled']}){
  const update=(i,k,v)=>setSplits(prev=>prev.map((r,idx)=>idx===i?{...r,[k]:v}:r));
  const add=()=>setSplits(prev=>[...prev,{date:todayISO(),qtyPCS:'',status:statusOptions[0],remarks:''}]);
  const remove=(i)=>setSplits(prev=>prev.filter((_,idx)=>idx!==i));
  const total=splits.reduce((a,r)=>a+safeNum(r.qtyPCS),0);
  return <div className="card" style={{gridColumn:'1/-1',boxShadow:'none'}}>
    <div className="card-head"><div className="card-title">{title}</div><div className="actions"><Badge color="blue">Total {fN(total)} PCS</Badge><Button variant="secondary" onClick={add}>+ Add Split</Button></div></div>
    <div className="card-body" style={{padding:10}}>
      {splits.length===0&&<div className="muted" style={{padding:10}}>No split rows yet. Add date-wise quantities.</div>}
      {splits.map((r,i)=><div key={r.id||i} className="form-grid" style={{gridTemplateColumns:'1fr 1fr 1fr 1.4fr auto',gap:8,marginBottom:8,alignItems:'end'}}>
        <Field label={dateLabel}><Input type="date" value={r.date} onChange={v=>update(i,'date',v)}/></Field>
        <Field label={qtyLabel}><Input type="number" value={r.qtyPCS} onChange={v=>update(i,'qtyPCS',v)}/></Field>
        <Field label="Status"><Select value={r.status} onChange={v=>update(i,'status',v)} options={statusOptions}/></Field>
        <Field label="Remarks"><Input value={r.remarks} onChange={v=>update(i,'remarks',v)} placeholder="Optional"/></Field>
        <Button variant="danger" onClick={()=>remove(i)}>Del</Button>
      </div>)}
    </div>
  </div>
}

function OrderForm({skus,vendors,clients,initial,initialSplits=[],onSave,onClose}){
  const blank={date:todayISO(),type:'Job Work',vendor:'',client:'',sku:'',orderQtyPCS:'',issuedKG:'',buyKG:'',mfgKG:'',expectedPCS:'',vendorDeliveryDate:addDays(5),clientDeliveryDate:addDays(7),status:'In Production',remarks:''};
  const [f,setF]=useState(initial||blank);
  const [splits,setSplits]=useState(initialSplits && initialSplits.length ? initialSplits.map(x=>({...x})) : []);
  const set=(k,v)=>setF(p=>{
    const u={...p,[k]:v};
    if(k==='sku'){
      const s=skus.find(x=>x.name===v); if(s){u.client=s.client;u.buyKG=s.buyKG;u.mfgKG=s.mfgKG;u.expectedPCS=u.orderQtyPCS||'';}
    }
    const s=skus.find(x=>x.name===u.sku);
    if((k==='orderQtyPCS'||k==='sku') && s && safeNum(u.orderQtyPCS)>0){
      const ideal=safeNum(s.idealWastage)/100; u.issuedKG=Math.round(safeNum(u.orderQtyPCS)*safeNum(s.stdWeight)/(1-ideal)); u.expectedPCS=u.orderQtyPCS;
      if(!initial && splits.length===0){setSplits([{date:u.vendorDeliveryDate||addDays(5),qtyPCS:u.orderQtyPCS,status:'Planned',remarks:'Vendor delivery split'}]);}
    }
    return u;
  });
  const addEvenSplits=()=>{
    const total=safeNum(f.orderQtyPCS); if(!total){alert('Enter order quantity first');return;}
    const count=Number(prompt('How many vendor delivery parts?', '5')||0); if(!count)return;
    const each=Math.floor(total/count); const rem=total-(each*count);
    setSplits(Array.from({length:count},(_,i)=>({date:addDays(2+i*2),qtyPCS:each+(i===count-1?rem:0),status:'Planned',remarks:`Part ${i+1}`})));
  };
  const sku=skus.find(s=>s.name===f.sku)||{};
  const expectedKG=safeNum(f.orderQtyPCS)*safeNum(sku.stdWeight);
  const rmCost=safeNum(f.issuedKG)*safeNum(f.buyKG);
  const mfgCost=expectedKG*safeNum(f.mfgKG);
  const splitQty=splits.reduce((a,r)=>a+safeNum(r.qtyPCS),0);
  return <Modal title={initial?'Edit Vendor Order':'New Vendor / Job Work Order'} onClose={onClose} wide>
    <div className="form-grid">
      <Field label="Order Date"><Input type="date" value={f.date} onChange={v=>set('date',v)}/></Field>
      <Field label="Order Type"><Select value={f.type} onChange={v=>set('type',v)} options={['Job Work','Direct Trading','Own Manufacturing']}/></Field>
      <Field label="Vendor"><Select value={f.vendor} onChange={v=>set('vendor',v)} options={vendors.map(v=>v.name)}/></Field>
      <Field label="Client"><Select value={f.client} onChange={v=>set('client',v)} options={clients.map(c=>c.name)}/></Field>
      <Field label="SKU"><Select value={f.sku} onChange={v=>set('sku',v)} options={skus.map(s=>s.name)}/></Field>
      <Field label="Vendor Order Qty / Placed to Make (PCS)"><Input type="number" value={f.orderQtyPCS} onChange={v=>set('orderQtyPCS',v)}/></Field>
      <Field label="Issued RM to Vendor (KG)"><Input type="number" value={f.issuedKG} onChange={v=>set('issuedKG',v)}/></Field>
      <Field label="Expected FG PCS"><Input type="number" value={f.expectedPCS} onChange={v=>set('expectedPCS',v)}/></Field>
      <Field label="Buying Cost / KG"><Input type="number" value={f.buyKG} onChange={v=>set('buyKG',v)}/></Field>
      <Field label="Job Work / Mfg Cost / KG"><Input type="number" value={f.mfgKG} onChange={v=>set('mfgKG',v)}/></Field>
      <Field label="Main Vendor Delivery Date"><Input type="date" value={f.vendorDeliveryDate} onChange={v=>set('vendorDeliveryDate',v)}/></Field>
      <Field label="Client Delivery Date / Reference"><Input type="date" value={f.clientDeliveryDate} onChange={v=>set('clientDeliveryDate',v)}/></Field>
      <Field label="Status"><Select value={f.status} onChange={v=>set('status',v)} options={['In Production','Ready to Dispatch','Part Dispatched','Closed','Delayed','Cancelled']}/></Field>
      <Field label="Remarks"><Input value={f.remarks} onChange={v=>set('remarks',v)}/></Field>
      <div style={{gridColumn:'1/-1'}}><Button variant="secondary" onClick={addEvenSplits}>⚡ Auto split vendor order equally</Button> <span className="tiny">Example: 25,000 boxes can be split into 5 delivery parts.</span></div>
      <SplitScheduleEditor title="Vendor Delivery Split Plan" splits={splits} setSplits={setSplits} dateLabel="Vendor Receive Date" qtyLabel="Receive Qty PCS" statusOptions={['Planned','Received','Delayed','Cancelled']}/>
    </div>
    <div className="calc-strip"><div className="calc-item"><label>Auto RM Cost</label><strong>{fC(rmCost)}</strong></div><div className="calc-item"><label>Expected FG KG</label><strong>{fN(expectedKG)} KG</strong></div><div className="calc-item"><label>Split Planned</label><strong className={splitQty!==safeNum(f.orderQtyPCS)?'red-t':'green-t'}>{fN(splitQty)} PCS</strong></div><div className="calc-item"><label>Total Cost Before Dispatch</label><strong>{fC(rmCost+mfgCost)}</strong></div></div>
    <div className="actions" style={{justifyContent:'flex-end',marginTop:18}}><Button variant="secondary" onClick={onClose}>Cancel</Button><Button onClick={()=>onSave({order:f,splits})}>{initial?'Update Order':'Save Order'}</Button></div>
  </Modal>

function OrdersPage({skus,vendors,clients,orders,setOrders,receipts,setReceipts,dispatches,setDispatches,vendorSplits,setVendorSplits,metrics}){

  const saveOrder=async(payload)=>{
    const row=payload.order||payload; const splitRows=payload.splits||[];
    const orderId=row.id || genId('O',orders);
    const finalOrder={...row,id:orderId};
    if(row.id){setOrders(p=>p.map(o=>o.id===row.id?finalOrder:o))} else {setOrders(p=>[{...finalOrder},...p])}
    const nextVS=nextIdFactory('VS',vendorSplits);
    const cleanedSplits=splitRows.filter(x=>safeNum(x.qtyPCS)>0 || x.date).map(x=>({...x,id:x.id||nextVS(),vendorOrderId:orderId,status:x.status||'Planned'}));
    if(sb && row.id){try{await sb.from(CLOUD_TABLES.vendorSplits).delete().eq('vendorOrderId',row.id)}catch(e){console.error(e)}}
    setVendorSplits(p=>[...p.filter(x=>x.vendorOrderId!==orderId),...cleanedSplits]);
    setModal(null)
  };
  const saveReceipt=(row)=>{setReceipts(p=>[{...row,id:genId('R',p)},...p]);setModal(null)};
  const saveDispatch=(row)=>{setDispatches(p=>[{...row,id:genId('D',p)},...p]);setModal(null)};
  const cols=[
    {key:'id',label:'Order',render:o=><button className="btn ghost" onClick={()=>setSelected(o)}><span className="blue-t num">{o.id}</span></button>},

    {key:'sku',label:'SKU',render:o=><><b>{o.sku}</b><br/><span className="tiny">{o.type}</span></>},
    {key:'orderQtyPCS',label:'Placed to Make',render:o=><span className="num">{fN(o.orderQtyPCS)} PCS</span>},
    {key:'splitPlan',label:'Vendor Split Plan',render:o=><div style={{minWidth:230}}>{o.splits?.length?o.splits.map(sp=><span key={sp.id} className="badge blue" style={{margin:'0 5px 5px 0'}}>{sp.date}: {fN(sp.qtyPCS)}</span>):<span className="tiny">No split plan</span>}</div>},
    {key:'receivedPCS',label:'FG Received',render:o=><><span className="num green-t">{fN(o.receivedPCS)} PCS</span><br/><span className="tiny">{fN(o.receivedKG)} KG received</span></>},
    {key:'pendingFG',label:'Pending at Vendor',render:o=><><span className={`num ${o.pendingFG?'amber-t':'green-t'}`}>{fN(o.pendingFG)} PCS</span><Progress pct={o.progress} color={o.progress<40?'red':o.progress<80?'amber':'green'}/></>},
    {key:'dates',label:'Main Dates',render:o=><><span className="tiny">Vendor</span> {o.vendorDeliveryDate}<br/><span className="tiny">Client Ref</span> {o.clientDeliveryDate}</>},
    {key:'status',label:'Status',render:o=><StatusBadge status={o.status} pendingFG={o.pendingFG}/>},
    {key:'actions',label:'Actions',render:o=><div className="actions"><Button variant="outline" onClick={()=>setModal({type:'edit',order:o})}>Edit</Button><Button variant="secondary" onClick={()=>setModal({type:'receipt',order:o})}>FG Receipt</Button><Button variant="blue" onClick={()=>setModal({type:'dispatch',order:o})}>Dispatch</Button></div>},
  ];
  return <>
    <PageHead title="Vendor Order Management" sub="Monitor vendor orders, date-wise receive plan, production progress and pending FG">
      <Button variant="primary" onClick={()=>setModal({type:'new'})}>+ New Vendor Order</Button>
    </PageHead>
    <DataTable columns={cols} data={metrics.orderRows} searchText="Search order, vendor, client, SKU..." />
    {modal?.type==='new'&&<OrderForm skus={skus} vendors={vendors} clients={clients} onSave={saveOrder} onClose={()=>setModal(null)}/>} 
    {modal?.type==='edit'&&<OrderForm skus={skus} vendors={vendors} clients={clients} initial={modal.order} initialSplits={vendorSplits.filter(x=>x.vendorOrderId===modal.order.id)} onSave={saveOrder} onClose={()=>setModal(null)}/>}

    {key:'dispatched',label:'Dispatched',render:o=><span className="num green-t">{fN(o.dispatchedPCS)} PCS</span>},
    {key:'pending',label:'Pending Dispatch',render:o=><><span className={`num ${o.pendingDispatch?'red-t':'green-t'}`}>{fN(o.pendingDispatch)} PCS</span><Progress pct={o.progress} color={o.progress<40?'red':o.progress<85?'amber':'green'}/></>},
    {key:'status',label:'Status',render:o=><Badge color={o.status==='Closed'?'green':o.status==='Cancelled'?'red':'blue'}>{o.status||'Open'}</Badge>},
    {key:'actions',label:'Actions',render:o=><div className="actions"><Button variant="outline" onClick={()=>setModal(o)}>Edit</Button><Button variant="blue" onClick={()=>setDispatchModal({customerOrderId:o.id,client:o.client,sku:o.sku,qtyPCS:o.pendingDispatch,sellPCS:o.sellPCS,remarks:`Dispatch against ${o.id}`})} disabled={o.pendingDispatch<=0}>Dispatch</Button></div>},
  ];
  return <>
    <PageHead title="Customer Orders" sub="Add customer order once, then break dispatch commitment date-wise. Example: 25,000 boxes split into 5,000 each.">

function RMOrderForm({skus,vendors,initial,onSave,onClose}){
  const blank={date:todayISO(),mill:'',vendor:'',sku:'',rmForBoxes:'',rmKG:'',buyKG:'',expectedDate:addDays(4),status:'Ordered',remarks:''};
  const [f,setF]=useState({...blank,...(initial||{})});
  const set=(k,v)=>setF(p=>{
    const u={...p,[k]:v};
    const sku=skus.find(s=>s.name===u.sku);
    if(k==='sku' && sku){u.buyKG=sku.buyKG||u.buyKG;}
    if((k==='sku'||k==='rmForBoxes') && sku && safeNum(u.rmForBoxes)>0){
      const ideal=safeNum(sku.idealWastage)/100;
      u.rmKG=Math.round(safeNum(u.rmForBoxes)*safeNum(sku.stdWeight)/(1-ideal));
    }
    return u;
  });
  const rmValue=safeNum(f.rmKG)*safeNum(f.buyKG);
  return <Modal title={f.id?'Edit Mill RM Order':'Add RM Order to Mill'} onClose={onClose} wide>
    <div className="form-grid">
      <Field label="RM Order Date"><Input type="date" value={f.date} onChange={v=>set('date',v)}/></Field>
      <Field label="Mill Name"><Input value={f.mill} onChange={v=>set('mill',v)} placeholder="e.g. Karnataka Paper Mills"/></Field>
      <Field label="Dedicated Vendor / Job Worker"><Select value={f.vendor} onChange={v=>set('vendor',v)} options={vendors.map(v=>v.name)}/></Field>
      <Field label="SKU / Box for which RM is ordered"><Select value={f.sku} onChange={v=>set('sku',v)} options={skus.map(s=>s.name)}/></Field>
      <Field label="RM Ordered for Box Count (PCS)"><Input type="number" value={f.rmForBoxes} onChange={v=>set('rmForBoxes',v)} placeholder="e.g. 20000 boxes"/></Field>
      <Field label="Estimated RM KG"><Input type="number" value={f.rmKG} onChange={v=>set('rmKG',v)}/></Field>
      <Field label="Buying Cost / KG"><Input type="number" value={f.buyKG} onChange={v=>set('buyKG',v)}/></Field>

function CalendarPage({metrics}){
  const parseISO=(iso)=>{const [y,m,d]=String(iso||todayISO()).split('-').map(Number);return new Date(y,(m||1)-1,d||1)};
  const fmt=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const datePlus=(iso,days)=>{const d=parseISO(iso);d.setDate(d.getDate()+days);return fmt(d)};
  const dayName=(iso)=>parseISO(iso).toLocaleDateString('en-IN',{weekday:'short'});
  const pretty=(iso)=>parseISO(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
  const [startDate,setStartDate]=useState(todayISO());
  const [endDate,setEndDate]=useState(addDays(14));
  const [filter,setFilter]=useState('All');
  const dateList=useMemo(()=>{
    const start=parseISO(startDate); const selectedEnd=parseISO(endDate||startDate); const maxEnd=parseISO(datePlus(startDate,14));
    const finalEnd=selectedEnd<start?start:(selectedEnd>maxEnd?maxEnd:selectedEnd);
    const out=[]; const d=new Date(start);
    while(d<=finalEnd){out.push(fmt(d));d.setDate(d.getDate()+1)}
    return out;
  },[startDate,endDate]);
  const events=useMemo(()=>{
    const list=[];
    const vendorSplits=metrics.vendorSplitRows.filter(v=>!['Cancelled','Received'].includes(v.status));
    if(vendorSplits.length){
      vendorSplits.forEach(v=>list.push({date:v.date,kind:'receive',type:'Receive from Vendor',party:v.vendor,sku:v.sku,qty:safeNum(v.pendingPCS)||safeNum(v.qtyPCS),sub:`${v.vendorOrderId} · ${v.vendor} · ${v.status}`}));
    }else{
      metrics.orderRows.filter(o=>!['Cancelled','Closed'].includes(o.status)).forEach(o=>{const receiveQty=safeNum(o.pendingFG)||safeNum(o.expectedPCS)||safeNum(o.orderQtyPCS);if(o.vendorDeliveryDate&&receiveQty>0)list.push({date:o.vendorDeliveryDate,kind:'receive',type:'Receive from Vendor',party:o.vendor,sku:o.sku,qty:receiveQty,sub:`${o.id} · ${o.vendor} · ${o.status}`});});
    }
    const customerSplits=metrics.customerSplitRows.filter(s=>!['Cancelled','Dispatched'].includes(s.status));
    if(customerSplits.length){
      customerSplits.forEach(s=>list.push({date:s.date,kind:'dispatch',type:'Dispatch to Client',party:s.client,sku:s.sku,qty:safeNum(s.pendingPCS)||safeNum(s.qtyPCS),sub:`${s.customerOrderId} · ${s.client} · ${s.status}`}));
    }else{
      metrics.orderRows.filter(o=>!['Cancelled','Closed'].includes(o.status)).forEach(o=>{const dispatchQty=safeNum(o.pendingDispatch)||safeNum(o.orderQtyPCS);if(o.clientDeliveryDate&&dispatchQty>0)list.push({date:o.clientDeliveryDate,kind:'dispatch',type:'Dispatch to Client',party:o.client,sku:o.sku,qty:dispatchQty,sub:`${o.id} · ${o.client} · pending dispatch`});});
    }
    return list;
  },[metrics.orderRows,metrics.customerSplitRows,metrics.vendorSplitRows]);
  const visibleEvents=events.filter(e=>dateList.includes(e.date)&&(filter==='All'||e.type===filter)).sort((a,b)=>a.date.localeCompare(b.date)||a.kind.localeCompare(b.kind));
  const receiveCount=visibleEvents.filter(e=>e.kind==='receive').length;
  const dispatchCount=visibleEvents.filter(e=>e.kind==='dispatch').length;
  const reset15=()=>{const t=todayISO();setStartDate(t);setEndDate(addDays(14));};
  return <>
    <PageHead title="15 Days Delivery Planning" sub="Blue = Receive from Vendor · Green = Dispatch to Client · format: QTY - SKU Name">
      <input className="inp" style={{width:150}} type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}/>
      <input className="inp" style={{width:150}} type="date" value={endDate} min={startDate} max={datePlus(startDate,14)} onChange={e=>setEndDate(e.target.value)}/>
      <select className="sel" style={{width:190}} value={filter} onChange={e=>setFilter(e.target.value)}><option>All</option><option>Receive from Vendor</option><option>Dispatch to Client</option></select>
      <Button variant="secondary" onClick={reset15}>Today + 15 Days</Button>
      <Button variant="secondary" onClick={()=>exportCSV(visibleEvents,'15_day_delivery_plan.csv')}>⬇ Export Plan</Button>
    </PageHead>
    <div className="grid kpi-grid" style={{gridTemplateColumns:'repeat(4,minmax(180px,1fr))'}}>
      <KPI label="Planning Range" value={`${dateList.length} Days`} sub={`${pretty(dateList[0])} to ${pretty(dateList[dateList.length-1])}`} icon="🗓️" color="blue"/>
      <KPI label="Receive from Vendor" value={receiveCount} sub={`${fN(visibleEvents.filter(e=>e.kind==='receive').reduce((a,e)=>a+safeNum(e.qty),0))} PCS`} icon="📥" color="blue"/>
      <KPI label="Dispatch to Client" value={dispatchCount} sub={`${fN(visibleEvents.filter(e=>e.kind==='dispatch').reduce((a,e)=>a+safeNum(e.qty),0))} PCS`} icon="🚚" color="green"/>
      <KPI label="Total Events" value={visibleEvents.length} sub="Within selected 15-day range" icon="📌"/>
    </div>
    <div className="compact-card"><Card title="15-Day Daily Planning Layout" action={<div className="legend"><span><i className="legend-dot blue"></i> Receive from Vendor</span><span><i className="legend-dot green"></i> Dispatch to Client</span></div>}>
      <div className="calendar-agenda">
        {dateList.map(dt=>{
          const evs=visibleEvents.filter(e=>e.date===dt);
          const rec=evs.filter(e=>e.kind==='receive');
          const dis=evs.filter(e=>e.kind==='dispatch');
          const recQty=rec.reduce((a,e)=>a+safeNum(e.qty),0);
          const disQty=dis.reduce((a,e)=>a+safeNum(e.qty),0);
          return <div key={dt} className="agenda-row">
            <div className="agenda-date"><div><b>{pretty(dt)}</b><span>{dayName(dt)}</span></div><small>{rec.length+dis.length} plan · {fN(recQty+disQty)} PCS</small></div>
            <div className="agenda-lane receive-lane">
              <div className="lane-head"><span>📥 Receive from Vendor</span><strong>{fN(recQty)} PCS</strong></div>
              {rec.length?rec.map((e,i)=><div key={i} className="agenda-chip receive" title={e.sub}><b>{fN(e.qty)} PCS - {e.sku}</b><span>{e.party} · {e.sub}</span></div>):<div className="empty-lane">No vendor receipt planned</div>}
            </div>
            <div className="agenda-lane dispatch-lane">
              <div className="lane-head"><span>🚚 Dispatch to Client</span><strong>{fN(disQty)} PCS</strong></div>
              {dis.length?dis.map((e,i)=><div key={i} className="agenda-chip dispatch" title={e.sub}><b>{fN(e.qty)} PCS - {e.sku}</b><span>{e.party} · {e.sub}</span></div>):<div className="empty-lane">No client dispatch planned</div>}
            </div>
          </div>
        })}
      </div>
    </Card></div>
    <div style={{marginTop:10}}><DataTable columns={[{key:'date',label:'Date'},{key:'type',label:'Type',render:e=><Badge color={e.kind==='receive'?'blue':'green'}>{e.type}</Badge>},{key:'qty',label:'Qty - SKU',render:e=><span className={`num ${e.kind==='receive'?'blue-t':'green-t'}`}>{fN(e.qty)} PCS - {e.sku}</span>},{key:'party',label:'Vendor / Client'},{key:'sub',label:'Reference'}]} data={visibleEvents} searchText="Search 15-day plan..." /></div>
  </>
}

function MastersPage({skus,setSkus,vendors,setVendors,clients,setClients}){
  const [tab,setTab]=useState('skus');
  const [modal,setModal]=useState(null);
  const [editRow,setEditRow]=useState(null);

  const addNew=()=>{setEditRow(null);setModal(tab)};
  const edit=(type,row)=>{setEditRow(row);setModal(type)};
  const close=()=>{setModal(null);setEditRow(null)};

  const saveClient=(row)=>{
    if(editRow) setClients(p=>p.map(x=>x.id===editRow.id?{...x,...row,id:editRow.id}:x));
    else setClients(p=>[...p,{...row,id:genId('C',p)}]);
    close();
  };
  const saveVendor=(row)=>{
    if(editRow) setVendors(p=>p.map(x=>x.id===editRow.id?{...x,...row,id:editRow.id}:x));
    else setVendors(p=>[...p,{...row,id:genId('V',p)}]);
    close();
  };
  const saveSKU=(row)=>{
    if(editRow) setSkus(p=>p.map(x=>x.id===editRow.id?{...x,...row,id:editRow.id}:x));
    else setSkus(p=>[...p,{...row,id:genId('S',p)}]);
    close();
  };

  const removeCloud=async(table,id)=>{try{if(sb) await sb.from(table).delete().eq('id',id)}catch(e){console.error(e)}};
  const del=(type,row)=>{
    if(!window.confirm(`Delete ${row.name || row.id}?`)) return;
    if(type==='skus'){setSkus(p=>p.filter(x=>x.id!==row.id));removeCloud(CLOUD_TABLES.skus,row.id)}
    if(type==='vendors'){setVendors(p=>p.filter(x=>x.id!==row.id));removeCloud(CLOUD_TABLES.vendors,row.id)}
    if(type==='clients'){setClients(p=>p.filter(x=>x.id!==row.id));removeCloud(CLOUD_TABLES.clients,row.id)}
  };

  const actionCol=(type)=>({key:'actions',label:'Actions',render:r=><div className="actions" style={{marginTop:0}}><Button variant="outline" onClick={()=>edit(type,r)}>Edit</Button><Button variant="danger" onClick={()=>del(type,r)}>Delete</Button></div>});

  const skuCols=[
    {key:'id',label:'ID',render:s=><span className="num blue-t">{s.id}</span>},{key:'name',label:'SKU Name',render:s=><b>{s.name}</b>},{key:'client',label:'Client'},{key:'size',label:'Size'},{key:'ply',label:'Ply'},
    {key:'stdWeight',label:'Weight/PCS',render:s=>`${fN(s.stdWeight,3)} KG`},{key:'openingStockPCS',label:'Opening Stock',render:s=><span className="num green-t">{fN(s.openingStockPCS)}</span>},{key:'dailyUse',label:'Daily Use',render:s=>fN(s.dailyUse)},
    {key:'sellPCS',label:'Sell/PCS',render:s=>fC(s.sellPCS)},{key:'buyKG',label:'Buy/KG',render:s=>fC(s.buyKG)},{key:'mfgKG',label:'Mfg/KG',render:s=>fC(s.mfgKG)},{key:'status',label:'Status',render:s=><Badge color={s.status==='Active'?'green':'gray'}>{s.status||'Active'}</Badge>},actionCol('skus')
  ];
  const vendorCols=[
    {key:'id',label:'ID',render:v=><span className="num blue-t">{v.id}</span>},{key:'name',label:'Vendor / Job Worker',render:v=><b>{v.name}</b>},{key:'contact',label:'Contact'},{key:'mobile',label:'Mobile'},{key:'location',label:'Location'},
    {key:'gst',label:'GST'},{key:'rate',label:'Rate/KG',render:v=>fC(v.rate)},{key:'wastageAllowance',label:'Wastage %',render:v=>`${fN(v.wastageAllowance,2)}%`},{key:'status',label:'Status',render:v=><Badge color={v.status==='Active'?'green':'gray'}>{v.status||'Active'}</Badge>},actionCol('vendors')
  ];
  const clientCols=[
    {key:'id',label:'ID',render:c=><span className="num blue-t">{c.id}</span>},{key:'name',label:'Client',render:c=><b>{c.name}</b>},{key:'contact',label:'Contact'},{key:'mobile',label:'Mobile'},{key:'email',label:'Email'},{key:'gst',label:'GST'},{key:'terms',label:'Terms'},{key:'status',label:'Status',render:c=><Badge color={c.status==='Active'?'green':'gray'}>{c.status||'Active'}</Badge>},actionCol('clients')
  ];

  const sub={skus:'Add/edit box SKU, pricing, daily consumption and safety-stock settings',vendors:'Add/edit job workers, manufacturing rates, wastage and contact details',clients:'Add/edit clients, GST, contact and billing details'}[tab];
  return <>
    <PageHead title="Masters" sub={sub}>
      <div className="tabs"><button className={tab==='skus'?'active':''} onClick={()=>setTab('skus')}>SKU Master</button><button className={tab==='vendors'?'active':''} onClick={()=>setTab('vendors')}>Vendor Master</button><button className={tab==='clients'?'active':''} onClick={()=>setTab('clients')}>Client Master</button></div>
      <Button onClick={addNew}>+ Add {tab==='skus'?'SKU':tab==='vendors'?'Vendor':'Client'}</Button>
    </PageHead>
    {tab==='skus'&&<DataTable columns={skuCols} data={skus} searchText="Search SKU master..."/>}
    {tab==='vendors'&&<DataTable columns={vendorCols} data={vendors} searchText="Search vendor master..."/>}
    {tab==='clients'&&<DataTable columns={clientCols} data={clients} searchText="Search client master..."/>}
    {modal==='skus'&&<SKUMasterForm initial={editRow} clients={clients} onSave={saveSKU} onClose={close}/>} 
    {modal==='vendors'&&<VendorMasterForm initial={editRow} onSave={saveVendor} onClose={close}/>} 
    {modal==='clients'&&<ClientMasterForm initial={editRow} onSave={saveClient} onClose={close}/>} 
  </>
}

function App(){
  const [page,setPage]=useState('dashboard');
  const [clients,setClients,clientsSync]=useSupabaseState(CLOUD_TABLES.clients,'bp_clients_v4',START_CLIENTS);
  const [vendors,setVendors,vendorsSync]=useSupabaseState(CLOUD_TABLES.vendors,'bp_vendors_v4',START_VENDORS);
  const [skus,setSkus,skusSync]=useSupabaseState(CLOUD_TABLES.skus,'bp_skus_v4',START_SKUS);
  const [orders,setOrders,ordersSync]=useSupabaseState(CLOUD_TABLES.orders,'bp_orders_v4',START_ORDERS);
  const [receipts,setReceipts,receiptsSync]=useSupabaseState(CLOUD_TABLES.receipts,'bp_receipts_v4',START_RECEIPTS);
  const [dispatches,setDispatches,dispatchesSync]=useSupabaseState(CLOUD_TABLES.dispatches,'bp_dispatches_v4',START_DISPATCHES);
  const [rmOrders,setRmOrders,rmOrdersSync]=useSupabaseState(CLOUD_TABLES.rmOrders,'bp_rm_orders_v4',START_RM_ORDERS);
  const [customerOrders,setCustomerOrders,customerOrdersSync]=useSupabaseState(CLOUD_TABLES.customerOrders,'bp_customer_orders_v1',START_CUSTOMER_ORDERS);
  const [customerSplits,setCustomerSplits,customerSplitsSync]=useSupabaseState(CLOUD_TABLES.customerSplits,'bp_customer_splits_v1',START_CUSTOMER_SPLITS);
  const [vendorSplits,setVendorSplits,vendorSplitsSync]=useSupabaseState(CLOUD_TABLES.vendorSplits,'bp_vendor_splits_v1',START_VENDOR_SPLITS);
  const metrics=useMemo(()=>makeMetrics(skus,orders,receipts,dispatches,rmOrders,customerOrders,customerSplits,vendorSplits),[skus,orders,receipts,dispatches,rmOrders,customerOrders,customerSplits,vendorSplits]);
  const backup={clients,vendors,skus,orders,receipts,dispatches,rmOrders,customerOrders,customerSplits,vendorSplits};
  const syncs=[clientsSync,vendorsSync,skusSync,ordersSync,receiptsSync,dispatchesSync,rmOrdersSync,customerOrdersSync,customerSplitsSync,vendorSplitsSync];
  const hasError=syncs.some(x=>String(x.status).toLowerCase().includes('error'));
  const syncErrors=syncs.filter(x=>String(x.status).toLowerCase().includes('error')).map(x=>`${x.table}: ${x.error}`).join('\n');
  const cloudText=!sb?'Local only':hasError?'Supabase sync issue':'Supabase cloud sync active';
  return <div className="app"><Sidebar page={page} setPage={setPage}/><main className="main">
    <div className="actions no-print" style={{justifyContent:'flex-end',marginBottom:12}}><span title={syncErrors} className={`badge ${hasError?'red':'green'}`}>{cloudText}</span>{hasError&&<Button variant="secondary" onClick={()=>alert(syncErrors || 'No error detail found')}>⚠ Sync Details</Button>}<Button variant="secondary" onClick={()=>downloadBackup(backup)}>💾 Backup JSON</Button><Button variant="secondary" onClick={()=>window.print()}>🖨 Print</Button></div>
    {page==='dashboard'&&<Dashboard metrics={metrics} setPage={setPage}/>} 
    {page==='customerOrders'&&<CustomerOrdersPage skus={skus} clients={clients} customerOrders={customerOrders} setCustomerOrders={setCustomerOrders} customerSplits={customerSplits} setCustomerSplits={setCustomerSplits} dispatches={dispatches} setDispatches={setDispatches} metrics={metrics}/>} 
    {page==='orders'&&<OrdersPage skus={skus} vendors={vendors} clients={clients} orders={orders} setOrders={setOrders} receipts={receipts} setReceipts={setReceipts} dispatches={dispatches} setDispatches={setDispatches} vendorSplits={vendorSplits} setVendorSplits={setVendorSplits} metrics={metrics}/>} 
    {page==='inventory'&&<InventoryPage skus={skus} setSkus={setSkus} vendors={vendors} rmOrders={rmOrders} setRmOrders={setRmOrders} metrics={metrics}/>} 
    {page==='jobwork'&&<JobWorkPage orders={orders} receipts={receipts} setReceipts={setReceipts} metrics={metrics} skus={skus}/>} 
    {page==='dispatch'&&<DispatchPage skus={skus} clients={clients} setDispatches={setDispatches} metrics={metrics}/>} 
    {page==='pnl'&&<PnLPage metrics={metrics}/>} 
    {page==='calendar'&&<CalendarPage metrics={metrics}/>} 
    {page==='masters'&&<MastersPage skus={skus} setSkus={setSkus} vendors={vendors} setVendors={setVendors} clients={clients} setClients={setClients}/>} 
  </main></div>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
