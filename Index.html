                {label:'Placed',val:fN(v.totalPlaced),unit:'PCS',c:'#475569',bg:'#f1f5f9'},
                {label:'Received',val:fN(v.totalReceived),unit:'PCS',c:'#059669',bg:'#f0fdf4'},
                {label:'Pending FG',val:fN(v.totalPending),unit:'PCS',c:v.totalPending>0?'#d97706':'#059669',bg:v.totalPending>0?'#fffbeb':'#f0fdf4'},
                {label:'RM Issued',val:fN(v.totalIssued),unit:'KG',c:'#7c3aed',bg:'#f5f3ff'},
              ].map(k=><div key={k.label} style={{background:k.bg,borderRadius:8,padding:'5px 10px',minWidth:90,textAlign:'center'}}>
                <div style={{fontSize:8,fontWeight:900,textTransform:'uppercase',color:'#94a3b8',letterSpacing:.4}}>{k.label}</div>
                <div style={{fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:800,color:k.c,lineHeight:1.2}}>{k.val}</div>
                <div style={{fontSize:8,color:'#94a3b8',fontWeight:700}}>{k.unit}</div>
              </div>)}
              <div style={{background:'#f1f5f9',borderRadius:8,padding:'5px 10px',minWidth:90,textAlign:'center'}}>
                <div style={{fontSize:8,fontWeight:900,textTransform:'uppercase',color:'#94a3b8',letterSpacing:.4}}>Progress</div>
                <div style={{fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:800,color:'#6366f1',lineHeight:1.2}}>{fN(v.progress,0)}%</div>
                <div style={{height:4,background:'#e2e8f0',borderRadius:99,marginTop:4,overflow:'hidden'}}><div style={{height:'100%',width:`${v.progress}%`,background:'#6366f1',borderRadius:99}}></div></div>
              </div>
            </div>
          </div>
          {/* Order rows for this vendor */}
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              <thead>
                <tr style={{background:'#fafbfc'}}>
                  {['Order','SKU','Type','Placed','RM Issued','Received','Pending FG','Progress','Delivery','Status','Actions'].map(h=><th key={h} style={{padding:'6px 12px',textAlign:'left',fontSize:10,fontWeight:900,textTransform:'uppercase',letterSpacing:.4,color:'#94a3b8',borderBottom:'1px solid #f1f5f9',whiteSpace:'nowrap'}}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {v.orders.map((o,i)=><tr key={o.id} style={{borderBottom:'1px solid #f8fafc',background:i%2===0?'#fff':'#fafbfc'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#f0f4ff'}
                  onMouseLeave={e=>e.currentTarget.style.background=i%2===0?'#fff':'#fafbfc'}>
                  <td style={{padding:'7px 12px'}}><button className="btn ghost" style={{padding:0,fontWeight:800,color:'#1d4ed8',fontSize:12}} onClick={()=>setSelected(o)}>{o.id}</button></td>
                  <td style={{padding:'7px 12px'}}><span style={{fontWeight:700,fontSize:11}}>{o.sku}</span></td>
                  <td style={{padding:'7px 12px'}}><span style={{fontSize:10,color:'#64748b'}}>{o.type||'—'}</span></td>
                  <td style={{padding:'7px 12px'}}><span style={{fontFamily:"'Sora',sans-serif",fontWeight:800,color:'#0f172a'}}>{fN(o.orderQtyPCS)}</span></td>
                  <td style={{padding:'7px 12px'}}><span style={{fontFamily:"'Sora',sans-serif",fontWeight:700,color:'#7c3aed'}}>{fN(o.issuedKG)} KG</span></td>
                  <td style={{padding:'7px 12px'}}><span style={{fontFamily:"'Sora',sans-serif",fontWeight:700,color:'#059669'}}>{fN(o.receivedPCS)}</span><div style={{fontSize:9,color:'#94a3b8'}}>{fN(o.receivedKG)} KG</div></td>
                  <td style={{padding:'7px 12px'}}>
                    <span style={{fontFamily:"'Sora',sans-serif",fontWeight:800,color:o.pendingFG>0?'#d97706':'#059669'}}>{fN(o.pendingFG)}</span>
                    <Progress pct={o.progress} color={o.progress<40?'red':o.progress<80?'amber':'green'}/>
                  </td>
                  <td style={{padding:'7px 12px'}}><span style={{fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700,color:'#6366f1'}}>{fN(o.progress,0)}%</span></td>
                  <td style={{padding:'7px 12px',fontSize:11,color:'#64748b',whiteSpace:'nowrap'}}>{o.vendorDeliveryDate||'—'}</td>
                  <td style={{padding:'7px 12px'}}><StatusBadge status={o.displayStatus||o.status} pendingFG={o.pendingFG}/></td>
                  <td style={{padding:'7px 12px'}}>
                    <div style={{display:'flex',gap:4}}>
                      <Button variant="outline" onClick={()=>setModal({type:'edit',order:o})}>Edit</Button>
                      <Button variant="secondary" onClick={()=>setModal({type:'receipt',order:o})}>Receipt</Button>
                    </div>
                  </td>
                </tr>)}
              </tbody>
            </table>
          </div>
        </div>
      })}
    </div>}

    {/* ALL ORDERS VIEW */}
    {view==='orders'&&<DataTable columns={cols} data={filteredOrders} searchText="Search order, vendor, client, SKU..." />}

    {modal?.type==='new'&&<OrderForm skus={skus} vendors={vendors} clients={clients} onSave={saveOrder} onClose={()=>setModal(null)}/>}
    {modal?.type==='edit'&&<OrderForm skus={skus} vendors={vendors} clients={clients} initial={modal.order} initialSplits={vendorSplits.filter(x=>x.vendorOrderId===modal.order.id)} onSave={saveOrder} onClose={()=>setModal(null)}/>}
    {modal?.type==='receipt'&&<ReceiptForm order={modal.order} skus={skus} onSave={saveReceipt} onClose={()=>setModal(null)}/>}
    {modal?.type==='dispatch'&&<DispatchForm order={modal.order} skus={skus} clients={clients} onSave={saveDispatch} onClose={()=>setModal(null)}/>}
    {selected&&<OrderDetail order={selected} metrics={metrics} skus={skus} onClose={()=>setSelected(null)}/>}
  </>
}
function OrderDetail({order,metrics,skus,onClose}){
  const o=metrics.orderRows.find(x=>x.id===order.id)||order;
  const sku=skus.find(s=>s.name===o.sku)||{};
  const cost=safeNum(o.issuedKG)*safeNum(o.buyKG)+safeNum(o.receivedKG)*safeNum(o.mfgKG);
  return <Modal title={`Order Detail - ${o.id}`} onClose={onClose} wide>
    <div className="detail-grid">
      <div className="detail"><label>Vendor</label><strong>{o.vendor}</strong></div><div className="detail"><label>Client</label><strong>{o.client}</strong></div><div className="detail"><label>SKU</label><strong>{o.sku}</strong></div><div className="detail"><label>Status</label><strong><StatusBadge status={o.displayStatus||o.status} pendingFG={o.pendingFG}/></strong></div>
      <div className="detail"><label>Order Qty</label><strong>{fN(o.orderQtyPCS)} PCS</strong></div><div className="detail"><label>Received</label><strong>{fN(o.receivedPCS)} PCS / {fN(o.receivedKG)} KG</strong></div><div className="detail"><label>Dispatched</label><strong>{fN(o.dispatchedPCS)} PCS</strong></div><div className="detail"><label>Pending FG</label><strong>{fN(o.pendingFG)} PCS</strong></div>
      <div className="detail"><label>RM Issued</label><strong>{fN(o.issuedKG)} KG</strong></div><div className="detail"><label>Wastage</label><strong className={o.wastagePct>5?'red-t':'green-t'}>{fN(o.wastageKG)} KG / {fP(o.wastagePct)}</strong></div><div className="detail"><label>Cost Booked</label><strong>{fC(cost)}</strong></div><div className="detail"><label>Box Weight</label><strong>{sku.stdWeight||0} KG / PCS</strong></div>
    </div>
    <div style={{marginTop:16}}><Card title="Vendor Delivery Split Plan"><div className="table-wrap"><table className="table" style={{minWidth:650}}><thead><tr><th>Date</th><th>Qty</th><th>Status</th><th>Remarks</th></tr></thead><tbody>{o.splits?.length?o.splits.map(sp=><tr key={sp.id}><td>{sp.date}</td><td className="num blue-t">{fN(sp.qtyPCS)} PCS</td><td><Badge color={(sp.displayStatus||sp.status)==='Done'||(sp.displayStatus||sp.status)==='Received'?'green':(sp.displayStatus||sp.status)==='Delayed'?'red':(sp.displayStatus||sp.status)==='Part Received'?'amber':'blue'}>{sp.displayStatus||sp.status}</Badge></td><td>{sp.remarks}</td></tr>):<tr><td colSpan="4" className="center muted">No split plan</td></tr>}</tbody></table></div></Card></div>
  </Modal>
}

function CustomerOrderForm({skus,clients,initial,initialSplits=[],onSave,onClose}){
  const blank={date:todayISO(),client:'',sku:'',orderRef:'',totalQtyPCS:'',sellPCS:'',status:'Open',remarks:''};
  const [f,setF]=useState({...blank,...(initial||{})});
  const [splits,setSplits]=useState(initialSplits && initialSplits.length ? initialSplits.map(x=>({...x})) : []);
  const set=(k,v)=>setF(p=>{const u={...p,[k]:v}; if(k==='sku'){const sku=skus.find(s=>s.name===v); if(sku){u.client=sku.client;u.sellPCS=sku.sellPCS}} return u});
  const addEvenSplits=()=>{
    const total=safeNum(f.totalQtyPCS); if(!total){alert('Enter customer order qty first');return;}
    const count=Number(prompt('How many dispatch parts?', '5')||0); if(!count)return;
    const each=Math.floor(total/count); const rem=total-(each*count);
    setSplits(Array.from({length:count},(_,i)=>({date:addDays(1+i*2),qtyPCS:each+(i===count-1?rem:0),status:'Pending',remarks:`Dispatch ${i+1}`})));
  };
  const splitTotal=splits.reduce((a,r)=>a+safeNum(r.qtyPCS),0);
  const value=safeNum(f.totalQtyPCS)*safeNum(f.sellPCS);
  return <Modal title={initial?'Edit Customer Order':'Add Customer Order with Dispatch Split'} onClose={onClose} wide>
    <div className="form-grid">
      <Field label="Order Date"><Input type="date" value={f.date} onChange={v=>set('date',v)}/></Field>
      <Field label="Customer PO / Ref"><Input value={f.orderRef} onChange={v=>set('orderRef',v)} placeholder="e.g. PO No"/></Field>
      <Field label="Client"><Select value={f.client} onChange={v=>set('client',v)} options={clients.map(c=>c.name)}/></Field>
      <Field label="SKU"><Select value={f.sku} onChange={v=>set('sku',v)} options={skus.map(s=>s.name)}/></Field>
      <Field label="Total Customer Order Qty PCS"><Input type="number" value={f.totalQtyPCS} onChange={v=>set('totalQtyPCS',v)} placeholder="e.g. 25000"/></Field>
      <Field label="Selling Price / PCS"><Input type="number" value={f.sellPCS} onChange={v=>set('sellPCS',v)}/></Field>
      <Field label="Status"><Select value={f.status} onChange={v=>set('status',v)} options={['Open','Part Delivered','Part Dispatched','Done','Closed','Hold','Cancelled']}/></Field>
      <Field label="Remarks"><Input value={f.remarks} onChange={v=>set('remarks',v)}/></Field>
      <div style={{gridColumn:'1/-1'}}><Button variant="secondary" onClick={addEvenSplits}>⚡ Auto split dispatch equally</Button> <span className="tiny">Example: 25,000 Yogabaar boxes → 5,000 on 22, 23, 25, 27, 29 May.</span></div>
      <SplitScheduleEditor title="Customer Dispatch Split Plan" splits={splits} setSplits={setSplits} dateLabel="Dispatch Date" qtyLabel="Dispatch Qty PCS" statusOptions={['Pending','Part Delivered','Dispatched','Done','Delayed','Cancelled']}/>
    </div>
    <div className="calc-strip"><div className="calc-item"><label>Order Value</label><strong>{fC(value)}</strong></div><div className="calc-item"><label>Total Order Qty</label><strong>{fN(f.totalQtyPCS)} PCS</strong></div><div className="calc-item"><label>Split Planned</label><strong className={splitTotal!==safeNum(f.totalQtyPCS)?'red-t':'green-t'}>{fN(splitTotal)} PCS</strong></div><div className="calc-item"><label>Balance to Split</label><strong>{fN(safeNum(f.totalQtyPCS)-splitTotal)} PCS</strong></div></div>
    <div className="actions" style={{justifyContent:'flex-end',marginTop:18}}><Button variant="secondary" onClick={onClose}>Cancel</Button><Button onClick={()=>onSave({order:f,splits})}>{initial?'Update Customer Order':'Save Customer Order'}</Button></div>
  </Modal>
}

function CustomerOrdersPage({skus,clients,customerOrders,setCustomerOrders,customerSplits,setCustomerSplits,dispatches,setDispatches,metrics}){
  const [modal,setModal]=useState(null); const [dispatchModal,setDispatchModal]=useState(null);
  const [view,setView]=useState('client'); // 'client' | 'orders'
  const [clientFilter,setClientFilter]=useState('All');
  const saveOrder=async(payload)=>{
    const row=payload.order; const orderId=row.id || genId('CO',customerOrders); const finalOrder={...row,id:orderId};
    if(row.id) setCustomerOrders(p=>p.map(o=>o.id===row.id?finalOrder:o)); else setCustomerOrders(p=>[{...finalOrder},...p]);
    const nextCS=nextIdFactory('CS',customerSplits);
    const cleaned=(payload.splits||[]).filter(x=>safeNum(x.qtyPCS)>0 || x.date).map(x=>({...x,id:x.id||nextCS(),customerOrderId:orderId,status:x.status||'Pending'}));
    if(sb && row.id){try{await sb.from(CLOUD_TABLES.customerSplits).delete().eq('customerOrderId',row.id)}catch(e){console.error(e)}}
    setCustomerSplits(p=>[...p.filter(x=>x.customerOrderId!==orderId),...cleaned]);
    setModal(null);
  };
  const saveDispatch=(row)=>{
    const qty=safeNum(row.qtyPCS); if(!qty){alert('Enter dispatch quantity');return;}
    setDispatches(p=>[{...row,id:genId('D',p)},...p]);
    if(row.customerSplitId){
      const sp=metrics.customerSplitRows.find(x=>x.id===row.customerSplitId)||{}; const after=safeNum(sp.pendingPCS)-qty;
      setCustomerSplits(p=>p.map(x=>x.id===row.customerSplitId?{...x,status:after<=0?'Done':'Part Delivered'}:x));
    }
    if(row.customerOrderId){
      const co=metrics.customerOrderRows.find(x=>x.id===row.customerOrderId)||{}; const finalDispatched=safeNum(co.dispatchedPCS)+qty; const total=safeNum(co.totalQtyPCS)||finalDispatched;
      setCustomerOrders(p=>p.map(o=>o.id===row.customerOrderId?{...o,status:finalDispatched>=total?'Done':'Part Delivered'}:o));
    }
    setDispatchModal(null);
  };
  const rows=metrics.customerOrderRows;

  // Build client summary
  const clientSummary=useMemo(()=>{
    const map={};
    rows.forEach(o=>{
      const c=o.client||'Unknown';
      if(!map[c])map[c]={client:c,orders:[],totalQty:0,dispatched:0,pending:0,orderValue:0,skus:new Set()};
      map[c].orders.push(o);
      map[c].totalQty+=safeNum(o.totalQtyPCS);
      map[c].dispatched+=safeNum(o.dispatchedPCS);
      map[c].pending+=safeNum(o.pendingDispatch);
      map[c].orderValue+=safeNum(o.totalQtyPCS)*safeNum(o.sellPCS);
      map[c].skus.add(o.sku);
    });
    return Object.values(map).map(c=>({...c,skus:Array.from(c.skus),progress:c.totalQty?c.dispatched/c.totalQty*100:0})).sort((a,b)=>b.pending-a.pending);
  },[rows]);

  const allClients=['All',...clientSummary.map(c=>c.client)];
  const filteredOrders=clientFilter==='All'?rows:rows.filter(o=>o.client===clientFilter);

  const cols=[
    {key:'id',label:'Order',render:o=><span className="num blue-t">{o.id}</span>},
    {key:'client',label:'Client / SKU',render:o=><><b>{o.client}</b><br/><span className="tiny">{o.sku} · {o.orderRef}</span></>},
    {key:'total',label:'Order Qty',render:o=><span className="num">{fN(o.totalQtyPCS)} PCS</span>},
    {key:'splits',label:'Dispatch Split Plan',render:o=><div style={{minWidth:290}}>{o.splits?.length?o.splits.map(sp=>{const done=sp.isDone||safeNum(sp.pendingPCS)<=0;const part=safeNum(sp.dispatchedPCS)>0&&!done;return <button key={sp.id} className={`badge ${done?'green':part?'amber':'blue'}`} style={{border:0,margin:'0 5px 5px 0'}} disabled={done} onClick={()=>!done&&setDispatchModal({date:sp.date,customerOrderId:o.id,customerSplitId:sp.id,client:o.client,sku:o.sku,qtyPCS:sp.pendingPCS>0?sp.pendingPCS:0,sellPCS:o.sellPCS,remarks:`Dispatch against ${sp.id}`})}>{done?'✅ ':part?'↗ ':''}{sp.date}: {fN(sp.qtyPCS)} {done?'Done':part?`Del ${fN(sp.dispatchedPCS)}`:'Pending'}</button>}):<span className="tiny">No split plan</span>}</div>},
    {key:'dispatched',label:'Dispatched',render:o=><span className="num green-t">{fN(o.dispatchedPCS)} PCS</span>},
    {key:'pending',label:'Pending Dispatch',render:o=><><span className={`num ${o.pendingDispatch?'red-t':'green-t'}`}>{fN(o.pendingDispatch)} PCS</span><Progress pct={o.progress} color={o.progress<40?'red':o.progress<85?'amber':'green'}/></>},
    {key:'status',label:'Status',render:o=><Badge color={(o.displayStatus||o.status)==='Done'||(o.displayStatus||o.status)==='Closed'?'green':(o.displayStatus||o.status)==='Cancelled'?'red':'blue'}>{o.displayStatus||o.status||'Open'}</Badge>},
    {key:'actions',label:'Actions',render:o=><div className="actions"><Button variant="outline" onClick={()=>setModal(o)}>Edit</Button><Button variant="blue" onClick={()=>setDispatchModal({customerOrderId:o.id,client:o.client,sku:o.sku,qtyPCS:o.pendingDispatch,sellPCS:o.sellPCS,remarks:`Dispatch against ${o.id}`})} disabled={o.pendingDispatch<=0}>Dispatch</Button></div>},
  ];

  return <>
    <PageHead title="Customer Orders" sub="Add customer order once, then break dispatch commitment date-wise.">
      <Button variant="primary" onClick={()=>setModal({})}>+ Add Customer Order</Button>
    </PageHead>

    {/* KPI bar */}
    <div className="grid kpi-grid compact-kpi-grid" style={{gridTemplateColumns:'repeat(4,minmax(145px,1fr))'}}>
      <KPI label="Customer Order Qty" value={fN(metrics.totals.customerOrderQty)} sub="Total planned demand" icon="📋" color="blue"/>
      <KPI label="Dispatch Splits" value={metrics.totals.customerSplits} sub="Date-wise commitments" icon="🗓️" color="green"/>
      <KPI label="Pending Dispatch" value={fN(metrics.totals.customerPending)} sub="Order balance" icon="🚚" color="red"/>
      <KPI label="Dispatched Qty" value={fN(metrics.totals.dispatched)} sub="All dispatches" icon="✅" color="purple"/>
    </div>

    {/* View toggle + client filter */}
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:8}}>
      <div className="tabs" style={{padding:3}}>
        <button className={view==='client'?'active':''} style={{padding:'5px 12px',fontSize:12}} onClick={()=>setView('client')}>🏢 Client Summary</button>
        <button className={view==='orders'?'active':''} style={{padding:'5px 12px',fontSize:12}} onClick={()=>setView('orders')}>📋 All Orders</button>
      </div>
      {view==='orders'&&<div style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:11,fontWeight:700,color:'#64748b'}}>Filter client:</span>
        <select className="sel" style={{width:180,height:30,padding:'4px 8px',fontSize:12,borderRadius:7}} value={clientFilter} onChange={e=>setClientFilter(e.target.value)}>
          {allClients.map(c=><option key={c}>{c}</option>)}
        </select>
      </div>}
    </div>

    {/* CLIENT SUMMARY VIEW */}
    {view==='client'&&<div style={{display:'flex',flexDirection:'column',gap:10}}>
      {clientSummary.map(c=>{
        const activeOrders=c.orders.filter(o=>!['Closed','Cancelled'].includes(o.status));
        return <div key={c.client} style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,overflow:'hidden',boxShadow:'0 1px 4px rgba(15,23,42,.05)'}}>
          {/* Client header */}
          <div style={{background:'#f8fafc',borderBottom:'1px solid #e2e8f0',padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:36,height:36,borderRadius:9,background:'#059669',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>🏢</div>
              <div>
                <div style={{fontFamily:"'Sora',sans-serif",fontSize:15,fontWeight:800,color:'#0f172a'}}>{c.client}</div>
                <div style={{fontSize:10,color:'#64748b',marginTop:1}}>{c.skus.join(' · ')} &nbsp;·&nbsp; {c.orders.length} orders &nbsp;·&nbsp; {activeOrders.length} active</div>
              </div>
            </div>
            {/* Client KPI strip */}
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {[
                {label:'Order Qty',val:fN(c.totalQty),unit:'PCS',c:'#1d4ed8',bg:'#eff6ff'},
                {label:'Dispatched',val:fN(c.dispatched),unit:'PCS',c:'#059669',bg:'#f0fdf4'},
                {label:'Pending',val:fN(c.pending),unit:'PCS',c:c.pending>0?'#d97706':'#059669',bg:c.pending>0?'#fffbeb':'#f0fdf4'},
                {label:'Order Value',val:fC(c.orderValue),unit:'',c:'#7c3aed',bg:'#f5f3ff'},
              ].map(k=><div key={k.label} style={{background:k.bg,borderRadius:8,padding:'5px 10px',minWidth:90,textAlign:'center'}}>
                <div style={{fontSize:8,fontWeight:900,textTransform:'uppercase',color:'#94a3b8',letterSpacing:.4}}>{k.label}</div>
                <div style={{fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:800,color:k.c,lineHeight:1.2}}>{k.val}</div>
                {k.unit&&<div style={{fontSize:8,color:'#94a3b8',fontWeight:700}}>{k.unit}</div>}
              </div>)}
              <div style={{background:'#f1f5f9',borderRadius:8,padding:'5px 10px',minWidth:90,textAlign:'center'}}>
                <div style={{fontSize:8,fontWeight:900,textTransform:'uppercase',color:'#94a3b8',letterSpacing:.4}}>Progress</div>
                <div style={{fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:800,color:'#059669',lineHeight:1.2}}>{fN(c.progress,0)}%</div>

                <tr style={{background:'#fafbfc'}}>

              </thead>
              <tbody>
                {c.orders.map((o,i)=><tr key={o.id} style={{borderBottom:'1px solid #f8fafc',background:i%2===0?'#fff':'#fafbfc'}}

                  onMouseLeave={e=>e.currentTarget.style.background=i%2===0?'#fff':'#fafbfc'}>
                  <td style={{padding:'7px 12px'}}><span style={{fontWeight:800,color:'#1d4ed8',fontSize:12}}>{o.id}</span></td>
                  <td style={{padding:'7px 12px'}}><span style={{fontWeight:700,fontSize:11}}>{o.sku}</span></td>
                  <td style={{padding:'7px 12px',fontSize:11,color:'#64748b'}}>{o.orderRef||'—'}</td>
                  <td style={{padding:'7px 12px'}}><span style={{fontFamily:"'Sora',sans-serif",fontWeight:800,color:'#0f172a'}}>{fN(o.totalQtyPCS)}</span></td>
                  <td style={{padding:'7px 12px'}}><span style={{fontFamily:"'Sora',sans-serif",fontWeight:700,color:'#059669'}}>{fN(o.dispatchedPCS)}</span></td>
                  <td style={{padding:'7px 12px'}}>
                    <span style={{fontFamily:"'Sora',sans-serif",fontWeight:800,color:o.pendingDispatch>0?'#d97706':'#059669'}}>{fN(o.pendingDispatch)}</span>
                    <Progress pct={o.progress} color={o.progress<40?'red':o.progress<85?'amber':'green'}/>
                  </td>
                  <td style={{padding:'7px 12px'}}><span style={{fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700,color:'#059669'}}>{fN(o.progress,0)}%</span></td>
                  <td style={{padding:'7px 12px'}}>
                    <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                      {o.splits?.length?o.splits.map(sp=>{const done=sp.isDone||safeNum(sp.pendingPCS)<=0;const part=safeNum(sp.dispatchedPCS)>0&&!done;return <button key={sp.id} onClick={()=>!done&&setDispatchModal({date:sp.date,customerOrderId:o.id,customerSplitId:sp.id,client:o.client,sku:o.sku,qtyPCS:sp.pendingPCS,sellPCS:o.sellPCS,remarks:`Dispatch against ${sp.id}`})} style={{background:done?'#dcfce7':part?'#fef3c7':'#dbeafe',color:done?'#166534':part?'#92400e':'#1e40af',border:`1px solid ${done?'#86efac':part?'#fde68a':'#bfdbfe'}`,borderRadius:4,padding:'1px 5px',fontSize:9,fontWeight:700,cursor:done?'default':'pointer'}}> {done?'✅ ':part?'↗ ':''}{sp.date}: {fN(sp.qtyPCS)} {done?'Done':part?`Del ${fN(sp.dispatchedPCS)}`:'Pending'}</button>}):<span style={{fontSize:10,color:'#94a3b8'}}>No splits</span>}
                    </div>
                  </td>
                  <td style={{padding:'7px 12px'}}><Badge color={(o.displayStatus||o.status)==='Done'||(o.displayStatus||o.status)==='Closed'?'green':(o.displayStatus||o.status)==='Cancelled'?'red':'blue'}>{o.displayStatus||o.status||'Open'}</Badge></td>
                  <td style={{padding:'7px 12px'}}>
                    <div style={{display:'flex',gap:4}}>
                      <Button variant="outline" onClick={()=>setModal(o)}>Edit</Button>
                      <Button variant="blue" onClick={()=>setDispatchModal({customerOrderId:o.id,client:o.client,sku:o.sku,qtyPCS:o.pendingDispatch,sellPCS:o.sellPCS,remarks:`Dispatch against ${o.id}`})} disabled={o.pendingDispatch<=0}>Dispatch</Button>
                    </div>
                  </td>
                </tr>)}
              </tbody>
            </table>
          </div>
          {dispatches.filter(d=>d.client===c.client).length>0&&<div style={{borderTop:'1px solid #e2e8f0',padding:'10px 14px',background:'#fbfdff'}}>
            <div style={{fontSize:11,fontWeight:900,textTransform:'uppercase',letterSpacing:.4,color:'#475569',marginBottom:7}}>✅ Dispatch / Invoice Mapping</div>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                <thead><tr style={{background:'#fff'}}>{['Date','Order','Split','SKU','Qty','Invoice No','Logistics','Status'].map(h=><th key={h} style={{padding:'6px 8px',textAlign:'left',fontSize:9,fontWeight:900,textTransform:'uppercase',color:'#94a3b8',borderBottom:'1px solid #e2e8f0',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
                <tbody>{dispatches.filter(d=>d.client===c.client).sort((a,b)=>String(b.date).localeCompare(String(a.date))).map(d=><tr key={d.id}>
                  <td style={{padding:'6px 8px',borderBottom:'1px solid #f1f5f9'}}>{d.date}</td>
                  <td style={{padding:'6px 8px',borderBottom:'1px solid #f1f5f9'}}>{metrics.dispatchCustomerOrderMap?.[d.id]||d.customerOrderId||d.orderId||'—'}</td>
                  <td style={{padding:'6px 8px',borderBottom:'1px solid #f1f5f9'}}>{d.customerSplitId||'—'}</td>
                  <td style={{padding:'6px 8px',borderBottom:'1px solid #f1f5f9'}}><b>{d.sku}</b></td>
                  <td style={{padding:'6px 8px',borderBottom:'1px solid #f1f5f9'}}><span style={{fontFamily:"'Sora',sans-serif",fontWeight:800,color:'#059669'}}>{fN(d.qtyPCS)} PCS</span></td>
                  <td style={{padding:'6px 8px',borderBottom:'1px solid #f1f5f9'}}><b>{d.invoice||'—'}</b></td>
                  <td style={{padding:'6px 8px',borderBottom:'1px solid #f1f5f9'}}>{fC(d.logistics||0)}</td>
                  <td style={{padding:'6px 8px',borderBottom:'1px solid #f1f5f9'}}><Badge color="green">Done</Badge></td>
                </tr>)}</tbody>
              </table>
            </div>
          </div>}
        </div>
      })}
    </div>}

    {/* ALL ORDERS VIEW */}
    {view==='orders'&&<DataTable columns={cols} data={filteredOrders} searchText="Search customer order, client, SKU..." />}

    {modal&&<CustomerOrderForm skus={skus} clients={clients} initial={modal.id?modal:null} initialSplits={modal.id?customerSplits.filter(x=>x.customerOrderId===modal.id):[]} onSave={saveOrder} onClose={()=>setModal(null)}/>}
    {dispatchModal&&<DispatchForm initial={dispatchModal} skus={skus} clients={clients} onSave={saveDispatch} onClose={()=>setDispatchModal(null)}/>}
  </>
}

function RMOrderForm({skus,vendors,initial,onSave,onClose}){
  const blank={date:todayISO(),mill:'',vendor:'',sku:'',rmForBoxes:'',rmKG:'',buyKG:'',expectedDate:addDays(4),status:'Ordered',remarks:''};
  const [f,setF]=useState({...blank,...(initial||{})});
  const set=(k,v)=>setF(p=>{
    const u={...p,[k]:v};
    const sku=skus.find(s=>s.name===u.sku);
    if(k==='sku' && sku){u.buyKG=sku.buyKG||u.buyKG;}
    if((k==='sku'||k==='rmForBoxes') && sku && safeNum(u.rmForBoxes)>0){
      const ideal=safeNum(sku.idealWastage)/100;
      u.rmKG=Math.round(safeNum(u.rmForBoxes)*safeNum(sku.stdWeight)/(1-ideal));
    }
    return u;
  });
  const rmValue=safeNum(f.rmKG)*safeNum(f.buyKG);
  return <Modal title={f.id?'Edit Mill RM Order':'Add RM Order to Mill'} onClose={onClose} wide>
    <div className="form-grid">
      <Field label="RM Order Date"><Input type="date" value={f.date} onChange={v=>set('date',v)}/></Field>
      <Field label="Mill Name"><Input value={f.mill} onChange={v=>set('mill',v)} placeholder="e.g. Karnataka Paper Mills"/></Field>
      <Field label="Dedicated Vendor / Job Worker"><Select value={f.vendor} onChange={v=>set('vendor',v)} options={vendors.map(v=>v.name)}/></Field>
      <Field label="SKU / Box for which RM is ordered"><Select value={f.sku} onChange={v=>set('sku',v)} options={skus.map(s=>s.name)}/></Field>
      <Field label="RM Ordered for Box Count (PCS)"><Input type="number" value={f.rmForBoxes} onChange={v=>set('rmForBoxes',v)} placeholder="e.g. 20000 boxes"/></Field>
      <Field label="Estimated RM KG"><Input type="number" value={f.rmKG} onChange={v=>set('rmKG',v)}/></Field>
      <Field label="Buying Cost / KG"><Input type="number" value={f.buyKG} onChange={v=>set('buyKG',v)}/></Field>
      <Field label="Expected RM Arrival"><Input type="date" value={f.expectedDate} onChange={v=>set('expectedDate',v)}/></Field>
      <Field label="Status"><Select value={f.status} onChange={v=>set('status',v)} options={['Ordered','In Transit','Received','Cancelled']}/></Field>
      <Field label="Remarks"><Input value={f.remarks} onChange={v=>set('remarks',v)}/></Field>
    </div>
    <div className="calc-strip"><div className="calc-item"><label>RM for Boxes</label><strong>{fN(f.rmForBoxes)} PCS</strong></div><div className="calc-item"><label>Estimated RM</label><strong>{fN(f.rmKG)} KG</strong></div><div className="calc-item"><label>RM Value</label><strong>{fC(rmValue)}</strong></div><div className="calc-item"><label>Dedicated To</label><strong>{f.vendor||'Vendor not selected'}</strong></div></div>
    <div className="actions" style={{justifyContent:'flex-end',marginTop:18}}><Button variant="secondary" onClick={onClose}>Cancel</Button><Button onClick={()=>onSave(f)}>{f.id?'Update RM Order':'Save RM Order'}</Button></div>
  </Modal>
}

function RMOrderDetail({rm,onEdit,onClose}){
  return <Modal title={`Mill RM Order Detail - ${rm.id}`} onClose={onClose}>
    <div className="detail-grid">
      <div className="detail"><label>Mill</label><strong>{rm.mill}</strong></div><div className="detail"><label>Dedicated Vendor</label><strong>{rm.vendor}</strong></div><div className="detail"><label>SKU</label><strong>{rm.sku}</strong></div><div className="detail"><label>Status</label><strong><Badge color={rm.status==='Received'?'green':rm.status==='Cancelled'?'red':'amber'}>{rm.status}</Badge></strong></div>
      <div className="detail"><label>RM For Boxes</label><strong>{fN(rm.rmForBoxes)} PCS</strong></div><div className="detail"><label>RM KG</label><strong>{fN(rm.rmKG)} KG</strong></div><div className="detail"><label>Buying Cost</label><strong>{fC(rm.buyKG)}/KG</strong></div><div className="detail"><label>Expected Arrival</label><strong>{rm.expectedDate}</strong></div>
    </div>
    <div className="actions" style={{justifyContent:'flex-end',marginTop:18}}><Button variant="secondary" onClick={onClose}>Close</Button><Button onClick={()=>onEdit(rm)}>Edit RM Order</Button></div>
  </Modal>
}

function InventoryPage({skus,setSkus,vendors,rmOrders,setRmOrders,metrics}){
  const [selectedOrder,setSelectedOrder]=useState(null);
  const [selectedRM,setSelectedRM]=useState(null);
  const [rmModal,setRmModal]=useState(null);
  const [skuFilter,setSkuFilter]=useState('All');
  const setDaily=(id,val)=>setSkus(p=>p.map(s=>s.id===id?{...s,dailyUse:val}:s));
  const setOpening=(id,val)=>setSkus(p=>p.map(s=>s.id===id?{...s,openingStockPCS:val}:s));
  const saveRMOrder=(row)=>{ if(row.id){setRmOrders(p=>p.map(r=>r.id===row.id?row:r))} else {setRmOrders(p=>[{...row,id:genId('M',p)},...p])} setRmModal(null); setSelectedRM(null); };
  const {totals,skuRows,orderRows}=metrics;
  const prodForSku=(s)=>orderRows.filter(o=>o.sku===s.name && !['Closed','Cancelled'].includes(o.status));
  const filteredSkuRows=skuFilter==='All'?skuRows:skuRows.filter(s=>s.name===skuFilter);

  const statusStyle=(color)=>({
    red:{bg:'#fef2f2',border:'#fca5a5',badge:'#ef4444',badgeBg:'#fee2e2',badgeText:'#991b1b'},
    amber:{bg:'#fffbeb',border:'#fcd34d',badge:'#d97706',badgeBg:'#fef3c7',badgeText:'#92400e'},
    green:{bg:'#f0fdf4',border:'#86efac',badge:'#16a34a',badgeBg:'#dcfce7',badgeText:'#14532d'},
  }[color]||{bg:'#f8fafc',border:'#e2e8f0',badge:'#64748b',badgeBg:'#f1f5f9',badgeText:'#334155'});

  return <>
    <PageHead title="Inventory Control" sub="Per-SKU health · Stock · Production · Orders · Days cover">
      <select className="sel" style={{width:180,height:30,padding:'4px 8px',fontSize:12,borderRadius:7}} value={skuFilter} onChange={e=>setSkuFilter(e.target.value)}>
        <option value="All">All SKUs</option>
        {skuRows.map(s=><option key={s.id} value={s.name}>{s.name}</option>)}
      </select>
      <Button variant="secondary" onClick={()=>exportCSV([...skuRows],'inventory_control.csv')}>⬇ Export</Button>
      <Button variant="primary" onClick={()=>setRmModal({})}>+ Add Mill RM Order</Button>
    </PageHead>

    {/* KPI bar */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:6,marginBottom:12}}>
      {[
        {label:'In Stock',val:fN(totals.onHand),sub:'Live FG',icon:'📦',c:'green'},
        {label:'In Production',val:fN(totals.placed),sub:'Pending from vendors',icon:'🏭',c:'amber'},
        {label:'RM Pipeline',val:fN(totals.rmPendingBoxes),sub:'Boxes at mills',icon:'🧻',c:'purple'},
        {label:'Total Available',val:fN(totals.available),sub:'Stock + prod',icon:'📊',c:'blue'},
        {label:'Orders Pending',val:fN(totals.customerPending),sub:'To dispatch',icon:'🚚',c:'red'},
        {label:'Daily Use',val:fN(totals.daily),sub:'PCS/day',icon:'📉',c:''},
      ].map(k=><div key={k.label} className={`kpi compact-kpi-grid ${k.c}`} style={{padding:'9px 12px',borderRadius:10}}>
        <div className="top"><div><label style={{fontSize:9}}>{k.label}</label><strong style={{fontSize:15}}>{k.val}</strong><small>{k.sub}</small></div><div className="icon" style={{fontSize:18}}>{k.icon}</div></div>
      </div>)}
    </div>

    {/* SKU Cards */}
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {filteredSkuRows.map(s=>{
        const st=statusStyle(s.color);
        const prod=prodForSku(s);
        const totalOrd=metrics.customerOrderRows.filter(co=>co.sku===s.name&&co.status!=='Cancelled').reduce((a,co)=>a+safeNum(co.totalQtyPCS),0);
        const pendDisp=metrics.customerOrderRows.filter(co=>co.sku===s.name&&co.status!=='Cancelled').reduce((a,co)=>a+safeNum(co.pendingDispatch),0);
        const need7=safeNum(s.dailyUse)*7;
        const stockW=need7>0?Math.min(100,s.onHandPCS/need7*100):100;
        const prodW=need7>0?Math.min(100,(s.onHandPCS+s.placedPCS)/need7*100):100;
        return <div key={s.id} style={{background:st.bg,border:`1px solid ${st.border}`,borderRadius:12,padding:'12px 14px',display:'grid',gridTemplateColumns:'180px 1fr 1fr 1fr 1fr 1fr 1fr',gap:10,alignItems:'center'}}>

          {/* Col 1: SKU identity */}
          <div>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:800,color:'#0f172a',marginBottom:2}}>{s.name}</div>
            <div style={{fontSize:10,color:'#64748b',fontWeight:600,marginBottom:6}}>{s.client} · {s.ply}</div>
            <span style={{background:st.badgeBg,color:st.badgeText,fontSize:9,fontWeight:900,textTransform:'uppercase',padding:'2px 7px',borderRadius:99,letterSpacing:.3}}>{s.alert}</span>
          </div>

          {/* Col 2: Stock */}
          <div style={{background:'rgba(255,255,255,.65)',borderRadius:9,padding:'8px 10px'}}>
            <div style={{fontSize:9,fontWeight:900,textTransform:'uppercase',color:'#94a3b8',letterSpacing:.4,marginBottom:3}}>📦 In Stock</div>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:18,fontWeight:800,color:'#059669',lineHeight:1}}>{fN(s.onHandPCS)}</div>
            <div style={{fontSize:9,color:'#94a3b8',marginTop:3}}>PCS live</div>
            <input className="inp" style={{width:'100%',marginTop:6,padding:'3px 6px',fontSize:11,height:24,borderRadius:5}} type="number" value={s.openingStockPCS} onChange={e=>setOpening(s.id,e.target.value)} title="Opening stock"/>
            <div style={{fontSize:9,color:'#94a3b8',marginTop:2}}>Opening stock</div>
          </div>

          {/* Col 3: In Production */}
          <div style={{background:'rgba(255,255,255,.65)',borderRadius:9,padding:'8px 10px'}}>
            <div style={{fontSize:9,fontWeight:900,textTransform:'uppercase',color:'#94a3b8',letterSpacing:.4,marginBottom:3}}>🏭 In Production</div>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:18,fontWeight:800,color:'#d97706',lineHeight:1}}>{fN(s.placedPCS)}</div>
            <div style={{fontSize:9,color:'#94a3b8',marginTop:3}}>{prod.length} order{prod.length!==1?'s':''}</div>
            <div style={{marginTop:5,display:'flex',flexWrap:'wrap',gap:3}}>
              {prod.map(o=><button key={o.id} onClick={()=>setSelectedOrder(o)} style={{background:'#fef3c7',color:'#92400e',border:'1px solid #fcd34d',borderRadius:4,padding:'1px 5px',fontSize:9,fontWeight:700,cursor:'pointer'}}>{o.id}: {fN(o.pendingFG)}</button>)}
            </div>
          </div>

          {/* Col 4: Total Orders */}
          <div style={{background:'rgba(255,255,255,.65)',borderRadius:9,padding:'8px 10px'}}>
            <div style={{fontSize:9,fontWeight:900,textTransform:'uppercase',color:'#94a3b8',letterSpacing:.4,marginBottom:3}}>📋 Orders</div>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:18,fontWeight:800,color:'#1d4ed8',lineHeight:1}}>{fN(totalOrd)}</div>
            <div style={{fontSize:9,color:'#94a3b8',marginTop:3}}>Total demand</div>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:800,color:pendDisp>0?'#ef4444':'#16a34a',marginTop:4}}>{fN(pendDisp)} PCS</div>
            <div style={{fontSize:9,color:'#94a3b8'}}>Pending dispatch</div>
          </div>

          {/* Col 5: 7-Day Need + Daily */}
          <div style={{background:'rgba(255,255,255,.65)',borderRadius:9,padding:'8px 10px'}}>
            <div style={{fontSize:9,fontWeight:900,textTransform:'uppercase',color:'#94a3b8',letterSpacing:.4,marginBottom:3}}>📅 7-Day Need</div>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:18,fontWeight:800,color:'#475569',lineHeight:1}}>{fN(s.safety)}</div>
            <div style={{fontSize:9,color:'#94a3b8',marginTop:3}}>PCS required</div>
            <div style={{display:'flex',alignItems:'center',gap:4,marginTop:6}}>
              <input className="inp" style={{flex:1,padding:'3px 5px',fontSize:11,height:24,borderRadius:5}} type="number" value={s.dailyUse} onChange={e=>setDaily(s.id,e.target.value)} title="Daily use"/>
              <span style={{fontSize:9,color:'#94a3b8',fontWeight:700,whiteSpace:'nowrap'}}>PCS/day</span>
            </div>
          </div>

          {/* Col 6: Days Cover bar */}
          <div style={{background:'rgba(255,255,255,.65)',borderRadius:9,padding:'8px 10px'}}>
            <div style={{fontSize:9,fontWeight:900,textTransform:'uppercase',color:'#94a3b8',letterSpacing:.4,marginBottom:3}}>⏱ Days Cover</div>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:18,fontWeight:800,color:s.days<7?'#ef4444':s.days<14?'#d97706':'#16a34a',lineHeight:1}}>{fN(s.days,1)}</div>
            <div style={{fontSize:9,color:'#94a3b8',marginTop:3}}>days stock</div>
            <div style={{height:5,background:'#e2e8f0',borderRadius:99,marginTop:6,overflow:'hidden',position:'relative'}}>
              <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${stockW}%`,background:s.color==='red'?'#ef4444':s.color==='amber'?'#f59e0b':'#22c55e',borderRadius:99}}></div>
              {prodW>stockW&&<div style={{position:'absolute',left:`${stockW}%`,top:0,height:'100%',width:`${prodW-stockW}%`,background:'#fde68a',borderRadius:99}}></div>}
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:3}}>
              <span style={{fontSize:8,color:'#94a3b8'}}>+Prod: {fN(s.totalCover,1)}d</span>
              <span style={{fontSize:8,color:'#94a3b8'}}>+RM: {fN(s.futureCover,1)}d</span>
            </div>
          </div>

          {/* Col 7: RM + actions */}
          <div style={{background:'rgba(255,255,255,.65)',borderRadius:9,padding:'8px 10px'}}>
            <div style={{fontSize:9,fontWeight:900,textTransform:'uppercase',color:'#94a3b8',letterSpacing:.4,marginBottom:3}}>🧻 Mill RM</div>
            {s.rmLines?.length?<div style={{display:'flex',flexWrap:'wrap',gap:3,marginBottom:4}}>
              {s.rmLines.map(r=><button key={r.id} onClick={()=>setSelectedRM(r)} style={{background:r.status==='Received'?'#dcfce7':'#fef3c7',color:r.status==='Received'?'#166534':'#92400e',border:`1px solid ${r.status==='Received'?'#86efac':'#fcd34d'}`,borderRadius:4,padding:'1px 5px',fontSize:9,fontWeight:700,cursor:'pointer'}}>{r.id}: {fN(r.rmForBoxes)}</button>)}
            </div>:<div style={{fontSize:9,color:'#cbd5e1',fontWeight:700,marginBottom:4}}>No RM order</div>}
            <button onClick={()=>setRmModal({sku:s.name,buyKG:s.buyKG})} style={{background:'#6366f1',color:'#fff',border:0,borderRadius:5,padding:'3px 8px',fontSize:9,fontWeight:800,cursor:'pointer',width:'100%'}}>+ Add RM</button>
          </div>
        </div>
      })}
    </div>

    {rmModal&&<RMOrderForm skus={skus} vendors={vendors} initial={rmModal.id?rmModal:rmModal} onSave={saveRMOrder} onClose={()=>setRmModal(null)}/>}
    {selectedRM&&<RMOrderDetail rm={selectedRM} onEdit={(r)=>{setSelectedRM(null);setRmModal(r)}} onClose={()=>setSelectedRM(null)}/>}
    {selectedOrder&&<OrderDetail order={selectedOrder} metrics={metrics} skus={skus} onClose={()=>setSelectedOrder(null)}/>}
  </>
}

function JobWorkPage({orders,receipts,setReceipts,metrics,skus}){
  const [modal,setModal]=useState(null);
  const saveReceipt=(row)=>{setReceipts(p=>[{...row,id:genId('R',p)},...p]);setModal(null)};
  const rows=metrics.orderRows.filter(o=>o.type==='Job Work'||safeNum(o.issuedKG)>0);
  const cols=[
    {key:'id',label:'Order',render:o=><span className="num blue-t">{o.id}</span>},
    {key:'vendor',label:'Vendor / SKU',render:o=><><b>{o.vendor}</b><br/><span className="tiny">{o.sku}</span></>},
    {key:'issued',label:'Issued RM KG',render:o=><span className="num amber-t">{fN(o.issuedKG)} KG</span>},
    {key:'receivedKg',label:'Received Goods KG',render:o=><span className="num green-t">{fN(o.receivedKG)} KG</span>},
    {key:'receivedPcs',label:'Received Goods PCS',render:o=><span className="num green-t">{fN(o.receivedPCS)} PCS</span>},
    {key:'wastage',label:'RM vs FG Difference',render:o=><><span className={`num ${o.wastagePct>5?'red-t':'green-t'}`}>{fN(o.wastageKG)} KG</span><br/><span className="tiny">{fP(o.wastagePct)} wastage</span></>},
    {key:'expected',label:'Pending FG',render:o=><span className={`num ${o.pendingFG?'red-t':'green-t'}`}>{fN(o.pendingFG)} PCS</span>},
    {key:'action',label:'Action',render:o=><Button variant="secondary" onClick={()=>setModal(o)}>+ Add Receipt</Button>},
  ];
  return <>
    <PageHead title="Job Work: RM Issued vs FG Received" sub="Track raw material sent to vendor in KG, finished goods received in KG and PCS, and stock update">
      <Badge color="purple">RM → FG Control</Badge>
    </PageHead>
    <div className="grid kpi-grid" style={{gridTemplateColumns:'repeat(4,minmax(180px,1fr))'}}>
      <KPI label="Total RM Issued" value={`${fN(metrics.totals.rmIssued)} KG`} sub="Sent to job workers" icon="📤" color="amber"/>
      <KPI label="FG Received KG" value={`${fN(metrics.totals.fgReceivedKG)} KG`} sub="Received from vendors" icon="📥" color="green"/>
      <KPI label="FG Received PCS" value={fN(metrics.totals.fgReceivedPCS)} sub="Added to stock" icon="📦" color="blue"/>
      <KPI label="RM Difference" value={`${fN(Math.max(0,metrics.totals.rmIssued-metrics.totals.fgReceivedKG))} KG`} sub="Check wastage/shortage" icon="⚖️" color="red"/>
    </div>
    <DataTable columns={cols} data={rows} searchText="Search job work order..." />
    {modal&&<ReceiptForm order={modal} skus={skus} onSave={saveReceipt} onClose={()=>setModal(null)}/>} 
  </>
}

function DispatchPage({skus,clients,setDispatches,metrics}){
  const [modal,setModal]=useState(null);
  const saveDispatch=(row)=>{setDispatches(p=>[{...row,id:genId('D',p)},...p]);setModal(null)};
  const orderCols=[
    {key:'id',label:'Order',render:o=><span className="num blue-t">{o.id}</span>},
    {key:'client',label:'Client / SKU',render:o=><><b>{o.client}</b><br/><span className="tiny">{o.sku} {o.orderRef?'· '+o.orderRef:''}</span></>},
    {key:'total',label:'Order Qty',render:o=><span className="num">{fN(o.totalQtyPCS)} PCS</span>},
    {key:'done',label:'Dispatched Qty',render:o=><span className="num green-t">{fN(o.dispatchedPCS)} PCS</span>},
    {key:'pending',label:'Pending Dispatch',render:o=><><span className={`num ${o.pendingDispatch?'red-t':'green-t'}`}>{fN(o.pendingDispatch)} PCS</span><Progress pct={o.progress} color={o.progress<40?'red':o.progress<80?'amber':'green'}/></>},
    {key:'stock',label:'Stock Available',render:o=>{const s=metrics.skuRows.find(x=>x.name===o.sku);return <span className="num blue-t">{fN(s?.onHandPCS||0)} PCS</span>}},
    {key:'clientDate',label:'Client Delivery',render:o=><span className="tiny">{o.splits?.filter(s=>s.status==='Pending').map(s=>s.date).join(', ')||'—'}</span>},
    {key:'action',label:'Action',render:o=><Button variant="blue" onClick={()=>setModal({customerOrderId:o.id,client:o.client,sku:o.sku,qtyPCS:o.pendingDispatch,sellPCS:o.sellPCS,remarks:`Dispatch against ${o.id}`})} disabled={o.pendingDispatch<=0}>Dispatch</Button>},
  ];
  const dispatchCols=[
    {key:'id',label:'Dispatch',render:d=><span className="num blue-t">{d.id}</span>},
    {key:'date',label:'Date'}, 
    {key:'customerOrderId',label:'Order',render:d=><span className="num">{metrics.dispatchCustomerOrderMap?.[d.id]||d.customerOrderId||d.orderId||'—'}</span>}, 
    {key:'client',label:'Client'}, 
    {key:'sku',label:'SKU'},
    {key:'qty',label:'Qty',render:d=><>{fN(d.qtyPCS)} PCS<br/><span className="tiny">{fN(d.qtyKG)} KG</span></>},
    {key:'sales',label:'Sales',render:d=><span className="num green-t">{fC(d.revenue)}</span>},
    {key:'invoice',label:'Invoice'},
  ];
  return <>
    <PageHead title="Dispatch Control" sub="Dispatch against customer orders — tracks Pending Dispatch and updates Customer Order balance">
      <Button variant="primary" onClick={()=>setModal({})}>+ Direct Dispatch</Button>
    </PageHead>
    <Card title="Customer Order-wise Dispatch Pending"><DataTable columns={orderCols} data={metrics.customerOrderRows.filter(o=>o.status!=='Cancelled')} searchText="Search customer order, client, SKU..." /></Card>
    <div style={{height:16}}></div>
    <Card title="Dispatch History"><DataTable columns={dispatchCols} data={metrics.dispatchPnL} searchText="Search dispatch history..." /></Card>
    {modal&&<DispatchForm order={null} skus={skus} clients={clients} initial={modal} onSave={saveDispatch} onClose={()=>setModal(null)}/>} 
  </>
}

function PnLPage({metrics}){
  const cols=[
    {key:'id',label:'Dispatch',render:r=><span className="num blue-t">{r.id}</span>}, {key:'date',label:'Date'}, {key:'orderId',label:'Order'},
    {key:'sku',label:'SKU / Client',render:r=><><b>{r.sku}</b><br/><span className="tiny">{r.client}</span></>},
    {key:'qty',label:'Qty',render:r=><>{fN(r.qtyPCS)} PCS<br/><span className="tiny">{fN(r.qtyKG)} KG</span></>},
    {key:'sales',label:'Selling Value',render:r=><span className="num green-t">{fC(r.revenue)}</span>},
    {key:'material',label:'Buying Cost',render:r=>fC(r.materialCost)},
    {key:'mfg',label:'Mfg / Job Work',render:r=>fC(r.mfgCost)},
    {key:'logistics',label:'Logistics',render:r=>fC(r.logistics)},
    {key:'profit',label:'Profit / Loss',render:r=><><span className={`num ${r.profit>=0?'green-t':'red-t'}`}>{fC(r.profit)}</span><br/><span className="tiny">{fP(r.margin)} margin</span></>},
  ];
  return <>
    <PageHead title="Profit & Loss" sub="P&L calculated from selling value minus buying cost, job-work/mfg cost and logistics">
      <Button variant="secondary" onClick={()=>exportCSV(metrics.dispatchPnL,'profit_loss.csv')}>⬇ Export P&L</Button>
    </PageHead>
    <div className="grid kpi-grid" style={{gridTemplateColumns:'repeat(4,minmax(180px,1fr))'}}>
      <KPI label="Total Sales" value={fC(metrics.totals.sales)} sub="Dispatch value" icon="💵" color="green"/>
      <KPI label="Total Cost" value={fC(metrics.totals.cost)} sub="Buying + mfg + logistics" icon="🧾" color="amber"/>
      <KPI label="Net Profit" value={fC(metrics.totals.profit)} sub={`${fP(metrics.totals.sales?metrics.totals.profit/metrics.totals.sales*100:0)} margin`} icon="📈" color={metrics.totals.profit>=0?'green':'red'}/>
      <KPI label="Dispatches" value={metrics.dispatchPnL.length} sub="P&L lines" icon="🚚" color="blue"/>
    </div>
    <DataTable columns={cols} data={metrics.dispatchPnL} searchText="Search P&L..." />
  </>
}


function CalendarPage({metrics}){
  const parseISO=(iso)=>{const [y,m,d]=String(iso||todayISO()).split('-').map(Number);return new Date(y,(m||1)-1,d||1)};
  const fmt=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const datePlus=(iso,days)=>{const d=parseISO(iso);d.setDate(d.getDate()+days);return fmt(d)};
  const isWeekend=(iso)=>{const wd=parseISO(iso).getDay();return wd===0||wd===6};
  const isMon=(iso)=>parseISO(iso).getDay()===1;
  const pretty=(iso)=>parseISO(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
  const prettyFull=(iso)=>parseISO(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'2-digit',year:'numeric'});
  const weekHdr=(iso)=>{const d=parseISO(iso);const e=new Date(d);e.setDate(d.getDate()+6);return `Week · ${d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})} – ${e.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}`};
  const today=todayISO();
  const sc=(s)=>{const sl=String(s||'').toLowerCase();if(sl==='planned')return 's-planned';if(sl==='pending')return 's-pending';if(sl.includes('confirm')||sl.includes('approved'))return 's-confirmed';return 's-default'};

  const [startDate,setStartDate]=useState(todayISO());
  const [filter,setFilter]=useState('All');
  const [skuFilter,setSkuFilter]=useState('All');
  const [sortField,setSortField]=useState('date');
  const [sortDir,setSortDir]=useState('asc');
  const [viewMode,setViewMode]=useState('grid');
  const [hideEmpty,setHideEmpty]=useState(false);
  const [tableSearch,setTableSearch]=useState('');

  // Always show exactly 15 days from startDate
  const dateList=useMemo(()=>{
    const out=[];const d=new Date(parseISO(startDate));
    for(let i=0;i<15;i++){out.push(fmt(d));d.setDate(d.getDate()+1)}
    return out;
  },[startDate]);
  const endDate=dateList[dateList.length-1];

  const allSkus=useMemo(()=>{
    const s=new Set();
    metrics.vendorSplitRows.forEach(v=>s.add(v.sku));
    metrics.customerSplitRows.forEach(c=>s.add(c.sku));
    metrics.orderRows.forEach(o=>s.add(o.sku));
    return ['All',...Array.from(s).filter(Boolean).sort()];
  },[metrics]);

  const events=useMemo(()=>{
    const list=[];
    const vs=metrics.vendorSplitRows.filter(v=>!['Cancelled','Received','Done'].includes(v.status) && safeNum(v.pendingPCS)>0);
    if(vs.length){vs.forEach(v=>list.push({date:v.date,kind:'receive',party:v.vendor,sku:v.sku,qty:safeNum(v.pendingPCS)||safeNum(v.qtyPCS),ref:v.vendorOrderId,status:v.status,type:'Receive from Vendor'}));}
    else{metrics.orderRows.filter(o=>!['Cancelled','Closed'].includes(o.status)).forEach(o=>{const q=safeNum(o.pendingFG)||safeNum(o.expectedPCS)||safeNum(o.orderQtyPCS);if(o.vendorDeliveryDate&&q>0)list.push({date:o.vendorDeliveryDate,kind:'receive',party:o.vendor,sku:o.sku,qty:q,ref:o.id,status:o.status,type:'Receive from Vendor'});});}
    const cs=metrics.customerSplitRows.filter(s=>!['Cancelled','Dispatched'].includes(s.status));
    if(cs.length){cs.forEach(s=>list.push({date:s.date,kind:'dispatch',party:s.client,sku:s.sku,qty:safeNum(s.pendingPCS)||safeNum(s.qtyPCS),ref:s.customerOrderId,status:s.status,type:'Dispatch to Client'}));}
    else{metrics.orderRows.filter(o=>!['Cancelled','Closed'].includes(o.status)).forEach(o=>{const q=safeNum(o.pendingDispatch)||safeNum(o.orderQtyPCS);if(o.clientDeliveryDate&&q>0)list.push({date:o.clientDeliveryDate,kind:'dispatch',party:o.client,sku:o.sku,qty:q,ref:o.id,status:'Pending',type:'Dispatch to Client'});});}
    return list;
  },[metrics.orderRows,metrics.customerSplitRows,metrics.vendorSplitRows]);

  const visible=events.filter(e=>dateList.includes(e.date)&&(filter==='All'||e.type===filter)&&(skuFilter==='All'||e.sku===skuFilter)).sort((a,b)=>a.date.localeCompare(b.date)||a.kind.localeCompare(b.kind));
  const recPCS=visible.filter(e=>e.kind==='receive').reduce((a,e)=>a+safeNum(e.qty),0);
  const disPCS=visible.filter(e=>e.kind==='dispatch').reduce((a,e)=>a+safeNum(e.qty),0);
  const activeDays=dateList.filter(dt=>visible.some(e=>e.date===dt)).length;
  const shownDates=hideEmpty?dateList.filter(dt=>visible.some(e=>e.date===dt)):dateList;

  const weeks=useMemo(()=>{
    const rows=[];let cur=[];
    shownDates.forEach((dt,i)=>{
      if((isMon(dt)||i===0)&&cur.length>0){rows.push({label:weekHdr(cur[0]),dates:cur});cur=[]}
      cur.push(dt);
    });
    if(cur.length)rows.push({label:weekHdr(cur[0]),dates:cur});
    return rows;
  },[shownDates]);

  // ALL events (no date window filter) — used by SKU Plan to show complete data
  const allEvents=useMemo(()=>{
    const list=[];
    const vs=metrics.vendorSplitRows.filter(v=>!['Cancelled','Received','Done'].includes(v.status) && safeNum(v.pendingPCS)>0);
    if(vs.length){vs.forEach(v=>list.push({date:v.date,kind:'receive',party:v.vendor,sku:v.sku,qty:safeNum(v.pendingPCS)||safeNum(v.qtyPCS),ref:v.vendorOrderId,status:v.status,type:'Receive from Vendor'}));}
    else{metrics.orderRows.filter(o=>!['Cancelled','Closed'].includes(o.status)).forEach(o=>{const q=safeNum(o.pendingFG)||safeNum(o.expectedPCS)||safeNum(o.orderQtyPCS);if(o.vendorDeliveryDate&&q>0)list.push({date:o.vendorDeliveryDate,kind:'receive',party:o.vendor,sku:o.sku,qty:q,ref:o.id,status:o.status,type:'Receive from Vendor'});});}
    const cs=metrics.customerSplitRows.filter(s=>!['Cancelled','Dispatched'].includes(s.status));
    if(cs.length){cs.forEach(s=>list.push({date:s.date,kind:'dispatch',party:s.client,sku:s.sku,qty:safeNum(s.pendingPCS)||safeNum(s.qtyPCS),ref:s.customerOrderId,status:s.status,type:'Dispatch to Client'}));}
    else{metrics.orderRows.filter(o=>!['Cancelled','Closed'].includes(o.status)).forEach(o=>{const q=safeNum(o.pendingDispatch)||safeNum(o.orderQtyPCS);if(o.clientDeliveryDate&&q>0)list.push({date:o.clientDeliveryDate,kind:'dispatch',party:o.client,sku:o.sku,qty:q,ref:o.id,status:'Pending',type:'Dispatch to Client'});});}
    return list;
  },[metrics.orderRows,metrics.customerSplitRows,metrics.vendorSplitRows]);

  // ── SKU Plan table: all dates, one row per date+SKU ──
  const skuPlanRows=useMemo(()=>{
    const src=allEvents.filter(e=>(filter==='All'||e.type===filter)&&(skuFilter==='All'||e.sku===skuFilter));
    const map={};
    src.forEach(e=>{
      const key=`${e.date}||${e.sku}`;
      if(!map[key])map[key]={date:e.date,sku:e.sku,dispatch:0,receive:0,receiveFrom:new Set(),dispatchTo:new Set(),dispatchStatus:'',receiveStatus:''};
      if(e.kind==='dispatch'){map[key].dispatch+=safeNum(e.qty);map[key].dispatchTo.add(e.party);map[key].dispatchStatus=e.status||''}
      if(e.kind==='receive'){map[key].receive+=safeNum(e.qty);map[key].receiveFrom.add(e.party);map[key].receiveStatus=e.status||''}
    });
    let rows=Object.values(map).map(r=>({...r,receiveFrom:Array.from(r.receiveFrom).join(', '),dispatchTo:Array.from(r.dispatchTo).join(', ')}));
    if(tableSearch)rows=rows.filter(r=>JSON.stringify(r).toLowerCase().includes(tableSearch.toLowerCase()));
    rows.sort((a,b)=>{
      let va=a[sortField]??'', vb=b[sortField]??'';
      if(sortField==='dispatch'||sortField==='receive'){va=Number(va);vb=Number(vb)}
      const cmp=va<vb?-1:va>vb?1:0;
      return sortDir==='asc'?cmp:-cmp;
    });
    return rows;
  },[allEvents,filter,skuFilter,sortField,sortDir,tableSearch]);

  const toggleSort=(f)=>{if(sortField===f){setSortDir(d=>d==='asc'?'desc':'asc')}else{setSortField(f);setSortDir('asc')}};
  const sortIcon=(f)=>sortField===f?(sortDir==='asc'?'▲':'▼'):'⇅';

  const skuPlanCols=[
    {key:'date',label:'Date'},
    {key:'sku',label:'SKU'},
    {key:'dispatch',label:'Dispatch (PCS)'},
    {key:'receive',label:'Receive (PCS)'},
    {key:'receiveFrom',label:'Receive From'},
    {key:'dispatchTo',label:'Dispatch To'},
    {key:'dispatchStatus',label:'Dispatch Status'},
    {key:'receiveStatus',label:'Receive Status'},
  ];

  return <div className="cal-page">
    {/* Title + controls */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6,flexWrap:'wrap',gap:6}}>
      <div>
        <h2 style={{fontFamily:"'Sora',sans-serif",fontSize:17,fontWeight:800,letterSpacing:'-.4px',color:'#0f172a'}}>15-Day Delivery Planner</h2>
        <p style={{fontSize:11,color:'#64748b',marginTop:1}}>{viewMode==='skuplan'?'All planned delivery dates · full pipeline':'Grid: '+pretty(dateList[0])+' → '+pretty(endDate)+' · 15 days · '+activeDays+' active'}</p>
      </div>
      <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
        {/* Single start-date picker — end date auto = start + 15 */}
        <div style={{display:'flex',alignItems:'center',gap:5,background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:8,padding:'3px 8px'}}>
          <span style={{fontSize:10,fontWeight:800,color:'#64748b',whiteSpace:'nowrap'}}>From</span>
          <input className="inp" style={{width:118,padding:'2px 6px',fontSize:11,height:24,borderRadius:5,border:'none',background:'transparent'}} type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}/>
          <span style={{fontSize:10,fontWeight:700,color:'#94a3b8'}}>→ +15 days</span>
        </div>
        <select className="sel" style={{width:155,padding:'4px 8px',fontSize:11,height:28,borderRadius:7}} value={filter} onChange={e=>setFilter(e.target.value)}>
          <option>All</option><option>Receive from Vendor</option><option>Dispatch to Client</option>
        </select>
        <select className="sel" style={{width:145,padding:'4px 8px',fontSize:11,height:28,borderRadius:7}} value={skuFilter} onChange={e=>setSkuFilter(e.target.value)}>
          {allSkus.map(s=><option key={s}>{s}</option>)}
        </select>
        <button className="btn secondary" style={{fontSize:11,padding:'4px 9px',height:28,borderRadius:7}} onClick={()=>setStartDate(todayISO())}>↺ Today</button>
        <button className="btn secondary" style={{fontSize:11,padding:'4px 9px',height:28,borderRadius:7}} onClick={()=>exportCSV(skuPlanRows,'delivery_plan.csv')}>⬇ CSV</button>
      </div>
    </div>

    {/* KPI strip */}
    <div className="cal-strip">
      <div className="cal-strip-item"><span className="csi-icon">🗓️</span><div><div className="csi-label">Window</div><div className="csi-val cv-dark">15 Days</div><div className="csi-sub">{activeDays} active · {15-activeDays} idle</div></div></div>
      <div className="cal-strip-item"><span className="csi-icon">🚚</span><div><div className="csi-label">Outbound</div><div className="csi-val cv-green">{fN(disPCS)} PCS</div><div className="csi-sub">{visible.filter(e=>e.kind==='dispatch').length} client dispatches</div></div></div>
      <div className="cal-strip-item"><span className="csi-icon">📥</span><div><div className="csi-label">Inbound</div><div className="csi-val cv-blue">{fN(recPCS)} PCS</div><div className="csi-sub">{visible.filter(e=>e.kind==='receive').length} vendor shipments</div></div></div>
      <div className="cal-strip-item"><span className="csi-icon">📦</span><div><div className="csi-label">Total Movement</div><div className="csi-val cv-purple">{fN(recPCS+disPCS)} PCS</div><div className="csi-sub">{visible.length} events</div></div></div>
    </div>

    {/* Toolbar */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7,gap:8,flexWrap:'wrap'}}>
      <div className="tabs" style={{padding:3}}>
        <button className={viewMode==='grid'?'active':''} style={{padding:'4px 10px',fontSize:11}} onClick={()=>setViewMode('grid')}>📅 Grid</button>
        <button className={viewMode==='skuplan'?'active':''} style={{padding:'4px 10px',fontSize:11}} onClick={()=>setViewMode('skuplan')}>📊 SKU Plan</button>
      </div>
      <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        {viewMode==='grid'&&<label style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer',userSelect:'none',fontSize:11,fontWeight:700,color:'#475569'}}>
          <input type="checkbox" checked={hideEmpty} onChange={e=>setHideEmpty(e.target.checked)} style={{accentColor:'#6366f1',width:12,height:12}}/>Hide idle days
        </label>}
        <span style={{fontSize:10,color:'#94a3b8',fontWeight:800,display:'flex',alignItems:'center',gap:4}}><span style={{width:9,height:9,borderRadius:'50%',background:'#059669',display:'inline-block'}}></span>Dispatch</span>
        <span style={{fontSize:10,color:'#94a3b8',fontWeight:800,display:'flex',alignItems:'center',gap:4}}><span style={{width:9,height:9,borderRadius:'50%',background:'#1d4ed8',display:'inline-block'}}></span>Receive</span>
        <span style={{fontSize:10,color:'#94a3b8',fontWeight:800,display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,borderRadius:2,background:'#6366f1',display:'inline-block'}}></span>Today</span>
      </div>
    </div>

    {/* Grid view */}
    {viewMode==='grid'&&<div>
      {weeks.map((wk,wi)=><div key={wi} style={{marginBottom:8}}>
        <div className="cal-wk"><span>{wk.label}</span></div>
        <div className="cal-grid-row" style={{gap:4}}>
          {wk.dates.map(dt=>{
            const evs=visible.filter(e=>e.date===dt);
            const dis=evs.filter(e=>e.kind==='dispatch');
            const rec=evs.filter(e=>e.kind==='receive');
            const disQty=dis.reduce((a,e)=>a+safeNum(e.qty),0);
            const recQty=rec.reduce((a,e)=>a+safeNum(e.qty),0);
            const d=parseISO(dt);
            const isTd=dt===today,isWknd=isWeekend(dt);
            return <div key={dt} className={`cdc${isTd?' is-today':''}${isWknd?' is-weekend':''}${evs.length===0?' is-empty':''}`}>
              <div className="cdc-left">
                <div className="cdc-date-row">
                  <span className="cdc-num">{d.getDate()}</span>
                  <span className="cdc-dow">{d.toLocaleDateString('en-IN',{weekday:'short'}).toUpperCase()}</span>
                  <span className="cdc-mon">{d.toLocaleDateString('en-IN',{month:'short'})}</span>
                  {isTd&&<span className="cdc-today-tag">Today</span>}
                  {!isTd&&isWknd&&<span className="cdc-wknd-tag">Wknd</span>}
                </div>
                <div className="cdc-disp-hdr">
                  <span className="cdc-disp-lbl">🚚 Dispatch</span>
                  {disQty>0&&<span className="cdc-disp-qty">{fN(disQty)}</span>}
                </div>
                {dis.length?dis.map((e,i)=><div key={i} style={{background:'rgba(255,255,255,.7)',borderRadius:5,padding:'3px 5px',marginBottom:2,border:'1px solid #bbf7d0'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:3}}>
                    <span style={{fontFamily:"'Sora',sans-serif",fontSize:11,fontWeight:800,color:'#059669'}}>{fN(e.qty)} PCS</span>
                    {e.status&&<span className={`cdc-ev-st ${sc(e.status)}`}>{e.status}</span>}
                  </div>
                  <div style={{fontSize:10,fontWeight:700,color:'#1e293b',marginTop:1}}>{e.sku}</div>
                  {e.party&&<div style={{fontSize:9,color:'#64748b',fontWeight:600}}>{e.party}{e.ref?<span style={{color:'#94a3b8'}}> · {e.ref}</span>:null}</div>}
                </div>):<span className="cdc-empty">NO DISPATCHES</span>}
              </div>
              <div className="cdc-right">
                <div className="cdc-recv-hdr">
                  <span className="cdc-recv-lbl">📥 Receive</span>
                  {recQty>0&&<span className="cdc-recv-qty">{fN(recQty)}</span>}
                </div>
                {rec.length?rec.map((e,i)=><div key={i} style={{background:'rgba(255,255,255,.7)',borderRadius:5,padding:'3px 5px',marginBottom:2,border:'1px solid #bfdbfe'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:3}}>
                    <span style={{fontFamily:"'Sora',sans-serif",fontSize:11,fontWeight:800,color:'#1d4ed8'}}>{fN(e.qty)} PCS</span>
                    {e.status&&<span className={`cdc-ev-st ${sc(e.status)}`}>{e.status}</span>}
                  </div>
                  <div style={{fontSize:10,fontWeight:700,color:'#1e293b',marginTop:1}}>{e.sku}</div>
                  {e.party&&<div style={{fontSize:9,color:'#64748b',fontWeight:600}}>{e.party}{e.ref?<span style={{color:'#94a3b8'}}> · {e.ref}</span>:null}</div>}

    </div>}

        <span style={{fontSize:11,fontWeight:800,color:'#64748b',whiteSpace:'nowrap',marginRight:2}}>Filter SKU:</span>

      </div>
      {/* Search + controls bar */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
        <div className="search" style={{flex:1,maxWidth:380}}><span>🔍</span><input className="inp" placeholder="Search date, SKU, vendor, client..." value={tableSearch} onChange={e=>setTableSearch(e.target.value)}/></div>
        <select className="sel" style={{height:30,padding:'4px 8px',fontSize:11,borderRadius:7,width:180}} value={filter} onChange={e=>setFilter(e.target.value)}>
          <option>All</option><option>Receive from Vendor</option><option>Dispatch to Client</option>
        </select>

      </div>
      {/* Frozen-header scrollable table */}
      <div style={{border:'1px solid #e2e8f0',borderRadius:10,overflow:'hidden',boxShadow:'0 1px 4px rgba(15,23,42,.06)'}}>
        <div style={{maxHeight:'calc(100vh - 360px)',overflowY:'auto',overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12,tableLayout:'fixed'}}>
            <colgroup>
              <col style={{width:108}}/><col style={{width:170}}/><col style={{width:110}}/><col style={{width:110}}/><col style={{width:155}}/><col style={{width:145}}/><col style={{width:105}}/><col style={{width:105}}/>
            </colgroup>
            <thead>
              <tr style={{position:'sticky',top:0,zIndex:10}}>
                {[
                  {key:'date',label:'📅 Date'},
                  {key:'sku',label:'📦 SKU'},
                  {key:'dispatch',label:'🚚 Dispatch'},
                  {key:'receive',label:'📥 Receive'},
                  {key:'receiveFrom',label:'Receive From'},
                  {key:'dispatchTo',label:'Dispatch To'},
                  {key:'dispatchStatus',label:'Disp. Status'},
                  {key:'receiveStatus',label:'Recv. Status'},
                ].map((c,ci)=><th key={c.key} onClick={()=>toggleSort(c.key)} style={{padding:'7px 10px',textAlign:ci>=2&&ci<=3?'right':'left',fontSize:10,fontWeight:900,textTransform:'uppercase',letterSpacing:.45,color:sortField===c.key?'#6366f1':'#64748b',cursor:'pointer',userSelect:'none',borderBottom:'2px solid #e2e8f0',background:'#f8fafc',whiteSpace:'nowrap'}}>
                  {c.label}<span style={{marginLeft:3,fontSize:9,color:sortField===c.key?'#6366f1':'#d1d5db'}}>{sortField===c.key?(sortDir==='asc'?'▲':'▼'):'⇅'}</span>
                </th>)}
              </tr>
            </thead>
            <tbody>
              {skuPlanRows.length?skuPlanRows.map((row,i)=>{
                const isTd=row.date===today;
                const isPast=row.date<today;
                const hasDispatch=row.dispatch>0;
                const hasReceive=row.receive>0;
                return <tr key={i} style={{background:isTd?'#f5f3ff':i%2===0?'#fff':'#fafbfd',borderBottom:'1px solid #f1f5f9'}}>
                  <td style={{padding:'4px 10px',whiteSpace:'nowrap'}}>
                    <div style={{fontFamily:"'Sora',sans-serif",fontSize:11,fontWeight:800,color:isTd?'#6366f1':isPast?'#94a3b8':'#0f172a'}}>{row.date.split('-').reverse().join('/')}</div>
                    {isTd&&<span style={{fontSize:7,background:'#ede9fe',color:'#6366f1',padding:'1px 4px',borderRadius:3,fontWeight:900,textTransform:'uppercase',letterSpacing:.3}}>TODAY</span>}
                  </td>
                  <td style={{padding:'4px 10px'}}>
                    <span style={{fontWeight:700,fontSize:11,color:'#1e293b'}}>{row.sku}</span>
                  </td>
                  <td style={{padding:'4px 10px',textAlign:'right'}}>
                    {hasDispatch
                      ?<div style={{display:'inline-flex',alignItems:'center',gap:4,background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:5,padding:'2px 6px'}}>
                        <span style={{fontFamily:"'Sora',sans-serif",fontSize:11,fontWeight:800,color:'#059669'}}>{fN(row.dispatch)}</span>
                        <span style={{fontSize:8,color:'#86efac',fontWeight:700}}>PCS</span>
                      </div>
                      :<span style={{color:'#e2e8f0',fontSize:11}}>—</span>}
                  </td>
                  <td style={{padding:'4px 10px',textAlign:'right'}}>
                    {hasReceive
                      ?<div style={{display:'inline-flex',alignItems:'center',gap:4,background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:5,padding:'2px 6px'}}>
                        <span style={{fontFamily:"'Sora',sans-serif",fontSize:11,fontWeight:800,color:'#1d4ed8'}}>{fN(row.receive)}</span>
                        <span style={{fontSize:8,color:'#93c5fd',fontWeight:700}}>PCS</span>
                      </div>
                      :<span style={{color:'#e2e8f0',fontSize:11}}>—</span>}
                  </td>
                  <td style={{padding:'4px 10px',fontSize:11,color:'#1d4ed8',fontWeight:600}}>{row.receiveFrom||<span style={{color:'#e2e8f0'}}>—</span>}</td>
                  <td style={{padding:'4px 10px',fontSize:11,color:'#059669',fontWeight:600}}>{row.dispatchTo||<span style={{color:'#e2e8f0'}}>—</span>}</td>
                  <td style={{padding:'4px 10px'}}>
                    {row.dispatchStatus
                      ?<span style={{fontSize:9,fontWeight:800,padding:'1px 6px',borderRadius:99,background:row.dispatchStatus.toLowerCase()==='pending'?'#dbeafe':row.dispatchStatus.toLowerCase()==='planned'?'#fef3c7':'#dcfce7',color:row.dispatchStatus.toLowerCase()==='pending'?'#1e40af':row.dispatchStatus.toLowerCase()==='planned'?'#92400e':'#166534'}}>{row.dispatchStatus}</span>
                      :<span style={{color:'#e2e8f0',fontSize:11}}>—</span>}
                  </td>
                  <td style={{padding:'4px 10px'}}>
                    {row.receiveStatus
                      ?<span style={{fontSize:9,fontWeight:800,padding:'1px 6px',borderRadius:99,background:row.receiveStatus.toLowerCase()==='planned'?'#fef3c7':row.receiveStatus.toLowerCase()==='received'?'#dcfce7':'#dbeafe',color:row.receiveStatus.toLowerCase()==='planned'?'#92400e':row.receiveStatus.toLowerCase()==='received'?'#166634':'#1e40af'}}>{row.receiveStatus}</span>
                      :<span style={{color:'#e2e8f0',fontSize:11}}>—</span>}
                  </td>
                </tr>
              }):<tr><td colSpan={8} style={{textAlign:'center',padding:48,color:'#94a3b8',fontWeight:700,fontSize:13}}>No planned events found</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
      <div style={{marginTop:5,fontSize:11,color:'#94a3b8',fontWeight:700}}>{skuPlanRows.length} rows · all planned delivery dates across full pipeline</div>
    </div>}
  </div>
}

function ClientMasterForm({initial,onSave,onClose}){
  const blank={name:'',contact:'',mobile:'',email:'',gst:'',billing:'',shipping:'',terms:'30 days',status:'Active',notes:''};
  const [f,setF]=useState({...blank,...(initial||{})});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const save=()=>{
    if(!String(f.name||'').trim()){alert('Client name is required');return;}
    onSave({...f,name:String(f.name).trim()});
  };
  return <Modal title={initial?'Edit Client Master':'Add Client Master'} onClose={onClose} wide>
    <div className="form-grid">
      <Field label="Client Name"><Input value={f.name} onChange={v=>set('name',v)} placeholder="e.g. Yogabaar"/></Field>
      <Field label="Contact Person"><Input value={f.contact} onChange={v=>set('contact',v)} placeholder="Contact name"/></Field>
      <Field label="Mobile"><Input value={f.mobile} onChange={v=>set('mobile',v)} placeholder="Mobile number"/></Field>
      <Field label="Email"><Input value={f.email} onChange={v=>set('email',v)} placeholder="email@company.com"/></Field>
      <Field label="GST Number"><Input value={f.gst} onChange={v=>set('gst',v)} placeholder="GSTIN"/></Field>

}
