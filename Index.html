/* ═══ GRID CALENDAR ═══ */
.cal-page{display:flex;flex-direction:column;gap:0}

/* ── KPI strip ── */
.cal-strip{display:flex;gap:0;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:7px}
.cal-strip-item{flex:1;display:flex;align-items:center;gap:8px;padding:7px 12px;border-right:1px solid var(--border)}
.cal-strip-item:last-child{border-right:0}
.csi-icon{font-size:15px;flex-shrink:0}
.csi-label{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.4px;color:#94a3b8}
.csi-val{font-family:'Sora',sans-serif;font-size:14px;font-weight:800;line-height:1.1;letter-spacing:-.3px}
.csi-sub{font-size:9px;color:#94a3b8;font-weight:700}

/* ── Week separator ── */
.cal-wk{display:flex;align-items:center;gap:8px;padding:5px 0 3px;margin-top:2px}
.cal-wk::after{content:'';flex:1;height:1px;background:#e8edf2}
.cal-wk span{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.7px;color:#cbd5e1;white-space:nowrap}

/* ── Day grid: 4 cards per row ── */
.cal-grid-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:0}

/* ── Day card: left=date+dispatch, right=receive ── */
.cdc{border:1px solid #e2e8f0;border-radius:9px;overflow:visible;display:grid;grid-template-columns:1fr 1fr;min-height:60px}
.cdc:hover{border-color:#b6c2ce}
.cdc.is-today{border-color:#a5b4fc;border-left:2px solid #6366f1}
.cdc.is-weekend{opacity:1}
.cdc.is-empty{opacity:1}

/* Left half — Dispatch */
.cdc-left{background:#f0fdf4;border-right:1px solid #bbf7d0;padding:5px 6px;display:flex;flex-direction:column;gap:2px;border-radius:8px 0 0 8px}
.cdc-date-row{display:flex;align-items:baseline;gap:4px;margin-bottom:2px}
.cdc-num{font-family:'Sora',sans-serif;font-size:13px;font-weight:800;color:#0f172a;line-height:1}
.is-today .cdc-num{color:#6366f1}
.is-weekend .cdc-num{color:#94a3b8}
.cdc-dow{font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.3px;color:#94a3b8}
.cdc-mon{font-size:8px;font-weight:700;color:#b0bec5;margin-left:auto}
.cdc-disp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.cdc-disp-lbl{font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.3px;color:#059669;display:flex;align-items:center;gap:3px}
.cdc-disp-qty{font-family:'Sora',sans-serif;font-size:9px;font-weight:800;color:#059669}
.cdc-today-tag{background:#ede9fe;color:#6366f1;font-size:7px;font-weight:900;text-transform:uppercase;padding:1px 4px;border-radius:3px;letter-spacing:.2px}
.cdc-wknd-tag{background:#f1f5f9;color:#94a3b8;font-size:7px;font-weight:900;text-transform:uppercase;padding:1px 4px;border-radius:3px;letter-spacing:.2px}

/* Right half — Receive */
.cdc-right{background:#eff6ff;padding:5px 6px;display:flex;flex-direction:column;gap:2px;border-radius:0 8px 8px 0}
.cdc-recv-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;margin-top:18px}
.cdc-recv-lbl{font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.3px;color:#1d4ed8;display:flex;align-items:center;gap:3px}
.cdc-recv-qty{font-family:'Sora',sans-serif;font-size:9px;font-weight:800;color:#1d4ed8}

/* Event line within a card — NO truncation, full content visible */
.cdc-ev{display:flex;align-items:baseline;gap:3px;line-height:1.5;flex-wrap:wrap;padding:1px 0}
.cdc-ev-qty{font-family:'Sora',sans-serif;font-size:10px;font-weight:800;white-space:nowrap;flex-shrink:0}
.cdc-left .cdc-ev-qty{color:#059669}
.cdc-right .cdc-ev-qty{color:#1d4ed8}
.cdc-ev-dot{width:2px;height:2px;border-radius:50%;background:#b0bec5;flex-shrink:0;margin-top:5px}
.cdc-ev-sku{font-size:10px;font-weight:700;color:#1e293b;white-space:normal;word-break:break-word}
.cdc-ev-party{font-size:9px;color:#64748b;font-weight:600;white-space:normal;word-break:break-word}
.cdc-ev-st{font-size:7px;font-weight:900;text-transform:uppercase;padding:1px 4px;border-radius:3px;flex-shrink:0;white-space:nowrap;margin-left:auto}
.cdc-ev-st.s-planned{background:#fef9c3;color:#854d0e}
.cdc-ev-st.s-pending{background:#dbeafe;color:#1e40af}
.cdc-ev-st.s-confirmed{background:#dcfce7;color:#166534}
.cdc-ev-st.s-default{background:#f1f5f9;color:#64748b}
.cdc.is-empty .cdc-left{background:#f8fafb}
.cdc.is-empty .cdc-right{background:#f5f8ff}
.cdc-empty{font-size:9px;color:#b0bec5;font-weight:700;font-style:italic;padding:2px 0}

.compact-kpi-grid{gap:8px!important;margin-bottom:10px!important}.compact-kpi-grid .kpi{padding:9px 11px;border-radius:11px}.compact-kpi-grid .kpi label{font-size:9px}.compact-kpi-grid .kpi strong{font-size:16px;margin-top:4px}.compact-kpi-grid .kpi small{font-size:10px;margin-top:2px}.compact-kpi-grid .kpi .icon{font-size:18px}.compact-card .card-head{padding:10px 12px}.compact-card .card-body{padding:10px 12px}

function cleanRowsForSupabase(table,rows){
  const cfg=DB_SCHEMA[table];
  if(!cfg) return rows || [];
  return (rows || []).filter(r=>r && r.id).map(r=>{
    const out={};
    cfg.fields.forEach(k=>{
      let v=r[k];
      if(cfg.nums.includes(k)){
        out[k]=(v==='' || v===undefined || v===null) ? null : Number(v);
      }else if(cfg.dates.includes(k)){
        out[k]=(v==='' || v===undefined || v===null) ? null : String(v).slice(0,10);
      }else{
        out[k]=(v===undefined || v===null) ? '' : v;
      }
    });
    return out;
  });
}
function detailedSupabaseError(err){
  if(!err) return 'Unknown Supabase error';
  return [err.message, err.details, err.hint, err.code].filter(Boolean).join(' | ');
}
function useSupabaseState(table,key,initial){
  const localKey=`bp_${table}_cloud_v2`;
  const [state,setState]=useState(()=>{
    try{const raw=localStorage.getItem(localKey);return raw?JSON.parse(raw):initial}catch(e){return initial}
  });
  const [loaded,setLoaded]=useState(false);
  const [sync,setSync]=useState({table,status: sb?'Connecting':'Local only', error:''});

  useEffect(()=>{
    let alive=true;
    async function load(){
      if(!sb){ setLoaded(true); return; }
      try{
        setSync({table,status:'Loading cloud',error:''});
        const {data,error}=await sb.from(table).select('*').order('id',{ascending:true});
        if(error) throw error;
        if(!alive) return;
        if(data && data.length){
          setState(data);
          localStorage.setItem(localKey,JSON.stringify(data));
        }else{
          const seed=cleanRowsForSupabase(table,(state && state.length ? state : initial));
          if(seed.length){
            const {error:seedErr}=await sb.from(table).upsert(seed,{onConflict:'id'});
            if(seedErr) throw seedErr;
          }
          setState(seed);
          localStorage.setItem(localKey,JSON.stringify(seed));
        }
        setSync({table,status:'Cloud synced',error:''});
      }catch(err){
        console.error('Supabase load error for',table,err);
        if(alive) setSync({table,status:'Cloud error',error:detailedSupabaseError(err)});
      }finally{ if(alive) setLoaded(true); }
    }
    load();
    return()=>{alive=false};
  },[table]);

  useEffect(()=>{
    try{localStorage.setItem(localKey,JSON.stringify(state))}catch(e){}
    if(!sb || !loaded) return;
    const timer=setTimeout(async()=>{
      try{
        const cleaned=cleanRowsForSupabase(table,state);
        if(cleaned.length){
          const {error}=await sb.from(table).upsert(cleaned,{onConflict:'id'});
          if(error) throw error;
        }
        setSync({table,status:'Cloud synced',error:''});
      }catch(err){
        console.error('Supabase save error for',table,err);
        setSync({table,status:'Save error',error:detailedSupabaseError(err)});
      }
    },650);
    return()=>clearTimeout(timer);
  },[table,state,loaded]);

  return [state,setState,sync];
}
function genId(prefix,arr){
  const nums=arr.map(x=>parseInt(String(x.id||'').replace(prefix,''),10)).filter(Boolean);
  return `${prefix}${String(nums.length?Math.max(...nums)+1:1).padStart(3,'0')}`;
}
function nextIdFactory(prefix,existing){
  let max=(existing||[]).map(x=>parseInt(String(x.id||'').replace(prefix,''),10)).filter(Boolean).reduce((a,b)=>Math.max(a,b),0);
  return ()=>`${prefix}${String(++max).padStart(3,'0')}`;
}
function exportCSV(data,filename){
  if(!data.length){alert('No rows to export');return}

  const csv=[keys.join(','),...data.map(r=>keys.map(k=>`"${String(r[k]??'').replaceAll('"','""')}"`).join(','))].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=filename;a.click();
}

function AlertLine({title,value,sub,color}){return <div className={`kpi ${color}`} style={{padding:13}}><label>{title}</label><strong style={{fontSize:22}}>{value}</strong><small>{sub}</small></div>}
function StatusBadge({status,pendingFG}){let color='gray'; if(status==='Closed')color='green'; else if(status==='Ready to Dispatch')color='blue'; else if(status==='In Production')color='amber'; else if(status==='Delayed')color='red'; if(pendingFG===0 && status!=='Cancelled') color='green'; return <Badge color={color}>{pendingFG===0 && status!=='Cancelled'?'FG Complete':status}</Badge>}


function SplitScheduleEditor({title,splits,setSplits,dateLabel='Date',qtyLabel='Qty PCS',statusOptions=['Pending','Done','Cancelled']}){
  const update=(i,k,v)=>setSplits(prev=>prev.map((r,idx)=>idx===i?{...r,[k]:v}:r));
  const add=()=>setSplits(prev=>[...prev,{date:todayISO(),qtyPCS:'',status:statusOptions[0],remarks:''}]);
  const remove=(i)=>setSplits(prev=>prev.filter((_,idx)=>idx!==i));
  const total=splits.reduce((a,r)=>a+safeNum(r.qtyPCS),0);
  return <div className="card" style={{gridColumn:'1/-1',boxShadow:'none'}}>
    <div className="card-head"><div className="card-title">{title}</div><div className="actions"><Badge color="blue">Total {fN(total)} PCS</Badge><Button variant="secondary" onClick={add}>+ Add Split</Button></div></div>
    <div className="card-body" style={{padding:10}}>

function OrderForm({skus,vendors,clients,initial,initialSplits=[],onSave,onClose}){
  const blank={date:todayISO(),type:'Job Work',vendor:'',client:'',sku:'',orderQtyPCS:'',issuedKG:'',buyKG:'',mfgKG:'',expectedPCS:'',vendorDeliveryDate:addDays(5),clientDeliveryDate:addDays(7),status:'In Production',remarks:''};
  const [f,setF]=useState(initial||blank);
  const [splits,setSplits]=useState(initialSplits && initialSplits.length ? initialSplits.map(x=>({...x})) : []);
  const set=(k,v)=>setF(p=>{
    const u={...p,[k]:v};
    if(k==='sku'){
      const s=skus.find(x=>x.name===v); if(s){u.client=s.client;u.buyKG=s.buyKG;u.mfgKG=s.mfgKG;u.expectedPCS=u.orderQtyPCS||'';}
    }
    const s=skus.find(x=>x.name===u.sku);
    if((k==='orderQtyPCS'||k==='sku') && s && safeNum(u.orderQtyPCS)>0){
      const ideal=safeNum(s.idealWastage)/100; u.issuedKG=Math.round(safeNum(u.orderQtyPCS)*safeNum(s.stdWeight)/(1-ideal)); u.expectedPCS=u.orderQtyPCS;
      if(!initial && splits.length===0){setSplits([{date:u.vendorDeliveryDate||addDays(5),qtyPCS:u.orderQtyPCS,status:'Planned',remarks:'Vendor delivery split'}]);}
    }
    return u;
  });
  const addEvenSplits=()=>{
    const total=safeNum(f.orderQtyPCS); if(!total){alert('Enter order quantity first');return;}
    const count=Number(prompt('How many vendor delivery parts?', '5')||0); if(!count)return;
    const each=Math.floor(total/count); const rem=total-(each*count);
    setSplits(Array.from({length:count},(_,i)=>({date:addDays(2+i*2),qtyPCS:each+(i===count-1?rem:0),status:'Planned',remarks:`Part ${i+1}`})));
  };
  const sku=skus.find(s=>s.name===f.sku)||{};
  const expectedKG=safeNum(f.orderQtyPCS)*safeNum(sku.stdWeight);
  const rmCost=safeNum(f.issuedKG)*safeNum(f.buyKG);
  const mfgCost=expectedKG*safeNum(f.mfgKG);
  const splitQty=splits.reduce((a,r)=>a+safeNum(r.qtyPCS),0);
  return <Modal title={initial?'Edit Vendor Order':'New Vendor / Job Work Order'} onClose={onClose} wide>
    <div className="form-grid">
      <Field label="Order Date"><Input type="date" value={f.date} onChange={v=>set('date',v)}/></Field>
      <Field label="Order Type"><Select value={f.type} onChange={v=>set('type',v)} options={['Job Work','Direct Trading','Own Manufacturing']}/></Field>
      <Field label="Vendor"><Select value={f.vendor} onChange={v=>set('vendor',v)} options={vendors.map(v=>v.name)}/></Field>
      <Field label="Client"><Select value={f.client} onChange={v=>set('client',v)} options={clients.map(c=>c.name)}/></Field>
      <Field label="SKU"><Select value={f.sku} onChange={v=>set('sku',v)} options={skus.map(s=>s.name)}/></Field>
      <Field label="Vendor Order Qty / Placed to Make (PCS)"><Input type="number" value={f.orderQtyPCS} onChange={v=>set('orderQtyPCS',v)}/></Field>
      <Field label="Issued RM to Vendor (KG)"><Input type="number" value={f.issuedKG} onChange={v=>set('issuedKG',v)}/></Field>
      <Field label="Expected FG PCS"><Input type="number" value={f.expectedPCS} onChange={v=>set('expectedPCS',v)}/></Field>
      <Field label="Buying Cost / KG"><Input type="number" value={f.buyKG} onChange={v=>set('buyKG',v)}/></Field>
      <Field label="Job Work / Mfg Cost / KG"><Input type="number" value={f.mfgKG} onChange={v=>set('mfgKG',v)}/></Field>
      <Field label="Main Vendor Delivery Date"><Input type="date" value={f.vendorDeliveryDate} onChange={v=>set('vendorDeliveryDate',v)}/></Field>
      <Field label="Client Delivery Date / Reference"><Input type="date" value={f.clientDeliveryDate} onChange={v=>set('clientDeliveryDate',v)}/></Field>
      <Field label="Status"><Select value={f.status} onChange={v=>set('status',v)} options={['In Production','Ready to Dispatch','Part Dispatched','Closed','Delayed','Cancelled']}/></Field>
      <Field label="Remarks"><Input value={f.remarks} onChange={v=>set('remarks',v)}/></Field>
      <div style={{gridColumn:'1/-1'}}><Button variant="secondary" onClick={addEvenSplits}>⚡ Auto split vendor order equally</Button> <span className="tiny">Example: 25,000 boxes can be split into 5 delivery parts.</span></div>
      <SplitScheduleEditor title="Vendor Delivery Split Plan" splits={splits} setSplits={setSplits} dateLabel="Vendor Receive Date" qtyLabel="Receive Qty PCS" statusOptions={['Planned','Received','Delayed','Cancelled']}/>
    </div>
    <div className="calc-strip"><div className="calc-item"><label>Auto RM Cost</label><strong>{fC(rmCost)}</strong></div><div className="calc-item"><label>Expected FG KG</label><strong>{fN(expectedKG)} KG</strong></div><div className="calc-item"><label>Split Planned</label><strong className={splitQty!==safeNum(f.orderQtyPCS)?'red-t':'green-t'}>{fN(splitQty)} PCS</strong></div><div className="calc-item"><label>Total Cost Before Dispatch</label><strong>{fC(rmCost+mfgCost)}</strong></div></div>
    <div className="actions" style={{justifyContent:'flex-end',marginTop:18}}><Button variant="secondary" onClick={onClose}>Cancel</Button><Button onClick={()=>onSave({order:f,splits})}>{initial?'Update Order':'Save Order'}</Button></div>
  </Modal>
}

function OrdersPage({skus,vendors,clients,orders,setOrders,receipts,setReceipts,dispatches,setDispatches,vendorSplits,setVendorSplits,metrics}){

    const row=payload.order||payload; const splitRows=payload.splits||[];
    const orderId=row.id || genId('O',orders);
    const finalOrder={...row,id:orderId};
    if(row.id){setOrders(p=>p.map(o=>o.id===row.id?finalOrder:o))} else {setOrders(p=>[{...finalOrder},...p])}
    const nextVS=nextIdFactory('VS',vendorSplits);
    const cleanedSplits=splitRows.filter(x=>safeNum(x.qtyPCS)>0 || x.date).map(x=>({...x,id:x.id||nextVS(),vendorOrderId:orderId,status:x.status||'Planned'}));
    if(sb && row.id){try{await sb.from(CLOUD_TABLES.vendorSplits).delete().eq('vendorOrderId',row.id)}catch(e){console.error(e)}}
    setVendorSplits(p=>[...p.filter(x=>x.vendorOrderId!==orderId),...cleanedSplits]);
    setModal(null)
  };
  const saveReceipt=(row)=>{setReceipts(p=>[{...row,id:genId('R',p)},...p]);setModal(null)};

  const cols=[

    {key:'receivedPCS',label:'FG Received',render:o=><><span className="num green-t">{fN(o.receivedPCS)} PCS</span><br/><span className="tiny">{fN(o.receivedKG)} KG received</span></>},
    {key:'pendingFG',label:'Pending at Vendor',render:o=><><span className={`num ${o.pendingFG?'amber-t':'green-t'}`}>{fN(o.pendingFG)} PCS</span><Progress pct={o.progress} color={o.progress<40?'red':o.progress<80?'amber':'green'}/></>},
    {key:'dates',label:'Main Dates',render:o=><><span className="tiny">Vendor</span> {o.vendorDeliveryDate}<br/><span className="tiny">Client Ref</span> {o.clientDeliveryDate}</>},

  ];

function CustomerOrderForm({skus,clients,initial,initialSplits=[],onSave,onClose}){
  const blank={date:todayISO(),client:'',sku:'',orderRef:'',totalQtyPCS:'',sellPCS:'',status:'Open',remarks:''};
  const [f,setF]=useState({...blank,...(initial||{})});
  const [splits,setSplits]=useState(initialSplits && initialSplits.length ? initialSplits.map(x=>({...x})) : []);
  const set=(k,v)=>setF(p=>{const u={...p,[k]:v}; if(k==='sku'){const sku=skus.find(s=>s.name===v); if(sku){u.client=sku.client;u.sellPCS=sku.sellPCS}} return u});
  const addEvenSplits=()=>{
    const total=safeNum(f.totalQtyPCS); if(!total){alert('Enter customer order qty first');return;}
    const count=Number(prompt('How many dispatch parts?', '5')||0); if(!count)return;
    const each=Math.floor(total/count); const rem=total-(each*count);
    setSplits(Array.from({length:count},(_,i)=>({date:addDays(1+i*2),qtyPCS:each+(i===count-1?rem:0),status:'Pending',remarks:`Dispatch ${i+1}`})));
  };
  const splitTotal=splits.reduce((a,r)=>a+safeNum(r.qtyPCS),0);
  const value=safeNum(f.totalQtyPCS)*safeNum(f.sellPCS);
  return <Modal title={initial?'Edit Customer Order':'Add Customer Order with Dispatch Split'} onClose={onClose} wide>
    <div className="form-grid">
      <Field label="Order Date"><Input type="date" value={f.date} onChange={v=>set('date',v)}/></Field>
      <Field label="Customer PO / Ref"><Input value={f.orderRef} onChange={v=>set('orderRef',v)} placeholder="e.g. PO No"/></Field>
      <Field label="Client"><Select value={f.client} onChange={v=>set('client',v)} options={clients.map(c=>c.name)}/></Field>
      <Field label="SKU"><Select value={f.sku} onChange={v=>set('sku',v)} options={skus.map(s=>s.name)}/></Field>
      <Field label="Total Customer Order Qty PCS"><Input type="number" value={f.totalQtyPCS} onChange={v=>set('totalQtyPCS',v)} placeholder="e.g. 25000"/></Field>
      <Field label="Selling Price / PCS"><Input type="number" value={f.sellPCS} onChange={v=>set('sellPCS',v)}/></Field>
      <Field label="Status"><Select value={f.status} onChange={v=>set('status',v)} options={['Open','Part Dispatched','Closed','Hold','Cancelled']}/></Field>
      <Field label="Remarks"><Input value={f.remarks} onChange={v=>set('remarks',v)}/></Field>
      <div style={{gridColumn:'1/-1'}}><Button variant="secondary" onClick={addEvenSplits}>⚡ Auto split dispatch equally</Button> <span className="tiny">Example: 25,000 Yogabaar boxes → 5,000 on 22, 23, 25, 27, 29 May.</span></div>
      <SplitScheduleEditor title="Customer Dispatch Split Plan" splits={splits} setSplits={setSplits} dateLabel="Dispatch Date" qtyLabel="Dispatch Qty PCS" statusOptions={['Pending','Dispatched','Delayed','Cancelled']}/>
    </div>
    <div className="calc-strip"><div className="calc-item"><label>Order Value</label><strong>{fC(value)}</strong></div><div className="calc-item"><label>Total Order Qty</label><strong>{fN(f.totalQtyPCS)} PCS</strong></div><div className="calc-item"><label>Split Planned</label><strong className={splitTotal!==safeNum(f.totalQtyPCS)?'red-t':'green-t'}>{fN(splitTotal)} PCS</strong></div><div className="calc-item"><label>Balance to Split</label><strong>{fN(safeNum(f.totalQtyPCS)-splitTotal)} PCS</strong></div></div>
    <div className="actions" style={{justifyContent:'flex-end',marginTop:18}}><Button variant="secondary" onClick={onClose}>Cancel</Button><Button onClick={()=>onSave({order:f,splits})}>{initial?'Update Customer Order':'Save Customer Order'}</Button></div>
  </Modal>
}

function CustomerOrdersPage({skus,clients,customerOrders,setCustomerOrders,customerSplits,setCustomerSplits,dispatches,setDispatches,metrics}){
  const [modal,setModal]=useState(null); const [dispatchModal,setDispatchModal]=useState(null);
  const saveOrder=async(payload)=>{
    const row=payload.order; const orderId=row.id || genId('CO',customerOrders); const finalOrder={...row,id:orderId};
    if(row.id) setCustomerOrders(p=>p.map(o=>o.id===row.id?finalOrder:o)); else setCustomerOrders(p=>[{...finalOrder},...p]);
    const nextCS=nextIdFactory('CS',customerSplits);
    const cleaned=(payload.splits||[]).filter(x=>safeNum(x.qtyPCS)>0 || x.date).map(x=>({...x,id:x.id||nextCS(),customerOrderId:orderId,status:x.status||'Pending'}));
    if(sb && row.id){try{await sb.from(CLOUD_TABLES.customerSplits).delete().eq('customerOrderId',row.id)}catch(e){console.error(e)}}
    setCustomerSplits(p=>[...p.filter(x=>x.customerOrderId!==orderId),...cleaned]);
    setModal(null);
  };
  const saveDispatch=(row)=>{setDispatches(p=>[{...row,id:genId('D',p)},...p]);setDispatchModal(null)};
  const rows=metrics.customerOrderRows;
  const cols=[
    {key:'id',label:'Order',render:o=><span className="num blue-t">{o.id}</span>},
    {key:'client',label:'Client / SKU',render:o=><><b>{o.client}</b><br/><span className="tiny">{o.sku} · {o.orderRef}</span></>},
    {key:'total',label:'Order Qty',render:o=><span className="num">{fN(o.totalQtyPCS)} PCS</span>},
    {key:'splits',label:'Dispatch Split Plan',render:o=><div style={{minWidth:270}}>{o.splits?.length?o.splits.map(sp=><button key={sp.id} className={`badge ${sp.pendingPCS>0?'green':'gray'}`} style={{border:0,margin:'0 5px 5px 0'}} disabled={sp.pendingPCS<=0} onClick={()=>setDispatchModal({date:sp.date,customerOrderId:o.id,customerSplitId:sp.id,client:o.client,sku:o.sku,qtyPCS:sp.pendingPCS>0?sp.pendingPCS:0,sellPCS:o.sellPCS,remarks:`Dispatch against ${sp.id}`})}>{sp.date}: {fN(sp.qtyPCS)}</button>):<span className="tiny">No split plan</span>}</div>},
    {key:'dispatched',label:'Dispatched',render:o=><span className="num green-t">{fN(o.dispatchedPCS)} PCS</span>},
    {key:'pending',label:'Pending Dispatch',render:o=><><span className={`num ${o.pendingDispatch?'red-t':'green-t'}`}>{fN(o.pendingDispatch)} PCS</span><Progress pct={o.progress} color={o.progress<40?'red':o.progress<85?'amber':'green'}/></>},
    {key:'status',label:'Status',render:o=><Badge color={o.status==='Closed'?'green':o.status==='Cancelled'?'red':'blue'}>{o.status||'Open'}</Badge>},
    {key:'actions',label:'Actions',render:o=><div className="actions"><Button variant="outline" onClick={()=>setModal(o)}>Edit</Button><Button variant="blue" onClick={()=>setDispatchModal({customerOrderId:o.id,client:o.client,sku:o.sku,qtyPCS:o.pendingDispatch,sellPCS:o.sellPCS,remarks:`Dispatch against ${o.id}`})} disabled={o.pendingDispatch<=0}>Dispatch</Button></div>},
  ];
  return <>
    <PageHead title="Customer Orders" sub="Add customer order once, then break dispatch commitment date-wise. Example: 25,000 boxes split into 5,000 each.">
      <Button variant="primary" onClick={()=>setModal({})}>+ Add Customer Order</Button>
    </PageHead>
    <div className="grid kpi-grid compact-kpi-grid" style={{gridTemplateColumns:'repeat(4,minmax(145px,1fr))'}}>
      <KPI label="Customer Order Qty" value={fN(metrics.totals.customerOrderQty)} sub="Total planned demand" icon="📋" color="blue"/>
      <KPI label="Dispatch Splits" value={metrics.totals.customerSplits} sub="Date-wise commitments" icon="🗓️" color="green"/>
      <KPI label="Pending Dispatch" value={fN(metrics.totals.customerPending)} sub="Order balance" icon="🚚" color="red"/>
      <KPI label="Dispatched Qty" value={fN(metrics.totals.dispatched)} sub="All dispatches" icon="✅" color="purple"/>
    </div>
    <DataTable columns={cols} data={rows} searchText="Search customer order, client, SKU..." />
    {modal&&<CustomerOrderForm skus={skus} clients={clients} initial={modal.id?modal:null} initialSplits={modal.id?customerSplits.filter(x=>x.customerOrderId===modal.id):[]} onSave={saveOrder} onClose={()=>setModal(null)}/>} 
    {dispatchModal&&<DispatchForm initial={dispatchModal} skus={skus} clients={clients} onSave={saveDispatch} onClose={()=>setDispatchModal(null)}/>} 
  </>
}

function RMOrderForm({skus,vendors,initial,onSave,onClose}){
  const blank={date:todayISO(),mill:'',vendor:'',sku:'',rmForBoxes:'',rmKG:'',buyKG:'',expectedDate:addDays(4),status:'Ordered',remarks:''};
  const [f,setF]=useState({...blank,...(initial||{})});
  const set=(k,v)=>setF(p=>{
    const u={...p,[k]:v};
    const sku=skus.find(s=>s.name===u.sku);
    if(k==='sku' && sku){u.buyKG=sku.buyKG||u.buyKG;}
    if((k==='sku'||k==='rmForBoxes') && sku && safeNum(u.rmForBoxes)>0){
      const ideal=safeNum(sku.idealWastage)/100;
      u.rmKG=Math.round(safeNum(u.rmForBoxes)*safeNum(sku.stdWeight)/(1-ideal));
    }
    return u;
  });
  const rmValue=safeNum(f.rmKG)*safeNum(f.buyKG);
  return <Modal title={f.id?'Edit Mill RM Order':'Add RM Order to Mill'} onClose={onClose} wide>

      <Field label="SKU / Box for which RM is ordered"><Select value={f.sku} onChange={v=>set('sku',v)} options={skus.map(s=>s.name)}/></Field>
      <Field label="RM Ordered for Box Count (PCS)"><Input type="number" value={f.rmForBoxes} onChange={v=>set('rmForBoxes',v)} placeholder="e.g. 20000 boxes"/></Field>
      <Field label="Estimated RM KG"><Input type="number" value={f.rmKG} onChange={v=>set('rmKG',v)}/></Field>

  </Modal>
}

    {key:'qty',label:'Qty',render:d=><>{fN(d.qtyPCS)} PCS<br/><span className="tiny">{fN(d.qtyKG)} KG</span></>},
    {key:'sales',label:'Sales',render:d=><span className="num green-t">{fC(d.revenue)}</span>},
    {key:'invoice',label:'Invoice'},
  ];
  return <>

    <Card title="Customer Order-wise Dispatch Pending"><DataTable columns={orderCols} data={metrics.customerOrderRows.filter(o=>o.status!=='Cancelled')} searchText="Search customer order, client, SKU..." /></Card>

  </>
}

function CalendarPage({metrics}){
  const parseISO=(iso)=>{const [y,m,d]=String(iso||todayISO()).split('-').map(Number);return new Date(y,(m||1)-1,d||1)};
  const fmt=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const datePlus=(iso,days)=>{const d=parseISO(iso);d.setDate(d.getDate()+days);return fmt(d)};
  const isWeekend=(iso)=>{const wd=parseISO(iso).getDay();return wd===0||wd===6};
  const isMon=(iso)=>parseISO(iso).getDay()===1;
  const pretty=(iso)=>parseISO(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
  const weekHdr=(iso)=>{const d=parseISO(iso);const e=new Date(d);e.setDate(d.getDate()+6);return `Week · ${d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})} – ${e.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}`};
  const today=todayISO();
  const sc=(s)=>{const sl=String(s||'').toLowerCase();if(sl==='planned')return 's-planned';if(sl==='pending')return 's-pending';if(sl.includes('confirm')||sl.includes('approved'))return 's-confirmed';return 's-default'};

  const [startDate,setStartDate]=useState(todayISO());
  const [endDate,setEndDate]=useState(addDays(14));
  const [filter,setFilter]=useState('All');
  const [viewMode,setViewMode]=useState('grid');
  const [hideEmpty,setHideEmpty]=useState(false);

  const dateList=useMemo(()=>{
    const s=parseISO(startDate),se=parseISO(endDate||startDate),mx=parseISO(datePlus(startDate,14));
    const fe=se<s?s:(se>mx?mx:se);
    const out=[];const d=new Date(s);while(d<=fe){out.push(fmt(d));d.setDate(d.getDate()+1)}
    return out;
  },[startDate,endDate]);

  const events=useMemo(()=>{
    const list=[];
    const vs=metrics.vendorSplitRows.filter(v=>!['Cancelled','Received'].includes(v.status));
    if(vs.length){vs.forEach(v=>list.push({date:v.date,kind:'receive',party:v.vendor,sku:v.sku,qty:safeNum(v.pendingPCS)||safeNum(v.qtyPCS),ref:v.vendorOrderId,status:v.status,type:'Receive from Vendor'}));}
    else{metrics.orderRows.filter(o=>!['Cancelled','Closed'].includes(o.status)).forEach(o=>{const q=safeNum(o.pendingFG)||safeNum(o.expectedPCS)||safeNum(o.orderQtyPCS);if(o.vendorDeliveryDate&&q>0)list.push({date:o.vendorDeliveryDate,kind:'receive',party:o.vendor,sku:o.sku,qty:q,ref:o.id,status:o.status,type:'Receive from Vendor'});});}
    const cs=metrics.customerSplitRows.filter(s=>!['Cancelled','Dispatched'].includes(s.status));
    if(cs.length){cs.forEach(s=>list.push({date:s.date,kind:'dispatch',party:s.client,sku:s.sku,qty:safeNum(s.pendingPCS)||safeNum(s.qtyPCS),ref:s.customerOrderId,status:s.status,type:'Dispatch to Client'}));}
    else{metrics.orderRows.filter(o=>!['Cancelled','Closed'].includes(o.status)).forEach(o=>{const q=safeNum(o.pendingDispatch)||safeNum(o.orderQtyPCS);if(o.clientDeliveryDate&&q>0)list.push({date:o.clientDeliveryDate,kind:'dispatch',party:o.client,sku:o.sku,qty:q,ref:o.id,status:'Pending',type:'Dispatch to Client'});});}
    return list;
  },[metrics.orderRows,metrics.customerSplitRows,metrics.vendorSplitRows]);

  const visible=events.filter(e=>dateList.includes(e.date)&&(filter==='All'||e.type===filter)).sort((a,b)=>a.date.localeCompare(b.date)||a.kind.localeCompare(b.kind));
  const recPCS=visible.filter(e=>e.kind==='receive').reduce((a,e)=>a+safeNum(e.qty),0);
  const disPCS=visible.filter(e=>e.kind==='dispatch').reduce((a,e)=>a+safeNum(e.qty),0);
  const activeDays=dateList.filter(dt=>visible.some(e=>e.date===dt)).length;
  const shownDates=hideEmpty?dateList.filter(dt=>visible.some(e=>e.date===dt)):dateList;

  // Group dates into week rows of 4
  const weeks=useMemo(()=>{
    const rows=[];let cur=[];
    shownDates.forEach((dt,i)=>{
      if((isMon(dt)||i===0)&&cur.length>0){rows.push({label:weekHdr(cur[0]),dates:cur});cur=[]}
      cur.push(dt);
    });
    if(cur.length)rows.push({label:weekHdr(cur[0]),dates:cur});
    return rows;
  },[shownDates]);

  return <div className="cal-page">
    {/* Title + controls */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6,flexWrap:'wrap',gap:6}}>
      <div>
        <h2 style={{fontFamily:"'Sora',sans-serif",fontSize:17,fontWeight:800,letterSpacing:'-.4px',color:'#0f172a'}}>15-Day Delivery Planner</h2>
        <p style={{fontSize:11,color:'#64748b',marginTop:1}}>{pretty(dateList[0])} → {pretty(dateList[dateList.length-1])} &nbsp;·&nbsp; {dateList.length} days &nbsp;·&nbsp; {activeDays} active</p>
      </div>
      <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
        <input className="inp" style={{width:120,padding:'4px 8px',fontSize:11,height:28,borderRadius:7}} type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}/>
        <input className="inp" style={{width:120,padding:'4px 8px',fontSize:11,height:28,borderRadius:7}} type="date" value={endDate} min={startDate} max={datePlus(startDate,14)} onChange={e=>setEndDate(e.target.value)}/>
        <select className="sel" style={{width:160,padding:'4px 8px',fontSize:11,height:28,borderRadius:7}} value={filter} onChange={e=>setFilter(e.target.value)}><option>All</option><option>Receive from Vendor</option><option>Dispatch to Client</option></select>
        <button className="btn secondary" style={{fontSize:11,padding:'4px 9px',height:28,borderRadius:7}} onClick={()=>{setStartDate(todayISO());setEndDate(addDays(14))}}>↺ Today</button>
        <button className="btn secondary" style={{fontSize:11,padding:'4px 9px',height:28,borderRadius:7}} onClick={()=>exportCSV(visible,'delivery_plan.csv')}>⬇ CSV</button>
      </div>
    </div>

    {/* KPI strip */}
    <div className="cal-strip">
      <div className="cal-strip-item"><span className="csi-icon">🗓️</span><div><div className="csi-label">Window</div><div className="csi-val cv-dark">{dateList.length} Days</div><div className="csi-sub">{activeDays} active · {dateList.length-activeDays} idle</div></div></div>
      <div className="cal-strip-item"><span className="csi-icon">🚚</span><div><div className="csi-label">Outbound</div><div className="csi-val cv-green">{fN(disPCS)} PCS</div><div className="csi-sub">{visible.filter(e=>e.kind==='dispatch').length} client dispatches</div></div></div>
      <div className="cal-strip-item"><span className="csi-icon">📥</span><div><div className="csi-label">Inbound</div><div className="csi-val cv-blue">{fN(recPCS)} PCS</div><div className="csi-sub">{visible.filter(e=>e.kind==='receive').length} vendor shipments</div></div></div>
      <div className="cal-strip-item"><span className="csi-icon">📦</span><div><div className="csi-label">Total Movement</div><div className="csi-val cv-purple">{fN(recPCS+disPCS)} PCS</div><div className="csi-sub">{visible.length} events</div></div></div>
    </div>

    {/* Toolbar */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7,gap:8,flexWrap:'wrap'}}>
      <div className="tabs" style={{padding:3}}>
        <button className={viewMode==='grid'?'active':''} style={{padding:'4px 10px',fontSize:11}} onClick={()=>setViewMode('grid')}>📅 Grid</button>
        <button className={viewMode==='table'?'active':''} style={{padding:'4px 10px',fontSize:11}} onClick={()=>setViewMode('table')}>📋 Table</button>
      </div>
      <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        <label style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer',userSelect:'none',fontSize:11,fontWeight:700,color:'#475569'}}>
          <input type="checkbox" checked={hideEmpty} onChange={e=>setHideEmpty(e.target.checked)} style={{accentColor:'#6366f1',width:12,height:12}}/>Hide idle days
        </label>
        <span style={{fontSize:10,color:'#94a3b8',fontWeight:800,display:'flex',alignItems:'center',gap:4}}><span style={{width:9,height:9,borderRadius:'50%',background:'#059669',display:'inline-block'}}></span>Dispatch</span>
        <span style={{fontSize:10,color:'#94a3b8',fontWeight:800,display:'flex',alignItems:'center',gap:4}}><span style={{width:9,height:9,borderRadius:'50%',background:'#1d4ed8',display:'inline-block'}}></span>Receive</span>
        <span style={{fontSize:10,color:'#94a3b8',fontWeight:800,display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,borderRadius:2,background:'#6366f1',display:'inline-block'}}></span>Today</span>
      </div>
    </div>

    {/* Grid view */}
    {viewMode==='grid'&&<div>
      {weeks.map((wk,wi)=><div key={wi} style={{marginBottom:8}}>
        <div className="cal-wk"><span>{wk.label}</span></div>
        <div className="cal-grid-row" style={{gap:4}}>
          {wk.dates.map(dt=>{
            const evs=visible.filter(e=>e.date===dt);
            const dis=evs.filter(e=>e.kind==='dispatch');
            const rec=evs.filter(e=>e.kind==='receive');
            const disQty=dis.reduce((a,e)=>a+safeNum(e.qty),0);
            const recQty=rec.reduce((a,e)=>a+safeNum(e.qty),0);
            const d=parseISO(dt);
            const isTd=dt===today,isWknd=isWeekend(dt);
            return <div key={dt} className={`cdc${isTd?' is-today':''}${isWknd?' is-weekend':''}${evs.length===0?' is-empty':''}`}>
              {/* LEFT: date + dispatch */}
              <div className="cdc-left">
                <div className="cdc-date-row">
                  <span className="cdc-num">{d.getDate()}</span>
                  <span className="cdc-dow">{d.toLocaleDateString('en-IN',{weekday:'short'}).toUpperCase()}</span>
                  <span className="cdc-mon">{d.toLocaleDateString('en-IN',{month:'short'})}</span>
                  {isTd&&<span className="cdc-today-tag">Today</span>}
                  {!isTd&&isWknd&&<span className="cdc-wknd-tag">Wknd</span>}
                </div>
                <div className="cdc-disp-hdr">
                  <span className="cdc-disp-lbl">🚚 Dispatch</span>
                  {disQty>0&&<span className="cdc-disp-qty">{fN(disQty)}</span>}
                </div>
                {dis.length?dis.map((e,i)=><div key={i} style={{background:'rgba(255,255,255,.7)',borderRadius:5,padding:'3px 5px',marginBottom:2,border:'1px solid #bbf7d0'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:3}}>
                    <span style={{fontFamily:"'Sora',sans-serif",fontSize:11,fontWeight:800,color:'#059669'}}>{fN(e.qty)} PCS</span>
                    {e.status&&<span className={`cdc-ev-st ${sc(e.status)}`}>{e.status}</span>}
                  </div>
                  <div style={{fontSize:10,fontWeight:700,color:'#1e293b',marginTop:1}}>{e.sku}</div>
                  {e.party&&<div style={{fontSize:9,color:'#64748b',fontWeight:600}}>{e.party}{e.ref?<span style={{color:'#94a3b8'}}> · {e.ref}</span>:null}</div>}
                </div>):<span className="cdc-empty">NO DISPATCHES</span>}
              </div>
              {/* RIGHT: receive */}
              <div className="cdc-right">
                <div className="cdc-recv-hdr">
                  <span className="cdc-recv-lbl">📥 Receive</span>
                  {recQty>0&&<span className="cdc-recv-qty">{fN(recQty)}</span>}
                </div>
                {rec.length?rec.map((e,i)=><div key={i} style={{background:'rgba(255,255,255,.7)',borderRadius:5,padding:'3px 5px',marginBottom:2,border:'1px solid #bfdbfe'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:3}}>
                    <span style={{fontFamily:"'Sora',sans-serif",fontSize:11,fontWeight:800,color:'#1d4ed8'}}>{fN(e.qty)} PCS</span>
                    {e.status&&<span className={`cdc-ev-st ${sc(e.status)}`}>{e.status}</span>}
                  </div>
                  <div style={{fontSize:10,fontWeight:700,color:'#1e293b',marginTop:1}}>{e.sku}</div>
                  {e.party&&<div style={{fontSize:9,color:'#64748b',fontWeight:600}}>{e.party}{e.ref?<span style={{color:'#94a3b8'}}> · {e.ref}</span>:null}</div>}
                </div>):<span className="cdc-empty">NO RECEIPTS</span>}
              </div>
            </div>
          })}
        </div>
      </div>)}
      {shownDates.length===0&&<div style={{textAlign:'center',padding:'32px',color:'#94a3b8',fontSize:13,fontWeight:700}}>No events in selected range</div>}
    </div>}

    {/* Table view */}
    {viewMode==='table'&&<DataTable columns={[
      {key:'date',label:'Date',render:e=><span style={{fontWeight:800,color:e.date===today?'#6366f1':'#0f172a'}}>{pretty(e.date)} <span style={{fontSize:10,color:'#94a3b8',fontWeight:700}}>{parseISO(e.date).toLocaleDateString('en-IN',{weekday:'short'})}</span></span>},
      {key:'type',label:'Type',render:e=><Badge color={e.kind==='receive'?'blue':'green'}>{e.kind==='receive'?'📥 Inbound':'🚚 Outbound'}</Badge>},
      {key:'qty',label:'Qty',render:e=><span className={`num ${e.kind==='receive'?'blue-t':'green-t'}`}>{fN(e.qty)} PCS</span>},
      {key:'sku',label:'SKU',render:e=><b style={{fontSize:12}}>{e.sku}</b>},
      {key:'party',label:'Party',render:e=><span style={{fontSize:12,fontWeight:700}}>{e.party}</span>},
      {key:'ref',label:'Ref',render:e=><span className="tiny blue-t">{e.ref}</span>},
      {key:'status',label:'Status',render:e=><Badge color={String(e.status||'').toLowerCase()==='planned'?'amber':String(e.status||'').toLowerCase()==='pending'?'blue':String(e.status||'').toLowerCase().includes('confirm')?'green':'gray'}>{e.status||'—'}</Badge>}
    ]} data={visible} searchText="Search delivery plan..."/>}
  </div>
}

  const [f,setF]=useState({...blank,...(initial||{})});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const save=()=>{
    if(!String(f.name||'').trim()){alert('SKU name is required');return;}
    onSave({
      ...f,
      name:String(f.name).trim(),
      stdWeight:safeNum(f.stdWeight),openingStockPCS:safeNum(f.openingStockPCS),dailyUse:safeNum(f.dailyUse),
      sellPCS:safeNum(f.sellPCS),sellKG:safeNum(f.sellKG),buyKG:safeNum(f.buyKG),mfgKG:safeNum(f.mfgKG),logCost:safeNum(f.logCost),idealWastage:safeNum(f.idealWastage)
    });
  };
  return <Modal title={initial?'Edit SKU / Box Master':'Add SKU / Box Master'} onClose={onClose} wide>
    <div className="form-grid">
      <Field label="SKU / Box Name"><Input value={f.name} onChange={v=>set('name',v)} placeholder="e.g. Yogabaar 5 Ply Box"/></Field>
      <Field label="Client"><Select value={f.client} onChange={v=>set('client',v)} options={clients.map(c=>c.name)}/></Field>
      <Field label="Box Size"><Input value={f.size} onChange={v=>set('size',v)} placeholder="L×W×H cm"/></Field>
      <Field label="Ply"><Select value={f.ply} onChange={v=>set('ply',v)} options={['3 Ply','5 Ply','7 Ply','9 Ply']}/></Field>
      <Field label="GSM / Paper Combination"><Input value={f.gsm} onChange={v=>set('gsm',v)} placeholder="120/90/120"/></Field>
      <Field label="Selling Unit"><Select value={f.unit} onChange={v=>set('unit',v)} options={['PCS','KG']}/></Field>
      <Field label="Std Weight per PCS in KG"><Input type="number" value={f.stdWeight} onChange={v=>set('stdWeight',v)} placeholder="0.80"/></Field>
      <Field label="Opening Stock PCS"><Input type="number" value={f.openingStockPCS} onChange={v=>set('openingStockPCS',v)} placeholder="0"/></Field>
      <Field label="Daily Consumption / Plan PCS"><Input type="number" value={f.dailyUse} onChange={v=>set('dailyUse',v)} placeholder="For stock days prediction"/></Field>
      <Field label="Selling Price / PCS"><Input type="number" value={f.sellPCS} onChange={v=>set('sellPCS',v)} placeholder="₹"/></Field>
      <Field label="Selling Price / KG"><Input type="number" value={f.sellKG} onChange={v=>set('sellKG',v)} placeholder="₹"/></Field>
      <Field label="Buying Cost / KG"><Input type="number" value={f.buyKG} onChange={v=>set('buyKG',v)} placeholder="₹"/></Field>
      <Field label="Job Work / Mfg Cost / KG"><Input type="number" value={f.mfgKG} onChange={v=>set('mfgKG',v)} placeholder="₹"/></Field>
      <Field label="Logistics Cost / KG"><Input type="number" value={f.logCost} onChange={v=>set('logCost',v)} placeholder="₹"/></Field>
      <Field label="Ideal Wastage %"><Input type="number" value={f.idealWastage} onChange={v=>set('idealWastage',v)} placeholder="3"/></Field>
      <Field label="Status"><Select value={f.status} onChange={v=>set('status',v)} options={['Active','Inactive']}/></Field>
      <Field label="Notes" full><Input value={f.notes} onChange={v=>set('notes',v)} placeholder="Any extra SKU detail"/></Field>
    </div>
    <div className="calc-strip"><div className="calc-item"><label>7 Days Safety Stock</label><strong>{fN(safeNum(f.dailyUse)*7)} PCS</strong></div><div className="calc-item"><label>RM for 1,000 PCS</label><strong>{fN(safeNum(f.stdWeight)*1000/(1-safeNum(f.idealWastage)/100))} KG</strong></div><div className="calc-item"><label>Sell Value / 1,000 PCS</label><strong>{fC(safeNum(f.sellPCS)*1000)}</strong></div><div className="calc-item"><label>RM Cost / 1,000 PCS</label><strong>{fC((safeNum(f.stdWeight)*1000/(1-safeNum(f.idealWastage)/100))*safeNum(f.buyKG))}</strong></div></div>
    <div className="actions" style={{justifyContent:'flex-end',marginTop:18}}><Button variant="secondary" onClick={onClose}>Cancel</Button><Button onClick={save}>{initial?'Update SKU':'Save SKU'}</Button></div>
  </Modal>
}

function MastersPage({skus,setSkus,vendors,setVendors,clients,setClients}){
  const [tab,setTab]=useState('skus');
  const [modal,setModal]=useState(null);
  const [editRow,setEditRow]=useState(null);

  const addNew=()=>{setEditRow(null);setModal(tab)};
  const edit=(type,row)=>{setEditRow(row);setModal(type)};
  const close=()=>{setModal(null);setEditRow(null)};

  const saveClient=(row)=>{
    if(editRow) setClients(p=>p.map(x=>x.id===editRow.id?{...x,...row,id:editRow.id}:x));
    else setClients(p=>[...p,{...row,id:genId('C',p)}]);
    close();
  };
  const saveVendor=(row)=>{
    if(editRow) setVendors(p=>p.map(x=>x.id===editRow.id?{...x,...row,id:editRow.id}:x));
    else setVendors(p=>[...p,{...row,id:genId('V',p)}]);
    close();
  };
  const saveSKU=(row)=>{
    if(editRow) setSkus(p=>p.map(x=>x.id===editRow.id?{...x,...row,id:editRow.id}:x));
    else setSkus(p=>[...p,{...row,id:genId('S',p)}]);
    close();
  };

  const removeCloud=async(table,id)=>{try{if(sb) await sb.from(table).delete().eq('id',id)}catch(e){console.error(e)}};
  const del=(type,row)=>{
    if(!window.confirm(`Delete ${row.name || row.id}?`)) return;
    if(type==='skus'){setSkus(p=>p.filter(x=>x.id!==row.id));removeCloud(CLOUD_TABLES.skus,row.id)}
    if(type==='vendors'){setVendors(p=>p.filter(x=>x.id!==row.id));removeCloud(CLOUD_TABLES.vendors,row.id)}
    if(type==='clients'){setClients(p=>p.filter(x=>x.id!==row.id));removeCloud(CLOUD_TABLES.clients,row.id)}
  };

  const actionCol=(type)=>({key:'actions',label:'Actions',render:r=><div className="actions" style={{marginTop:0}}><Button variant="outline" onClick={()=>edit(type,r)}>Edit</Button><Button variant="danger" onClick={()=>del(type,r)}>Delete</Button></div>});

  const skuCols=[
    {key:'id',label:'ID',render:s=><span className="num blue-t">{s.id}</span>},{key:'name',label:'SKU Name',render:s=><b>{s.name}</b>},{key:'client',label:'Client'},{key:'size',label:'Size'},{key:'ply',label:'Ply'},
    {key:'stdWeight',label:'Weight/PCS',render:s=>`${fN(s.stdWeight,3)} KG`},{key:'openingStockPCS',label:'Opening Stock',render:s=><span className="num green-t">{fN(s.openingStockPCS)}</span>},{key:'dailyUse',label:'Daily Use',render:s=>fN(s.dailyUse)},
    {key:'sellPCS',label:'Sell/PCS',render:s=>fC(s.sellPCS)},{key:'buyKG',label:'Buy/KG',render:s=>fC(s.buyKG)},{key:'mfgKG',label:'Mfg/KG',render:s=>fC(s.mfgKG)},{key:'status',label:'Status',render:s=><Badge color={s.status==='Active'?'green':'gray'}>{s.status||'Active'}</Badge>},actionCol('skus')
  ];
  const vendorCols=[
    {key:'id',label:'ID',render:v=><span className="num blue-t">{v.id}</span>},{key:'name',label:'Vendor / Job Worker',render:v=><b>{v.name}</b>},{key:'contact',label:'Contact'},{key:'mobile',label:'Mobile'},{key:'location',label:'Location'},
    {key:'gst',label:'GST'},{key:'rate',label:'Rate/KG',render:v=>fC(v.rate)},{key:'wastageAllowance',label:'Wastage %',render:v=>`${fN(v.wastageAllowance,2)}%`},{key:'status',label:'Status',render:v=><Badge color={v.status==='Active'?'green':'gray'}>{v.status||'Active'}</Badge>},actionCol('vendors')
  ];
  const clientCols=[
    {key:'id',label:'ID',render:c=><span className="num blue-t">{c.id}</span>},{key:'name',label:'Client',render:c=><b>{c.name}</b>},{key:'contact',label:'Contact'},{key:'mobile',label:'Mobile'},{key:'email',label:'Email'},{key:'gst',label:'GST'},{key:'terms',label:'Terms'},{key:'status',label:'Status',render:c=><Badge color={c.status==='Active'?'green':'gray'}>{c.status||'Active'}</Badge>},actionCol('clients')
  ];

  const sub={skus:'Add/edit box SKU, pricing, daily consumption and safety-stock settings',vendors:'Add/edit job workers, manufacturing rates, wastage and contact details',clients:'Add/edit clients, GST, contact and billing details'}[tab];
  return <>
    <PageHead title="Masters" sub={sub}>
      <div className="tabs"><button className={tab==='skus'?'active':''} onClick={()=>setTab('skus')}>SKU Master</button><button className={tab==='vendors'?'active':''} onClick={()=>setTab('vendors')}>Vendor Master</button><button className={tab==='clients'?'active':''} onClick={()=>setTab('clients')}>Client Master</button></div>
      <Button onClick={addNew}>+ Add {tab==='skus'?'SKU':tab==='vendors'?'Vendor':'Client'}</Button>
    </PageHead>
    {tab==='skus'&&<DataTable columns={skuCols} data={skus} searchText="Search SKU master..."/>}
    {tab==='vendors'&&<DataTable columns={vendorCols} data={vendors} searchText="Search vendor master..."/>}
    {tab==='clients'&&<DataTable columns={clientCols} data={clients} searchText="Search client master..."/>}
    {modal==='skus'&&<SKUMasterForm initial={editRow} clients={clients} onSave={saveSKU} onClose={close}/>} 
    {modal==='vendors'&&<VendorMasterForm initial={editRow} onSave={saveVendor} onClose={close}/>} 
    {modal==='clients'&&<ClientMasterForm initial={editRow} onSave={saveClient} onClose={close}/>} 
  </>
}

function Sidebar({page,setPage}){
  const items=[
    ['dashboard','📊','Command Center'],['customerOrders','📋','Customer Orders'],['orders','🏭','Vendor Orders'],['inventory','📦','Inventory Control'],['jobwork','⚖️','RM vs FG Job Work'],['dispatch','🚚','Dispatch Control'],['pnl','💰','Profit & Loss'],['calendar','🗓️','Delivery Calendar'],['masters','⚙️','Masters']
  ];
  return <aside className="sidebar"><div className="brand"><div className="logo">📦</div><h1>BGSG-BLR</h1><p>Contract manufacturing + trading control</p></div><div className="nav">{items.map(([id,ico,label])=><button key={id} className={page===id?'active':''} onClick={()=>setPage(id)}><span className="ico">{ico}</span>{label}</button>)}</div><div className="sidebar-footer">Made for Details</div></aside>
}

function App(){
  const [page,setPage]=useState('dashboard');
  const [clients,setClients,clientsSync]=useSupabaseState(CLOUD_TABLES.clients,'bp_clients_v4',START_CLIENTS);
  const [vendors,setVendors,vendorsSync]=useSupabaseState(CLOUD_TABLES.vendors,'bp_vendors_v4',START_VENDORS);
  const [skus,setSkus,skusSync]=useSupabaseState(CLOUD_TABLES.skus,'bp_skus_v4',START_SKUS);
  const [orders,setOrders,ordersSync]=useSupabaseState(CLOUD_TABLES.orders,'bp_orders_v4',START_ORDERS);
  const [receipts,setReceipts,receiptsSync]=useSupabaseState(CLOUD_TABLES.receipts,'bp_receipts_v4',START_RECEIPTS);
  const [dispatches,setDispatches,dispatchesSync]=useSupabaseState(CLOUD_TABLES.dispatches,'bp_dispatches_v4',START_DISPATCHES);
  const [rmOrders,setRmOrders,rmOrdersSync]=useSupabaseState(CLOUD_TABLES.rmOrders,'bp_rm_orders_v4',START_RM_ORDERS);
  const [customerOrders,setCustomerOrders,customerOrdersSync]=useSupabaseState(CLOUD_TABLES.customerOrders,'bp_customer_orders_v1',START_CUSTOMER_ORDERS);
  const [customerSplits,setCustomerSplits,customerSplitsSync]=useSupabaseState(CLOUD_TABLES.customerSplits,'bp_customer_splits_v1',START_CUSTOMER_SPLITS);
  const [vendorSplits,setVendorSplits,vendorSplitsSync]=useSupabaseState(CLOUD_TABLES.vendorSplits,'bp_vendor_splits_v1',START_VENDOR_SPLITS);
  const metrics=useMemo(()=>makeMetrics(skus,orders,receipts,dispatches,rmOrders,customerOrders,customerSplits,vendorSplits),[skus,orders,receipts,dispatches,rmOrders,customerOrders,customerSplits,vendorSplits]);
  const backup={clients,vendors,skus,orders,receipts,dispatches,rmOrders,customerOrders,customerSplits,vendorSplits};
  const syncs=[clientsSync,vendorsSync,skusSync,ordersSync,receiptsSync,dispatchesSync,rmOrdersSync,customerOrdersSync,customerSplitsSync,vendorSplitsSync];
  const hasError=syncs.some(x=>String(x.status).toLowerCase().includes('error'));
  const syncErrors=syncs.filter(x=>String(x.status).toLowerCase().includes('error')).map(x=>`${x.table}: ${x.error}`).join('\n');
  const cloudText=!sb?'Local only':hasError?'Supabase sync issue':'Supabase cloud sync active';
  return <div className="app"><Sidebar page={page} setPage={setPage}/><main className="main">
    <div className="actions no-print" style={{justifyContent:'flex-end',marginBottom:12}}><span title={syncErrors} className={`badge ${hasError?'red':'green'}`}>{cloudText}</span>{hasError&&<Button variant="secondary" onClick={()=>alert(syncErrors || 'No error detail found')}>⚠ Sync Details</Button>}<Button variant="secondary" onClick={()=>downloadBackup(backup)}>💾 Backup JSON</Button><Button variant="secondary" onClick={()=>window.print()}>🖨 Print</Button></div>
    {page==='dashboard'&&<Dashboard metrics={metrics} setPage={setPage}/>} 
    {page==='customerOrders'&&<CustomerOrdersPage skus={skus} clients={clients} customerOrders={customerOrders} setCustomerOrders={setCustomerOrders} customerSplits={customerSplits} setCustomerSplits={setCustomerSplits} dispatches={dispatches} setDispatches={setDispatches} metrics={metrics}/>} 
    {page==='orders'&&<OrdersPage skus={skus} vendors={vendors} clients={clients} orders={orders} setOrders={setOrders} receipts={receipts} setReceipts={setReceipts} dispatches={dispatches} setDispatches={setDispatches} vendorSplits={vendorSplits} setVendorSplits={setVendorSplits} metrics={metrics}/>} 
    {page==='inventory'&&<InventoryPage skus={skus} setSkus={setSkus} vendors={vendors} rmOrders={rmOrders} setRmOrders={setRmOrders} metrics={metrics}/>} 
    {page==='jobwork'&&<JobWorkPage orders={orders} receipts={receipts} setReceipts={setReceipts} metrics={metrics} skus={skus}/>} 
    {page==='dispatch'&&<DispatchPage skus={skus} clients={clients} setDispatches={setDispatches} metrics={metrics}/>} 
    {page==='pnl'&&<PnLPage metrics={metrics}/>} 
    {page==='calendar'&&<CalendarPage metrics={metrics}/>} 
    {page==='masters'&&<MastersPage skus={skus} setSkus={setSkus} vendors={vendors} setVendors={setVendors} clients={clients} setClients={setClients}/>} 
  </main></div>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
