<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BGSG Inventory Software - Order, Stock & Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#eef4fb;--card:#fff;--text:#111827;--muted:#64748b;--light:#94a3b8;--border:#e2e8f0;
  --green:#059669;--green2:#dcfce7;--blue:#1d4ed8;--blue2:#dbeafe;--amber:#b45309;--amber2:#fef3c7;--red:#dc2626;--red2:#fee2e2;--purple:#7c3aed;--purple2:#ede9fe;--slate:#0f172a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{min-height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
button,input,select,textarea{font-family:'DM Sans',sans-serif}
button{cursor:pointer}
input:focus,select:focus,textarea:focus{outline:2px solid rgba(5,150,105,.22);border-color:var(--green)!important}
::-webkit-scrollbar{width:7px;height:7px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
.app{display:flex;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:250px;background:#0f172a;color:#cbd5e1;z-index:20;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.08)}
.brand{padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand .logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#059669,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:10px}
.brand h1{font-family:'Sora',sans-serif;color:#fff;font-size:16px;line-height:1.25}.brand p{font-size:11px;color:#94a3b8;margin-top:4px}
.nav{padding:12px 10px;overflow:auto;flex:1}.nav button{width:100%;border:0;background:transparent;color:#cbd5e1;padding:10px 12px;border-radius:10px;text-align:left;display:flex;gap:10px;align-items:center;font-size:13px;font-weight:600;margin-bottom:4px}.nav button:hover{background:#1e293b}.nav button.active{background:#047857;color:#fff}.nav .ico{width:22px;text-align:center}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#94a3b8;line-height:1.4}
.main{margin-left:250px;width:calc(100% - 250px);padding:16px 20px 36px}
.page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:18px}.page-head h2{font-family:'Sora',sans-serif;font-size:23px;letter-spacing:-.5px}.page-head p{color:var(--muted);font-size:13px;margin-top:4px}.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{border:0;border-radius:10px;padding:9px 14px;font-weight:700;font-size:13px;display:inline-flex;gap:7px;align-items:center;justify-content:center;white-space:nowrap}.btn.primary{background:var(--green);color:#fff}.btn.secondary{background:#fff;border:1px solid var(--border);color:#334155}.btn.danger{background:var(--red);color:#fff}.btn.amber{background:var(--amber);color:#fff}.btn.blue{background:var(--blue);color:#fff}.btn.outline{background:#fff;border:1px solid var(--green);color:var(--green)}.btn.ghost{background:transparent;color:#475569}.btn:disabled{opacity:.5;cursor:not-allowed}
.grid{display:grid;gap:14px}.kpi-grid{grid-template-columns:repeat(6,minmax(150px,1fr));margin-bottom:16px}.kpi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:0 1px 2px rgba(15,23,42,.04)}.kpi .top{display:flex;justify-content:space-between;gap:10px}.kpi label{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.4px}.kpi strong{display:block;font-family:'Sora',sans-serif;font-size:24px;margin-top:8px;letter-spacing:-.5px}.kpi small{display:block;color:var(--muted);margin-top:4px;font-size:12px}.kpi.green{background:#f0fdf4;border-color:#bbf7d0}.kpi.blue{background:#eff6ff;border-color:#bfdbfe}.kpi.amber{background:#fffbeb;border-color:#fde68a}.kpi.red{background:#fff1f2;border-color:#fecdd3}.kpi.purple{background:#faf5ff;border-color:#e9d5ff}.kpi .icon{font-size:25px;opacity:.75}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 1px 2px rgba(15,23,42,.04)}.card-head{padding:15px 17px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px}.card-title{font-family:'Sora',sans-serif;font-size:14px;font-weight:800}.card-body{padding:16px}.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}.toolbar .search{position:relative}.toolbar .search span{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--light)}
.inp,.sel,.txt{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;background:#fff;color:var(--text)}.toolbar .inp{padding-left:34px;width:270px}.sel.wide{width:230px}.muted{color:var(--muted)}.tiny{font-size:11px;color:var(--light)}
.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:14px;background:#fff}.table{width:100%;border-collapse:separate;border-spacing:0;min-width:1050px}.table th{position:sticky;top:0;background:#f8fafc;color:#475569;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.45px;font-weight:800;padding:11px 13px;border-bottom:1px solid var(--border);z-index:1}.table td{padding:12px 13px;border-bottom:1px solid #eef2f7;font-size:13px;vertical-align:middle}.table tr:hover td{background:#fbfdff}.table tr:last-child td{border-bottom:0}.num{font-weight:800;font-family:'Sora',sans-serif}.green-t{color:var(--green)}.blue-t{color:var(--blue)}.amber-t{color:var(--amber)}.red-t{color:var(--red)}.right{text-align:right}.center{text-align:center}.nowrap{white-space:nowrap}.ellipsis{max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:99px;padding:4px 9px;font-size:11px;font-weight:800;white-space:nowrap}.badge.green{background:var(--green2);color:#166534}.badge.blue{background:var(--blue2);color:#1e40af}.badge.amber{background:var(--amber2);color:#92400e}.badge.red{background:var(--red2);color:#991b1b}.badge.gray{background:#f1f5f9;color:#475569}.badge.purple{background:var(--purple2);color:#5b21b6}
.progress{height:8px;background:#e2e8f0;border-radius:99px;overflow:hidden;margin-top:5px}.progress span{display:block;height:100%;border-radius:99px;background:var(--green);min-width:2px}.progress.red span{background:var(--red)}.progress.amber span{background:#f59e0b}.progress.blue span{background:var(--blue)}
.split{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.two{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px}.field label{display:block;font-size:12px;color:#475569;font-weight:700;margin-bottom:6px}.field.full{grid-column:1/-1}.calc-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;background:#f8fafc;border:1px solid var(--border);border-radius:13px;padding:13px;margin-top:13px}.calc-item{text-align:center}.calc-item label{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.3px}.calc-item strong{font-family:'Sora',sans-serif;font-size:15px;margin-top:3px;display:block}.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.62);z-index:100;display:flex;align-items:flex-start;justify-content:center;overflow:auto;padding:32px 16px}.modal{background:#fff;border-radius:18px;width:720px;max-width:96vw;box-shadow:0 30px 80px rgba(15,23,42,.35)}.modal.wide{width:980px}.modal-head{padding:17px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;border-radius:18px 18px 0 0;z-index:2}.modal-head h3{font-family:'Sora',sans-serif;font-size:16px}.x{border:0;background:#f1f5f9;border-radius:9px;width:32px;height:32px}.modal-body{padding:20px 22px}.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.detail{background:#f8fafc;border:1px solid var(--border);border-radius:13px;padding:12px}.detail label{font-size:10px;color:var(--muted);font-weight:800;text-transform:uppercase}.detail strong{display:block;margin-top:6px;font-size:14px}.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day{min-height:116px;background:#fff;border:1px solid var(--border);border-radius:13px;padding:8px}.day .dnum{font-weight:800;color:#334155;font-size:12px;margin-bottom:6px}.chip{display:block;border-radius:9px;padding:7px 8px;font-size:11px;font-weight:800;margin-bottom:6px;line-height:1.25;overflow:hidden;text-overflow:ellipsis;border:1px solid transparent}.chip small{display:block;font-weight:700;opacity:.82;margin-top:3px}.chip.vendor,.chip.receive{background:#eff6ff;color:#1e40af;border-color:#bfdbfe}.chip.client,.chip.dispatch{background:#f0fdf4;color:#166534;border-color:#bbf7d0}.plan-board{overflow-x:auto;padding-bottom:6px}.plan-grid{display:grid;gap:10px}.plan-day{min-height:155px;min-width:185px}
/* ═══ GRID CALENDAR ═══ */
.cal-page{display:flex;flex-direction:column;gap:0}

/* ── KPI strip ── */
.cal-strip{display:flex;gap:0;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:7px}
.cal-strip-item{flex:1;display:flex;align-items:center;gap:8px;padding:7px 12px;border-right:1px solid var(--border)}
.cal-strip-item:last-child{border-right:0}
.csi-icon{font-size:15px;flex-shrink:0}
.csi-label{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.4px;color:#94a3b8}
.csi-val{font-family:'Sora',sans-serif;font-size:14px;font-weight:800;line-height:1.1;letter-spacing:-.3px}
.csi-sub{font-size:9px;color:#94a3b8;font-weight:700}
.csi-val.cv-blue{color:#1d4ed8}.csi-val.cv-green{color:#059669}.csi-val.cv-purple{color:#7c3aed}.csi-val.cv-dark{color:#0f172a}

/* ── Week separator ── */
.cal-wk{display:flex;align-items:center;gap:8px;padding:5px 0 3px;margin-top:2px}
.cal-wk::after{content:'';flex:1;height:1px;background:#e8edf2}
.cal-wk span{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.7px;color:#cbd5e1;white-space:nowrap}

/* ── Day grid: 4 cards per row ── */
.cal-grid-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:0}

/* ── Day card: left=date+dispatch, right=receive ── */
.cdc{border:1px solid #e2e8f0;border-radius:9px;overflow:visible;display:grid;grid-template-columns:1fr 1fr;min-height:60px}
.cdc:hover{border-color:#b6c2ce}
.cdc.is-today{border-color:#a5b4fc;border-left:2px solid #6366f1}
.cdc.is-weekend{opacity:1}
.cdc.is-empty{opacity:1}

/* Left half — Dispatch */
.cdc-left{background:#f0fdf4;border-right:1px solid #bbf7d0;padding:5px 6px;display:flex;flex-direction:column;gap:2px;border-radius:8px 0 0 8px}
.cdc-date-row{display:flex;align-items:baseline;gap:4px;margin-bottom:2px}
.cdc-num{font-family:'Sora',sans-serif;font-size:13px;font-weight:800;color:#0f172a;line-height:1}
.is-today .cdc-num{color:#6366f1}
.is-weekend .cdc-num{color:#94a3b8}
.cdc-dow{font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.3px;color:#94a3b8}
.cdc-mon{font-size:8px;font-weight:700;color:#b0bec5;margin-left:auto}
.cdc-disp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.cdc-disp-lbl{font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.3px;color:#059669;display:flex;align-items:center;gap:3px}
.cdc-disp-qty{font-family:'Sora',sans-serif;font-size:9px;font-weight:800;color:#059669}
.cdc-today-tag{background:#ede9fe;color:#6366f1;font-size:7px;font-weight:900;text-transform:uppercase;padding:1px 4px;border-radius:3px;letter-spacing:.2px}
.cdc-wknd-tag{background:#f1f5f9;color:#94a3b8;font-size:7px;font-weight:900;text-transform:uppercase;padding:1px 4px;border-radius:3px;letter-spacing:.2px}

/* Right half — Receive */
.cdc-right{background:#eff6ff;padding:5px 6px;display:flex;flex-direction:column;gap:2px;border-radius:0 8px 8px 0}
.cdc-recv-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;margin-top:18px}
.cdc-recv-lbl{font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.3px;color:#1d4ed8;display:flex;align-items:center;gap:3px}
.cdc-recv-qty{font-family:'Sora',sans-serif;font-size:9px;font-weight:800;color:#1d4ed8}

/* Event line within a card — NO truncation, full content visible */
.cdc-ev{display:flex;align-items:baseline;gap:3px;line-height:1.5;flex-wrap:wrap;padding:1px 0}
.cdc-ev-qty{font-family:'Sora',sans-serif;font-size:10px;font-weight:800;white-space:nowrap;flex-shrink:0}
.cdc-left .cdc-ev-qty{color:#059669}
.cdc-right .cdc-ev-qty{color:#1d4ed8}
.cdc-ev-dot{width:2px;height:2px;border-radius:50%;background:#b0bec5;flex-shrink:0;margin-top:5px}
.cdc-ev-sku{font-size:10px;font-weight:700;color:#1e293b;white-space:normal;word-break:break-word}
.cdc-ev-party{font-size:9px;color:#64748b;font-weight:600;white-space:normal;word-break:break-word}
.cdc-ev-st{font-size:7px;font-weight:900;text-transform:uppercase;padding:1px 4px;border-radius:3px;flex-shrink:0;white-space:nowrap;margin-left:auto}
.cdc-ev-st.s-planned{background:#fef9c3;color:#854d0e}
.cdc-ev-st.s-pending{background:#dbeafe;color:#1e40af}
.cdc-ev-st.s-confirmed{background:#dcfce7;color:#166534}
.cdc-ev-st.s-default{background:#f1f5f9;color:#64748b}
.cdc.is-empty .cdc-left{background:#f8fafb}
.cdc.is-empty .cdc-right{background:#f5f8ff}
.cdc-empty{font-size:9px;color:#b0bec5;font-weight:700;font-style:italic;padding:2px 0}

@media(max-width:1200px){.cal-grid-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.cal-grid-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.cal-grid-row{grid-template-columns:1fr}.cdc{grid-template-columns:1fr}.cdc-right{border-top:1px solid #bfdbfe}.cal-strip{flex-wrap:wrap}.cal-strip-item{min-width:50%}}
.legend{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--muted);font-weight:700}.legend-dot{width:12px;height:12px;border-radius:50%;display:inline-block}.legend-dot.green{background:var(--green)}.legend-dot.blue{background:var(--blue)}.tabs{display:flex;background:#f1f5f9;padding:4px;border-radius:11px;gap:4px}.tabs button{border:0;background:transparent;border-radius:8px;padding:7px 12px;font-weight:800;color:#475569}.tabs button.active{background:#fff;color:var(--green);box-shadow:0 1px 2px rgba(15,23,42,.1)}@media(max-width:1000px){.agenda-row{grid-template-columns:1fr}.agenda-date{flex-direction:row;justify-content:space-between;align-items:center}.agenda-lane{min-height:auto}}
@media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.split,.three{grid-template-columns:1fr}.main{padding:18px}.sidebar{width:220px}.main{margin-left:220px;width:calc(100% - 220px)}}
@media(max-width:800px){.sidebar{position:relative;width:100%;height:auto}.app{display:block}.main{margin-left:0;width:100%}.kpi-grid,.two,.form-grid,.detail-grid{grid-template-columns:1fr}.page-head{display:block}.actions{margin-top:12px}.calendar-grid{grid-template-columns:1fr}.day{min-height:auto}}
@media print{.sidebar,.actions,.toolbar,.btn,.no-print{display:none!important}.main{margin-left:0!important;width:100%!important;padding:12px!important}.card,.kpi{box-shadow:none}.table th{position:static}}

.compact-kpi-grid{gap:8px!important;margin-bottom:10px!important}.compact-kpi-grid .kpi{padding:9px 11px;border-radius:11px}.compact-kpi-grid .kpi label{font-size:9px}.compact-kpi-grid .kpi strong{font-size:16px;margin-top:4px}.compact-kpi-grid .kpi small{font-size:10px;margin-top:2px}.compact-kpi-grid .kpi .icon{font-size:18px}.compact-card .card-head{padding:10px 12px}.compact-card .card-body{padding:10px 12px}

/* Inventory software dashboard */
.inventory-shell{display:grid;gap:12px}
.inventory-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:#fff;border:1px solid var(--border);border-radius:14px;padding:10px 12px;margin-bottom:12px}
.inventory-toolbar label{font-size:11px;font-weight:900;text-transform:uppercase;color:#64748b;letter-spacing:.35px}
.inv-board{display:grid;grid-template-columns:1.25fr .75fr;gap:14px}
.inv-board.full{grid-template-columns:1fr}
.inv-mini-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.inv-mini{border:1px solid var(--border);border-radius:12px;padding:10px;background:#fff}
.inv-mini label{display:block;font-size:9px;text-transform:uppercase;color:#94a3b8;font-weight:900;letter-spacing:.4px}
.inv-mini strong{display:block;font-family:'Sora',sans-serif;font-size:18px;margin-top:4px}
.inv-mini small{display:block;font-size:10px;color:#64748b;margin-top:2px}
.inv-ledger-table{min-width:1320px}
.inv-ledger-table th{font-size:10px}
.inv-ledger-table td{padding:9px 10px}
.inv-cell-title{font-weight:900;color:#0f172a}
.inv-cell-sub{font-size:10px;color:#64748b;margin-top:2px}
.inv-stock-pill{display:inline-flex;align-items:center;gap:5px;border-radius:8px;padding:5px 8px;font-weight:900;background:#f8fafc;border:1px solid #e2e8f0}
.inv-gap.positive{color:#047857;background:#ecfdf5;border-color:#bbf7d0}
.inv-gap.negative{color:#b91c1c;background:#fff1f2;border-color:#fecdd3}
.inv-split-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.inv-split-list{display:grid;gap:7px;max-height:390px;overflow:auto;padding-right:3px}
.inv-split-card{border:1px solid #e2e8f0;border-radius:12px;padding:10px;background:#fff;display:grid;grid-template-columns:96px 1fr 110px;gap:10px;align-items:center}
.inv-split-date{font-family:'Sora',sans-serif;font-size:13px;font-weight:900;color:#0f172a}
.inv-split-type{font-size:10px;color:#94a3b8;font-weight:900;text-transform:uppercase;letter-spacing:.35px}
.inv-split-main{font-size:12px;font-weight:800;color:#1e293b}
.inv-split-sub{font-size:10px;color:#64748b;margin-top:2px}
.inv-split-qty{text-align:right}
.inv-split-qty strong{font-family:'Sora',sans-serif;font-size:14px;display:block}
.inv-calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.inv-cal-day{min-height:120px;border:1px solid #e2e8f0;border-radius:12px;background:#fff;padding:7px;overflow:hidden}
.inv-cal-day.today{border-color:#6366f1;box-shadow:0 0 0 1px #c7d2fe inset}
.inv-cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.inv-cal-date{font-family:'Sora',sans-serif;font-size:12px;font-weight:900;color:#334155}
.inv-cal-dow{font-size:8px;text-transform:uppercase;font-weight:900;color:#94a3b8}
.inv-cal-chip{display:block;border-radius:7px;padding:4px 5px;margin-bottom:4px;font-size:9px;line-height:1.25;font-weight:800;border:1px solid transparent}
.inv-cal-chip.dispatch{background:#f0fdf4;color:#166534;border-color:#bbf7d0}
.inv-cal-chip.receive{background:#eff6ff;color:#1e40af;border-color:#bfdbfe}
.inv-cal-chip span{display:block;color:#334155;font-weight:700;margin-top:1px}
@media(max-width:1180px){.inv-board,.inv-split-grid{grid-template-columns:1fr}.inv-mini-grid{grid-template-columns:repeat(2,1fr)}.inv-calendar{grid-template-columns:repeat(4,1fr)}}

function cleanRowsForSupabase(table,rows){
  const cfg=DB_SCHEMA[table];
  if(!cfg) return rows || [];
  return (rows || []).filter(r=>r && r.id).map(r=>{
    const out={};
    cfg.fields.forEach(k=>{
      let v=r[k];
      if(cfg.nums.includes(k)){
        out[k]=(v==='' || v===undefined || v===null) ? null : Number(v);
      }else if(cfg.dates.includes(k)){
        out[k]=(v==='' || v===undefined || v===null) ? null : String(v).slice(0,10);
      }else{
        out[k]=(v===undefined || v===null) ? '' : v;
      }
    });
    return out;
  });
}
function detailedSupabaseError(err){
  if(!err) return 'Unknown Supabase error';
  return [err.message, err.details, err.hint, err.code].filter(Boolean).join(' | ');
}
function useSupabaseState(table,key,initial){
  const localKey=`bp_${table}_cloud_v2`;
  const [state,setState]=useState(()=>{
    try{const raw=localStorage.getItem(localKey);return raw?JSON.parse(raw):initial}catch(e){return initial}
  });
  const [loaded,setLoaded]=useState(false);
  const [sync,setSync]=useState({table,status: sb?'Connecting':'Local only', error:''});

  useEffect(()=>{
    let alive=true;
    async function load(){
      if(!sb){ setLoaded(true); return; }
      try{
        setSync({table,status:'Loading cloud',error:''});
        const {data,error}=await sb.from(table).select('*').order('id',{ascending:true});
        if(error) throw error;
        if(!alive) return;
        if(data && data.length){
          setState(data);
          localStorage.setItem(localKey,JSON.stringify(data));
        }else{
          const seed=cleanRowsForSupabase(table,(state && state.length ? state : initial));
          if(seed.length){
            const {error:seedErr}=await sb.from(table).upsert(seed,{onConflict:'id'});
            if(seedErr) throw seedErr;
          }
          setState(seed);
          localStorage.setItem(localKey,JSON.stringify(seed));
        }
        setSync({table,status:'Cloud synced',error:''});
      }catch(err){
        console.error('Supabase load error for',table,err);
        if(alive) setSync({table,status:'Cloud error',error:detailedSupabaseError(err)});
      }finally{ if(alive) setLoaded(true); }
    }
    load();
    return()=>{alive=false};
  },[table]);

  useEffect(()=>{
    try{localStorage.setItem(localKey,JSON.stringify(state))}catch(e){}
    if(!sb || !loaded) return;
    const timer=setTimeout(async()=>{
      try{
        const cleaned=cleanRowsForSupabase(table,state);
        if(cleaned.length){
          const {error}=await sb.from(table).upsert(cleaned,{onConflict:'id'});
          if(error) throw error;
        }
        setSync({table,status:'Cloud synced',error:''});
      }catch(err){
        console.error('Supabase save error for',table,err);
        setSync({table,status:'Save error',error:detailedSupabaseError(err)});
      }
    },650);
    return()=>clearTimeout(timer);
  },[table,state,loaded]);

  return [state,setState,sync];
}
function genId(prefix,arr){
  const nums=arr.map(x=>parseInt(String(x.id||'').replace(prefix,''),10)).filter(Boolean);
  return `${prefix}${String(nums.length?Math.max(...nums)+1:1).padStart(3,'0')}`;
}
function nextIdFactory(prefix,existing){
  let max=(existing||[]).map(x=>parseInt(String(x.id||'').replace(prefix,''),10)).filter(Boolean).reduce((a,b)=>Math.max(a,b),0);
  return ()=>`${prefix}${String(++max).padStart(3,'0')}`;
}

function makeMetrics(skus,ordersRaw,receiptsRaw,dispatchesRaw,rmOrders=[],customerOrders=[],customerSplits=[],vendorSplits=[]){
  // ── SKU alias resolver: map any order/receipt/dispatch sku to current canonical sku.name ──
  // Handles SKU renames in Masters (e.g. "Yogabaar 1KG" → "Yogabaar High Protine Oats 1KG")
  const normSku=(n)=>String(n||'').toLowerCase().replace(/\s+/g,'');
  const resolveSkuName=(rawSku)=>{
    if(!rawSku)return rawSku;
    const exact=skus.find(s=>s.name===rawSku); if(exact)return exact.name;
    const norm=normSku(rawSku);
    const match=skus.find(s=>normSku(s.name).includes(norm)||norm.includes(normSku(s.name)));
    return match?match.name:rawSku;
  };
  const orders=ordersRaw.map(o=>({...o,sku:resolveSkuName(o.sku)}));
  const receipts=receiptsRaw.map(r=>({...r,sku:resolveSkuName(r.sku)}));
  const dispatches=dispatchesRaw.map(d=>({...d,sku:resolveSkuName(d.sku)}));
  customerOrders=customerOrders.map(co=>({...co,sku:resolveSkuName(co.sku)}));
  customerSplits=customerSplits.map(cs=>({...cs})); // splits reference by ID, sku comes via join
  const receiptByOrder={}; receipts.forEach(r=>{if(!receiptByOrder[r.orderId])receiptByOrder[r.orderId]={kg:0,pcs:0};receiptByOrder[r.orderId].kg+=safeNum(r.receivedKG);receiptByOrder[r.orderId].pcs+=safeNum(r.receivedPCS)});
  const dispatchByOrder={}; dispatches.forEach(d=>{if(d.orderId){if(!dispatchByOrder[d.orderId])dispatchByOrder[d.orderId]={kg:0,pcs:0};dispatchByOrder[d.orderId].kg+=safeNum(d.qtyKG);dispatchByOrder[d.orderId].pcs+=safeNum(d.qtyPCS)}});

    a.co+=r.customerOrdered; a.del+=r.delivered; a.cb+=r.customerBalance; a.vo+=r.vendorOrdered; a.rec+=r.received; a.vb+=r.vendorBalance; a.stock+=r.stock; a.projected+=r.projected;
    return a;
  },{co:0,del:0,cb:0,vo:0,rec:0,vb:0,stock:0,projected:0});

  const customerSummary=useMemo(()=>{
    const map={};
    metrics.customerOrderRows.filter(o=>o.status!=='Cancelled' && filtered(o.sku)).forEach(o=>{
      const k=o.client||'Unknown'; if(!map[k])map[k]={name:k,orders:0,ordered:0,delivered:0,balance:0};
      map[k].orders++; map[k].ordered+=safeNum(o.totalQtyPCS); map[k].delivered+=safeNum(o.dispatchedPCS); map[k].balance+=safeNum(o.pendingDispatch);
    });
    return Object.values(map).sort((a,b)=>b.balance-a.balance);
  },[metrics,skuFilter]);

  const vendorSummary=useMemo(()=>{
    const map={};
    metrics.orderRows.filter(o=>o.status!=='Cancelled' && filtered(o.sku)).forEach(o=>{
      const k=o.vendor||'Unknown'; if(!map[k])map[k]={name:k,orders:0,ordered:0,received:0,balance:0};
      map[k].orders++; map[k].ordered+=safeNum(o.orderQtyPCS); map[k].received+=safeNum(o.receivedPCS); map[k].balance+=safeNum(o.pendingFG);
    });
    return Object.values(map).sort((a,b)=>b.balance-a.balance);
  },[metrics,skuFilter]);

  const agenda=useMemo(()=>{
    const rows=[];
    pendingDeliveries.forEach(s=>rows.push({date:s.date,type:'Dispatch',party:s.client,sku:s.sku,qty:s.pendingPCS,ref:s.orderRef||s.customerOrderId,color:'green'}));
    pendingReceives.forEach(s=>rows.push({date:s.date,type:'Receive',party:s.vendor,sku:s.sku,qty:s.pendingPCS,ref:s.vendorOrderId,color:'blue'}));
    return rows.filter(r=>String(r.date)>=today && String(r.date)<=addDays(45)).sort((a,b)=>String(a.date).localeCompare(String(b.date))).slice(0,80);
  },[pendingDeliveries,pendingReceives,today]);

  function setCO(k,v){setCoForm(p=>{const u={...p,[k]:v}; if(k==='sku'){const sm=skuMaster(v); u.client=sm.client||u.client; u.sellPCS=sm.sellPCS||u.sellPCS;} return u;});}
  function setVO(k,v){setVoForm(p=>{const u={...p,[k]:v}; if(k==='sku'){const sm=skuMaster(v); u.client=sm.client||u.client; u.buyKG=sm.buyKG||u.buyKG; u.mfgKG=sm.mfgKG||u.mfgKG;} if(k==='orderQtyPCS'||k==='sku'){const sm=skuMaster(u.sku); if(sm.stdWeight&&safeNum(u.orderQtyPCS)){u.issuedKG=Math.round(safeNum(u.orderQtyPCS)*safeNum(sm.stdWeight));}} return u;});}
  function updateSplit(setter,i,k,v){setter(prev=>prev.map((r,idx)=>idx===i?{...r,[k]:v}:r));}
  function addSplit(setter){setter(prev=>[...prev,{date:todayISO(),qtyPCS:''}]);}
  function removeSplit(setter,i){setter(prev=>prev.filter((_,idx)=>idx!==i));}
  const splitTotal=(arr)=>arr.reduce((a,r)=>a+safeNum(r.qtyPCS),0);

  function saveCustomerOrder(){
    if(!coForm.client||!coForm.sku){alert('Select customer and SKU');return;}
    const total=splitTotal(coSplits)||safeNum(coForm.totalQtyPCS); if(!total){alert('Enter order quantity');return;}
    const id=genId('CO',customerOrders);
    const sellPCS=safeNum(coForm.sellPCS)||safeNum(skuMaster(coForm.sku).sellPCS);
    setCustomerOrders(p=>[...p,{id,date:coForm.date,client:coForm.client,sku:coForm.sku,orderRef:coForm.orderRef||id,totalQtyPCS:total,sellPCS,status:'Open',remarks:coForm.remarks||''}]);
    const next=nextIdFactory('CS',customerSplits);
    const rows=(coSplits.length?coSplits:[{date:coForm.date,qtyPCS:total}]).filter(r=>safeNum(r.qtyPCS)>0).map(r=>({id:next(),customerOrderId:id,date:r.date||coForm.date,qtyPCS:safeNum(r.qtyPCS),status:'Pending',remarks:r.remarks||''}));
    setCustomerSplits(p=>[...p,...rows]);
    setCoForm({date:todayISO(),client:'',sku:'',orderRef:'',totalQtyPCS:'',sellPCS:'',remarks:''}); setCoSplits([{date:todayISO(),qtyPCS:''}]); setActiveForm('');
  }

  function chooseDeliverySplit(id){
    const sp=pendingDeliveries.find(x=>x.id===id); setDelForm(p=>({...p,customerSplitId:id,qtyPCS:sp?sp.pendingPCS:''}));
  }
  function saveDelivery(){
    const sp=pendingDeliveries.find(x=>x.id===delForm.customerSplitId); if(!sp){alert('Select pending delivery row');return;}
    const qty=safeNum(delForm.qtyPCS)||safeNum(sp.pendingPCS); if(!qty){alert('Enter delivered quantity');return;}
    const sm=skuMaster(sp.sku); const co=metrics.customerOrderRows.find(o=>o.id===sp.customerOrderId)||{};
    const id=genId('D',dispatches);
    setDispatches(p=>[...p,{id,date:delForm.date,orderId:'',customerOrderId:sp.customerOrderId,customerSplitId:sp.id,client:sp.client,sku:sp.sku,qtyPCS:qty,qtyKG:Math.round(qty*safeNum(sm.stdWeight)),sellPCS:safeNum(co.sellPCS)||safeNum(sm.sellPCS),sellKG:safeNum(sm.sellKG),logistics:safeNum(delForm.logistics),invoice:delForm.invoice||'',remarks:delForm.remarks||''}]);
    const splitDone=qty>=safeNum(sp.pendingPCS);
    setCustomerSplits(p=>p.map(x=>x.id===sp.id?{...x,status:splitDone?'Done':'Pending'}:x));
    const alreadyDelivered=dispatches.filter(d=>d.customerOrderId===sp.customerOrderId).reduce((a,d)=>a+safeNum(d.qtyPCS),0);
    const orderQty=safeNum(co.totalQtyPCS)||safeNum(sp.order?.totalQtyPCS)||safeNum(sp.qtyPCS);
    const orderDone=(alreadyDelivered+qty)>=orderQty;
    setCustomerOrders(p=>p.map(o=>o.id===sp.customerOrderId?{...o,status:orderDone?'Done':'Part Delivered'}:o));
    setDelForm({customerSplitId:'',date:todayISO(),qtyPCS:'',invoice:'',logistics:'',remarks:''}); setActiveForm('');
  }

  function saveVendorOrder(){
    if(!voForm.vendor||!voForm.sku){alert('Select vendor and SKU');return;}
    const total=splitTotal(voSplits)||safeNum(voForm.orderQtyPCS); if(!total){alert('Enter vendor order quantity');return;}
    const id=genId('O',orders); const sm=skuMaster(voForm.sku);
    const firstDate=(voSplits.find(x=>x.date)||{}).date||voForm.date;
    setOrders(p=>[...p,{id,date:voForm.date,type:'Job Work',vendor:voForm.vendor,client:voForm.client||sm.client||'',sku:voForm.sku,orderQtyPCS:total,issuedKG:safeNum(voForm.issuedKG)||Math.round(total*safeNum(sm.stdWeight)),buyKG:safeNum(voForm.buyKG)||safeNum(sm.buyKG),mfgKG:safeNum(voForm.mfgKG)||safeNum(sm.mfgKG),expectedPCS:total,vendorDeliveryDate:firstDate,clientDeliveryDate:firstDate,status:'In Production',remarks:voForm.remarks||''}]);
    const next=nextIdFactory('VS',vendorSplits);
    const rows=(voSplits.length?voSplits:[{date:firstDate,qtyPCS:total}]).filter(r=>safeNum(r.qtyPCS)>0).map(r=>({id:next(),vendorOrderId:id,date:r.date||firstDate,qtyPCS:safeNum(r.qtyPCS),status:'Planned',remarks:r.remarks||''}));
    setVendorSplits(p=>[...p,...rows]);
    setVoForm({date:todayISO(),vendor:'',client:'',sku:'',orderQtyPCS:'',issuedKG:'',buyKG:'',mfgKG:'',remarks:''}); setVoSplits([{date:todayISO(),qtyPCS:''}]); setActiveForm('');
  }

  function chooseReceiveSplit(id){
    const sp=pendingReceives.find(x=>x.id===id); setRecForm(p=>({...p,vendorSplitId:id,receivedPCS:sp?sp.pendingPCS:''}));
  }
  function saveReceive(){
    const sp=pendingReceives.find(x=>x.id===recForm.vendorSplitId); if(!sp){alert('Select pending vendor receive row');return;}
    const qty=safeNum(recForm.receivedPCS)||safeNum(sp.pendingPCS); if(!qty){alert('Enter received quantity');return;}
    const sm=skuMaster(sp.sku); const id=genId('R',receipts);
    setReceipts(p=>[...p,{id,date:recForm.date,orderId:sp.vendorOrderId,vendorSplitId:sp.id,vendor:sp.vendor,client:sp.client||'',sku:sp.sku,receivedKG:Math.round(qty*safeNum(sm.stdWeight)),receivedPCS:qty,invoice:recForm.invoice||'',logistics:safeNum(recForm.logistics),remarks:recForm.remarks||''}]);
    const splitDone=qty>=safeNum(sp.pendingPCS);
    setVendorSplits(p=>p.map(x=>x.id===sp.id?{...x,status:splitDone?'Done':'Part Received'}:x));
    const alreadyReceived=receipts.filter(r=>r.orderId===sp.vendorOrderId).reduce((a,r)=>a+safeNum(r.receivedPCS),0);
    const vendorOrderQty=safeNum(sp.order?.orderQtyPCS)||safeNum(sp.qtyPCS);
    const orderDone=(alreadyReceived+qty)>=vendorOrderQty;
    setOrders(p=>p.map(o=>o.id===sp.vendorOrderId?{...o,status:orderDone?'Done':'Part Received'}:o));
    setRecForm({vendorSplitId:'',date:todayISO(),receivedPCS:'',invoice:'',logistics:'',remarks:''}); setActiveForm('');
  }

  const SplitRows=({rows,setRows,title})=><div className="simple-split-box"><div className="simple-split-head"><b>{title}</b><Badge color="blue">Total {fN(splitTotal(rows))}</Badge></div>{rows.map((r,i)=><div className="simple-split-row" key={i}><input className="inp" type="date" value={r.date||''} onChange={e=>updateSplit(setRows,i,'date',e.target.value)}/><input className="inp" type="number" placeholder="Qty" value={r.qtyPCS||''} onChange={e=>updateSplit(setRows,i,'qtyPCS',e.target.value)}/><button className="btn danger" onClick={()=>removeSplit(setRows,i)}>Del</button></div>)}<Button variant="secondary" onClick={()=>addSplit(setRows)}>+ Add date split</Button></div>;

  return <>
    <PageHead title="Simple Inventory Tracker" sub="Enter order, delivery, vendor order and vendor receive from one clean screen">
      <select className="sel wide" value={skuFilter} onChange={e=>setSkuFilter(e.target.value)}><option>All</option>{skuOptions.map(s=><option key={s}>{s}</option>)}</select>
      <Button variant="secondary" onClick={()=>setPage('calendar')}>Calendar View</Button>
    </PageHead>

    <div className="simple-flow">
      <button className="simple-action green" onClick={()=>setActiveForm('customerOrder')}><span>1</span><b>Customer Order</b><small>Add client order + delivery dates</small></button>
      <button className="simple-action amber" onClick={()=>setActiveForm('delivery')}><span>2</span><b>Customer Delivery</b><small>Record dispatch against split</small></button>
      <button className="simple-action blue" onClick={()=>setActiveForm('vendorOrder')}><span>3</span><b>Vendor Order</b><small>Place making / purchase order</small></button>
      <button className="simple-action purple" onClick={()=>setActiveForm('receive')}><span>4</span><b>Vendor Receive</b><small>Record received quantity</small></button>
    </div>

    <div className="grid simple-kpi-grid">
      <KPI label="Customer Order" value={fN(totals.co)} sub={`Delivered ${fN(totals.del)} · Balance ${fN(totals.cb)}`} icon="📋" color="green"/>
      <KPI label="Vendor Order" value={fN(totals.vo)} sub={`Received ${fN(totals.rec)} · Balance ${fN(totals.vb)}`} icon="🏭" color="blue"/>
      <KPI label="Stock in Hand" value={fN(totals.stock)} sub="Current finished stock" icon="📦" color="amber"/>
      <KPI label="Projected Balance" value={fN(totals.projected)} sub="Stock + vendor balance - customer balance" icon="⚖️" color={totals.projected>=0?'green':'red'}/>
    </div>

    <div className="simple-section">
      <Card title="SKU Tracking — one row per SKU" action={<Badge color="gray">Filtered: {skuFilter}</Badge>}>
        <div className="table-wrap"><table className="table simple-table"><thead><tr><th>SKU</th><th>Customer Order</th><th>Delivered</th><th>Customer Balance</th><th>Vendor Order</th><th>Received</th><th>Vendor Balance</th><th>Stock</th><th>Projected</th><th>Status</th></tr></thead><tbody>{ledger.map(r=><tr key={r.sku}><td><b>{r.sku}</b><br/><span className="tiny">{r.client||''}</span></td><td className="num">{fN(r.customerOrdered)}</td><td className="num green-t">{fN(r.delivered)}</td><td className="num red-t">{fN(r.customerBalance)}</td><td className="num">{fN(r.vendorOrdered)}</td><td className="num blue-t">{fN(r.received)}</td><td className="num amber-t">{fN(r.vendorBalance)}</td><td className="num">{fN(r.stock)}</td><td className={`num ${r.projected<0?'red-t':'green-t'}`}>{fN(r.projected)}</td><td><Badge color={(r.customerOrdered||r.vendorOrdered) && r.customerBalance<=0 && r.vendorBalance<=0?'green':r.projected<0?'red':r.customerBalance>0?'amber':'green'}>{(r.customerOrdered||r.vendorOrdered) && r.customerBalance<=0 && r.vendorBalance<=0?'Done':r.projected<0?'Short':r.customerBalance>0?'Need dispatch':'Clear'}</Badge></td></tr>)}</tbody></table></div>
      </Card>
    </div>

    <div className="simple-two">
      <Card title="Customer Delivery Tracking" action={<div className="actions"><Badge color="red">Pending {pendingDeliveries.length}</Badge><Badge color="green">Done {completedDeliveries.length}</Badge></div>}>
        <div className="simple-list">{deliveryTracking.slice(0,12).map(s=><div className={`simple-list-row track ${s.done?'done':''}`} key={s.id}><div><b>{fmt(s.date)}</b><small>{s.client}</small></div><div><b>{s.sku}</b><small>{s.orderRef||s.customerOrderId}</small></div><strong className={s.done?'green-t':'red-t'}>{fN(s.done?s.qtyPCS:s.pendingPCS)}</strong><div className="status-cell"><Badge color={s.done?'green':'red'}>{s.done?'Done':'Pending'}</Badge></div></div>)}{!deliveryTracking.length&&<div className="center muted" style={{padding:20}}>No delivery row</div>}</div>
      </Card>
      <Card title="Vendor Receive Tracking" action={<div className="actions"><Badge color="blue">Pending {pendingReceives.length}</Badge><Badge color="green">Done {completedReceives.length}</Badge></div>}>
        <div className="simple-list">{receiveTracking.slice(0,12).map(s=><div className={`simple-list-row track ${s.done?'done':''}`} key={s.id}><div><b>{fmt(s.date)}</b><small>{s.vendor}</small></div><div><b>{s.sku}</b><small>{s.vendorOrderId}</small></div><strong className={s.done?'green-t':'blue-t'}>{fN(s.done?s.qtyPCS:s.pendingPCS)}</strong><div className="status-cell"><Badge color={s.done?'green':'blue'}>{s.done?'Done':'Pending'}</Badge></div></div>)}{!receiveTracking.length&&<div className="center muted" style={{padding:20}}>No receive row</div>}</div>
      </Card>
    </div>

    <div className="simple-two">
      <Card title="Customer-wise Summary"><div className="table-wrap"><table className="table simple-table"><thead><tr><th>Customer</th><th>Orders</th><th>Ordered</th><th>Delivered</th><th>Balance</th><th>Status</th></tr></thead><tbody>{customerSummary.map(r=><tr key={r.name}><td><b>{r.name}</b></td><td>{r.orders}</td><td className="num">{fN(r.ordered)}</td><td className="num green-t">{fN(r.delivered)}</td><td className="num red-t">{fN(r.balance)}</td><td><Badge color={r.balance<=0?'green':'red'}>{r.balance<=0?'Done':'Pending'}</Badge></td></tr>)}</tbody></table></div></Card>
      <Card title="Vendor-wise Summary"><div className="table-wrap"><table className="table simple-table"><thead><tr><th>Vendor</th><th>Orders</th><th>Ordered</th><th>Received</th><th>Balance</th><th>Status</th></tr></thead><tbody>{vendorSummary.map(r=><tr key={r.name}><td><b>{r.name}</b></td><td>{r.orders}</td><td className="num">{fN(r.ordered)}</td><td className="num blue-t">{fN(r.received)}</td><td className="num amber-t">{fN(r.balance)}</td><td><Badge color={r.balance<=0?'green':'blue'}>{r.balance<=0?'Done':'Pending'}</Badge></td></tr>)}</tbody></table></div></Card>
    </div>

    <Card title="Simple Calendar — next 45 days" action={<Button variant="secondary" onClick={()=>setPage('calendar')}>Full Calendar</Button>}>
      <div className="simple-agenda">{agenda.map((r,i)=><div className={`simple-agenda-row ${r.color}`} key={i}><div><b>{fmt(r.date)}</b><small>{r.type}</small></div><div><b>{r.party}</b><small>{r.sku}</small></div><strong>{fN(r.qty)}</strong><span>{r.ref}</span></div>)}{!agenda.length&&<div className="center muted" style={{padding:22}}>No pending calendar event</div>}</div>
    </Card>

    {activeForm==='customerOrder'&&<Modal title="Add Customer Order" onClose={()=>setActiveForm('')} wide>
      <div className="simple-form-grid"><Field label="Date"><Input type="date" value={coForm.date} onChange={v=>setCO('date',v)}/></Field><Field label="Customer"><Select value={coForm.client} onChange={v=>setCO('client',v)} options={clientOptions}/></Field><Field label="SKU"><Select value={coForm.sku} onChange={v=>setCO('sku',v)} options={skuOptions}/></Field><Field label="Order Ref"><Input value={coForm.orderRef} onChange={v=>setCO('orderRef',v)} placeholder="PO / Order No"/></Field><Field label="Total Qty"><Input type="number" value={coForm.totalQtyPCS} onChange={v=>setCO('totalQtyPCS',v)}/></Field><Field label="Selling / PCS"><Input type="number" value={coForm.sellPCS} onChange={v=>setCO('sellPCS',v)}/></Field><Field label="Remarks" full><Input value={coForm.remarks} onChange={v=>setCO('remarks',v)}/></Field><div className="field full"><SplitRows rows={coSplits} setRows={setCoSplits} title="Delivery split dates"/></div></div><div className="simple-savebar"><Button variant="secondary" onClick={()=>setActiveForm('')}>Cancel</Button><Button onClick={saveCustomerOrder}>Save Customer Order</Button></div>
    </Modal>}

    {activeForm==='delivery'&&<Modal title="Record Customer Delivery" onClose={()=>setActiveForm('')}>
      <div className="form-grid"><Field label="Pending delivery row" full><select className="sel" value={delForm.customerSplitId} onChange={e=>chooseDeliverySplit(e.target.value)}><option value="">Select pending customer delivery</option>{pendingDeliveries.map(s=><option key={s.id} value={s.id}>{fmt(s.date)} · {s.client} · {s.sku} · Balance {fN(s.pendingPCS)}</option>)}</select></Field><Field label="Dispatch Date"><Input type="date" value={delForm.date} onChange={v=>setDelForm(p=>({...p,date:v}))}/></Field><Field label="Delivered Qty"><Input type="number" value={delForm.qtyPCS} onChange={v=>setDelForm(p=>({...p,qtyPCS:v}))}/></Field><Field label="Invoice No"><Input value={delForm.invoice} onChange={v=>setDelForm(p=>({...p,invoice:v}))}/></Field><Field label="Logistics Cost"><Input type="number" value={delForm.logistics} onChange={v=>setDelForm(p=>({...p,logistics:v}))}/></Field><Field label="Remarks" full><Input value={delForm.remarks} onChange={v=>setDelForm(p=>({...p,remarks:v}))}/></Field></div><div className="simple-savebar"><Button variant="secondary" onClick={()=>setActiveForm('')}>Cancel</Button><Button onClick={saveDelivery}>Save Delivery</Button></div>
    </Modal>}

    {activeForm==='vendorOrder'&&<Modal title="Add Vendor Order" onClose={()=>setActiveForm('')} wide>
      <div className="simple-form-grid"><Field label="Date"><Input type="date" value={voForm.date} onChange={v=>setVO('date',v)}/></Field><Field label="Vendor"><Select value={voForm.vendor} onChange={v=>setVO('vendor',v)} options={vendorOptions}/></Field><Field label="SKU"><Select value={voForm.sku} onChange={v=>setVO('sku',v)} options={skuOptions}/></Field><Field label="Client"><Select value={voForm.client} onChange={v=>setVO('client',v)} options={clientOptions}/></Field><Field label="Order Qty"><Input type="number" value={voForm.orderQtyPCS} onChange={v=>setVO('orderQtyPCS',v)}/></Field><Field label="Issued RM KG"><Input type="number" value={voForm.issuedKG} onChange={v=>setVO('issuedKG',v)}/></Field><Field label="Buy / KG"><Input type="number" value={voForm.buyKG} onChange={v=>setVO('buyKG',v)}/></Field><Field label="Mfg / KG"><Input type="number" value={voForm.mfgKG} onChange={v=>setVO('mfgKG',v)}/></Field><Field label="Remarks" full><Input value={voForm.remarks} onChange={v=>setVO('remarks',v)}/></Field><div className="field full"><SplitRows rows={voSplits} setRows={setVoSplits} title="Vendor receive split dates"/></div></div><div className="simple-savebar"><Button variant="secondary" onClick={()=>setActiveForm('')}>Cancel</Button><Button onClick={saveVendorOrder}>Save Vendor Order</Button></div>
    </Modal>}

    {activeForm==='receive'&&<Modal title="Record Vendor Receive" onClose={()=>setActiveForm('')}>
      <div className="form-grid"><Field label="Pending receive row" full><select className="sel" value={recForm.vendorSplitId} onChange={e=>chooseReceiveSplit(e.target.value)}><option value="">Select pending vendor receive</option>{pendingReceives.map(s=><option key={s.id} value={s.id}>{fmt(s.date)} · {s.vendor} · {s.sku} · Balance {fN(s.pendingPCS)}</option>)}</select></Field><Field label="Receive Date"><Input type="date" value={recForm.date} onChange={v=>setRecForm(p=>({...p,date:v}))}/></Field><Field label="Received Qty"><Input type="number" value={recForm.receivedPCS} onChange={v=>setRecForm(p=>({...p,receivedPCS:v}))}/></Field><Field label="Vendor Invoice / Challan No"><Input value={recForm.invoice} onChange={v=>setRecForm(p=>({...p,invoice:v}))}/></Field><Field label="Inward Logistics Cost"><Input type="number" value={recForm.logistics} onChange={v=>setRecForm(p=>({...p,logistics:v}))}/></Field><Field label="Remarks" full><Input value={recForm.remarks} onChange={v=>setRecForm(p=>({...p,remarks:v}))}/></Field></div><div className="simple-savebar"><Button variant="secondary" onClick={()=>setActiveForm('')}>Cancel</Button><Button onClick={saveReceive}>Save Receive</Button></div>
    </Modal>}
  </>
}

function Dashboard({metrics,setPage}){
  const {totals,skuRows,orderRows,dispatchPnL}=metrics;
  const low=skuRows.filter(s=>s.color==='red');
  const overdue=orderRows.filter(o=>o.status!=='Closed' && o.vendorDeliveryDate<todayISO() && o.pendingFG>0);
  const active=orderRows.filter(o=>!['Closed','Cancelled'].includes(o.status));
  return <>
    <PageHead title="Operations Control Center" sub="One screen for vendor orders, stock, dispatch pending, RM vs FG and profit/loss">
      <Button variant="secondary" onClick={()=>setPage('customerOrders')}>Customer Orders</Button>
      <Button variant="secondary" onClick={()=>setPage('orders')}>Vendor Orders</Button>
      <Button variant="primary" onClick={()=>setPage('dispatch')}>Dispatch Control</Button>
    </PageHead>
    <div className="grid kpi-grid">
      <KPI label="Stock in Hand" value={fN(totals.onHand)} sub="Finished goods available" icon="📦" color="green"/>
      <KPI label="Placed to Make" value={fN(totals.placed)} sub={`Balance with vendors · RM from mills ${fN(totals.rmPendingBoxes||0)}`} icon="🏭" color="amber"/>
      <KPI label="Pending Dispatch" value={fN(totals.pendingDispatch)} sub={`Customer orders ${fN(totals.customerOrderQty||0)}`} icon="🚚" color="red"/>
      <KPI label="Dispatched Qty" value={fN(totals.dispatched)} sub="PCS dispatched" icon="✅" color="blue"/>
      <KPI label="Net Profit" value={fC(totals.profit)} sub={`Sales ${fC(totals.sales)} · Cost ${fC(totals.cost)}`} icon="💰" color={totals.profit>=0?'green':'red'}/>
      <KPI label="RM vs FG" value={`${fN(totals.rmIssued)} KG`} sub={`Received ${fN(totals.fgReceivedKG)} KG / ${fN(totals.fgReceivedPCS)} PCS`} icon="⚖️" color="purple"/>
    </div>
    <div className="split">
      <Card title="Vendor Order Monitor" action={<Button variant="outline" onClick={()=>setPage('orders')}>Open</Button>}>
        <div className="table-wrap"><table className="table" style={{minWidth:780}}><thead><tr><th>Order</th><th>Vendor</th><th>SKU</th><th>Order Qty</th><th>FG Received</th><th>Progress</th><th>Client Date</th><th>Status</th></tr></thead><tbody>{active.slice(0,8).map(o=><tr key={o.id}><td className="num blue-t">{o.id}</td><td>{o.vendor}</td><td>{o.sku}</td><td className="num">{fN(o.orderQtyPCS)}</td><td>{fN(o.receivedPCS)} PCS<br/><span className="tiny">{fN(o.receivedKG)} KG</span></td><td><span className="num">{fP(o.progress)}</span><Progress pct={o.progress} color={o.progress<40?'red':o.progress<80?'amber':'green'}/></td><td>{o.clientDeliveryDate}</td><td><StatusBadge status={o.displayStatus||o.status} pendingFG={o.pendingFG}/></td></tr>)}</tbody></table></div>
      </Card>
      <Card title="Immediate Attention">
        <div style={{display:'grid',gap:10}}>
          <AlertLine title="Low stock SKUs" value={low.length} sub={low.map(s=>s.name).join(', ')||'All safe'} color={low.length?'red':'green'}/>
          <AlertLine title="Overdue vendor deliveries" value={overdue.length} sub={overdue.map(o=>`${o.id} ${o.vendor}`).join(', ')||'No overdue vendor delivery'} color={overdue.length?'red':'green'}/>
          <AlertLine title="Dispatch P&L rows" value={dispatchPnL.length} sub={`Current profit: ${fC(totals.profit)}`} color={totals.profit>=0?'green':'red'}/>
        </div>
      </Card>
    </div>
  </>
}
function AlertLine({title,value,sub,color}){return <div className={`kpi ${color}`} style={{padding:13}}><label>{title}</label><strong style={{fontSize:22}}>{value}</strong><small>{sub}</small></div>}
function StatusBadge({status,pendingFG}){let label=status||'Pending';let color='gray'; if(['Closed','Done','Received','Delivered'].includes(label))color='green'; else if(label==='Ready to Dispatch')color='blue'; else if(['In Production','Part Received','Part Delivered','Part Dispatched','Planned','Pending'].includes(label))color='amber'; else if(label==='Delayed'||label==='Cancelled')color='red'; if(pendingFG===0 && label!=='Cancelled') {color='green';label='Done'} return <Badge color={color}>{label}</Badge>}


function SplitScheduleEditor({title,splits,setSplits,dateLabel='Date',qtyLabel='Qty PCS',statusOptions=['Pending','Done','Cancelled']}){
  const update=(i,k,v)=>setSplits(prev=>prev.map((r,idx)=>idx===i?{...r,[k]:v}:r));
  const add=()=>setSplits(prev=>[...prev,{date:todayISO(),qtyPCS:'',status:statusOptions[0],remarks:''}]);
  const remove=(i)=>setSplits(prev=>prev.filter((_,idx)=>idx!==i));
  const total=splits.reduce((a,r)=>a+safeNum(r.qtyPCS),0);
  return <div className="card" style={{gridColumn:'1/-1',boxShadow:'none'}}>
    <div className="card-head"><div className="card-title">{title}</div><div className="actions"><Badge color="blue">Total {fN(total)} PCS</Badge><Button variant="secondary" onClick={add}>+ Add Split</Button></div></div>
    <div className="card-body" style={{padding:10}}>
      {splits.length===0&&<div className="muted" style={{padding:10}}>No split rows yet. Add date-wise quantities.</div>}
      {splits.map((r,i)=><div key={r.id||i} className="form-grid" style={{gridTemplateColumns:'1fr 1fr 1fr 1.4fr auto',gap:8,marginBottom:8,alignItems:'end'}}>
        <Field label={dateLabel}><Input type="date" value={r.date} onChange={v=>update(i,'date',v)}/></Field>
        <Field label={qtyLabel}><Input type="number" value={r.qtyPCS} onChange={v=>update(i,'qtyPCS',v)}/></Field>
        <Field label="Status"><Select value={r.status} onChange={v=>update(i,'status',v)} options={statusOptions}/></Field>
        <Field label="Remarks"><Input value={r.remarks} onChange={v=>update(i,'remarks',v)} placeholder="Optional"/></Field>
        <Button variant="danger" onClick={()=>remove(i)}>Del</Button>
      </div>)}
    </div>
  </div>
}

function OrderForm({skus,vendors,clients,initial,initialSplits=[],onSave,onClose}){
  const blank={date:todayISO(),type:'Job Work',vendor:'',client:'',sku:'',orderQtyPCS:'',issuedKG:'',buyKG:'',mfgKG:'',expectedPCS:'',vendorDeliveryDate:addDays(5),clientDeliveryDate:addDays(7),status:'In Production',remarks:''};
  const [f,setF]=useState(initial||blank);
  const [splits,setSplits]=useState(initialSplits && initialSplits.length ? initialSplits.map(x=>({...x})) : []);
  const set=(k,v)=>setF(p=>{
    const u={...p,[k]:v};
    if(k==='sku'){
      const s=skus.find(x=>x.name===v); if(s){u.client=s.client;u.buyKG=s.buyKG;u.mfgKG=s.mfgKG;u.expectedPCS=u.orderQtyPCS||'';}
    }
    const s=skus.find(x=>x.name===u.sku);
    if((k==='orderQtyPCS'||k==='sku') && s && safeNum(u.orderQtyPCS)>0){
      const ideal=safeNum(s.idealWastage)/100; u.issuedKG=Math.round(safeNum(u.orderQtyPCS)*safeNum(s.stdWeight)/(1-ideal)); u.expectedPCS=u.orderQtyPCS;
      if(!initial && splits.length===0){setSplits([{date:u.vendorDeliveryDate||addDays(5),qtyPCS:u.orderQtyPCS,status:'Planned',remarks:'Vendor delivery split'}]);}
    }
    return u;
  });
  const addEvenSplits=()=>{
    const total=safeNum(f.orderQtyPCS); if(!total){alert('Enter order quantity first');return;}
    const count=Number(prompt('How many vendor delivery parts?', '5')||0); if(!count)return;
    const each=Math.floor(total/count); const rem=total-(each*count);
    setSplits(Array.from({length:count},(_,i)=>({date:addDays(2+i*2),qtyPCS:each+(i===count-1?rem:0),status:'Planned',remarks:`Part ${i+1}`})));
  };
  const sku=skus.find(s=>s.name===f.sku)||{};
  const expectedKG=safeNum(f.orderQtyPCS)*safeNum(sku.stdWeight);
  const rmCost=safeNum(f.issuedKG)*safeNum(f.buyKG);
  const mfgCost=expectedKG*safeNum(f.mfgKG);
  const splitQty=splits.reduce((a,r)=>a+safeNum(r.qtyPCS),0);
  return <Modal title={initial?'Edit Vendor Order':'New Vendor / Job Work Order'} onClose={onClose} wide>
    <div className="form-grid">
      <Field label="Order Date"><Input type="date" value={f.date} onChange={v=>set('date',v)}/></Field>
      <Field label="Order Type"><Select value={f.type} onChange={v=>set('type',v)} options={['Job Work','Direct Trading','Own Manufacturing']}/></Field>
      <Field label="Vendor"><Select value={f.vendor} onChange={v=>set('vendor',v)} options={vendors.map(v=>v.name)}/></Field>
      <Field label="Client"><Select value={f.client} onChange={v=>set('client',v)} options={clients.map(c=>c.name)}/></Field>
      <Field label="SKU"><Select value={f.sku} onChange={v=>set('sku',v)} options={skus.map(s=>s.name)}/></Field>
      <Field label="Vendor Order Qty / Placed to Make (PCS)"><Input type="number" value={f.orderQtyPCS} onChange={v=>set('orderQtyPCS',v)}/></Field>
      <Field label="Issued RM to Vendor (KG)"><Input type="number" value={f.issuedKG} onChange={v=>set('issuedKG',v)}/></Field>
      <Field label="Expected FG PCS"><Input type="number" value={f.expectedPCS} onChange={v=>set('expectedPCS',v)}/></Field>
      <Field label="Buying Cost / KG"><Input type="number" value={f.buyKG} onChange={v=>set('buyKG',v)}/></Field>
      <Field label="Job Work / Mfg Cost / KG"><Input type="number" value={f.mfgKG} onChange={v=>set('mfgKG',v)}/></Field>
      <Field label="Main Vendor Delivery Date"><Input type="date" value={f.vendorDeliveryDate} onChange={v=>set('vendorDeliveryDate',v)}/></Field>
      <Field label="Client Delivery Date / Reference"><Input type="date" value={f.clientDeliveryDate} onChange={v=>set('clientDeliveryDate',v)}/></Field>
      <Field label="Status"><Select value={f.status} onChange={v=>set('status',v)} options={['In Production','Part Received','Ready to Dispatch','Part Dispatched','Done','Closed','Delayed','Cancelled']}/></Field>
      <Field label="Remarks"><Input value={f.remarks} onChange={v=>set('remarks',v)}/></Field>
      <div style={{gridColumn:'1/-1'}}><Button variant="secondary" onClick={addEvenSplits}>⚡ Auto split vendor order equally</Button> <span className="tiny">Example: 25,000 boxes can be split into 5 delivery parts.</span></div>
      <SplitScheduleEditor title="Vendor Delivery Split Plan" splits={splits} setSplits={setSplits} dateLabel="Vendor Receive Date" qtyLabel="Receive Qty PCS" statusOptions={['Planned','Part Received','Received','Done','Delayed','Cancelled']}/>
    </div>
    <div className="calc-strip"><div className="calc-item"><label>Auto RM Cost</label><strong>{fC(rmCost)}</strong></div><div className="calc-item"><label>Expected FG KG</label><strong>{fN(expectedKG)} KG</strong></div><div className="calc-item"><label>Split Planned</label><strong className={splitQty!==safeNum(f.orderQtyPCS)?'red-t':'green-t'}>{fN(splitQty)} PCS</strong></div><div className="calc-item"><label>Total Cost Before Dispatch</label><strong>{fC(rmCost+mfgCost)}</strong></div></div>
    <div className="actions" style={{justifyContent:'flex-end',marginTop:18}}><Button variant="secondary" onClick={onClose}>Cancel</Button><Button onClick={()=>onSave({order:f,splits})}>{initial?'Update Order':'Save Order'}</Button></div>
  </Modal>
}

function OrdersPage({skus,vendors,clients,orders,setOrders,receipts,setReceipts,dispatches,setDispatches,vendorSplits,setVendorSplits,customerOrders,setCustomerOrders,customerSplits,setCustomerSplits,metrics}){
  const [modal,setModal]=useState(null); const [selected,setSelected]=useState(null);
  const [view,setView]=useState('orders'); // 'orders' | 'vendor'
  const [vendorFilter,setVendorFilter]=useState('All');
  const saveOrder=async(payload)=>{
    const row=payload.order||payload; const splitRows=payload.splits||[];
    const orderId=row.id || genId('O',orders);
    const finalOrder={...row,id:orderId};
    if(row.id){setOrders(p=>p.map(o=>o.id===row.id?finalOrder:o))} else {setOrders(p=>[{...finalOrder},...p])}
    const nextVS=nextIdFactory('VS',vendorSplits);
    const cleanedSplits=splitRows.filter(x=>safeNum(x.qtyPCS)>0 || x.date).map(x=>({...x,id:x.id||nextVS(),vendorOrderId:orderId,status:x.status||'Planned'}));
    if(sb && row.id){try{await sb.from(CLOUD_TABLES.vendorSplits).delete().eq('vendorOrderId',row.id)}catch(e){console.error(e)}}
    setVendorSplits(p=>[...p.filter(x=>x.vendorOrderId!==orderId),...cleanedSplits]);
    setModal(null)
  };
  const saveReceipt=(row)=>{
    const qty=safeNum(row.receivedPCS); if(!qty){alert('Enter received quantity');return;}
    const totalKG=safeNum(row.receivedKG);
    const pending=metrics.vendorSplitRows.filter(sp=>sp.vendorOrderId===row.orderId && sp.status!=='Cancelled' && safeNum(sp.pendingPCS)>0).sort((a,b)=>String(a.date).localeCompare(String(b.date)));
    const nextR=nextIdFactory('R',receipts); let remaining=qty; const newRows=[];
    pending.forEach(sp=>{if(remaining<=0)return; const take=Math.min(remaining,safeNum(sp.pendingPCS)); newRows.push({...row,id:nextR(),vendorSplitId:sp.id,receivedPCS:take,receivedKG:totalKG?Math.round(totalKG*(take/qty)):''}); remaining-=take;});
    if(remaining>0 || newRows.length===0){newRows.push({...row,id:nextR(),vendorSplitId:'',receivedPCS:remaining>0?remaining:qty,receivedKG:totalKG?Math.round(totalKG*((remaining>0?remaining:qty)/qty)):row.receivedKG});}
    setReceipts(p=>[...newRows,...p]);
    setVendorSplits(p=>p.map(vs=>{const add=newRows.filter(r=>r.vendorSplitId===vs.id).reduce((a,r)=>a+safeNum(r.receivedPCS),0); if(!add)return vs; const current=metrics.vendorSplitRows.find(x=>x.id===vs.id)||vs; const after=safeNum(current.pendingPCS)-add; return {...vs,status:after<=0?'Done':'Part Received'};}));
    const order=metrics.orderRows.find(o=>o.id===row.orderId)||{}; const finalReceived=safeNum(order.receivedPCS)+qty; const orderQty=safeNum(order.orderQtyPCS)||finalReceived;
    setOrders(p=>p.map(o=>o.id===row.orderId?{...o,status:finalReceived>=orderQty?'Done':'Part Received'}:o));
    setModal(null);
  };
  const saveDispatch=(row)=>{
    const qty=safeNum(row.qtyPCS); if(!qty){alert('Enter dispatch quantity');return;}
    setDispatches(p=>[{...row,id:genId('D',p)},...p]);
    if(row.customerSplitId){
      const sp=metrics.customerSplitRows.find(x=>x.id===row.customerSplitId)||{}; const after=safeNum(sp.pendingPCS)-qty;
      setCustomerSplits&&setCustomerSplits(p=>p.map(x=>x.id===row.customerSplitId?{...x,status:after<=0?'Done':'Part Delivered'}:x));
    }
    if(row.customerOrderId){
      const co=metrics.customerOrderRows.find(x=>x.id===row.customerOrderId)||{}; const finalDispatched=safeNum(co.dispatchedPCS)+qty; const total=safeNum(co.totalQtyPCS)||finalDispatched;
      setCustomerOrders&&setCustomerOrders(p=>p.map(o=>o.id===row.customerOrderId?{...o,status:finalDispatched>=total?'Done':'Part Delivered'}:o));
    }
    setModal(null);
  };

  // Build vendor summary
  const vendorSummary=useMemo(()=>{
    const map={};
    metrics.orderRows.forEach(o=>{
      const v=o.vendor||'Unknown';
      if(!map[v])map[v]={vendor:v,orders:[],totalPlaced:0,totalReceived:0,totalPending:0,totalIssued:0,skus:new Set(),clients:new Set()};
      map[v].orders.push(o);
      map[v].totalPlaced+=safeNum(o.orderQtyPCS);
      map[v].totalReceived+=safeNum(o.receivedPCS);
      map[v].totalPending+=safeNum(o.pendingFG);
      map[v].totalIssued+=safeNum(o.issuedKG);
      map[v].skus.add(o.sku);
      map[v].clients.add(o.client);
    });
    return Object.values(map).map(v=>({...v,skus:Array.from(v.skus),clients:Array.from(v.clients),progress:v.totalPlaced?v.totalReceived/v.totalPlaced*100:0})).sort((a,b)=>b.totalPending-a.totalPending);
  },[metrics.orderRows]);

  const allVendors=['All',...vendorSummary.map(v=>v.vendor)];
  const filteredOrders=vendorFilter==='All'?metrics.orderRows:metrics.orderRows.filter(o=>o.vendor===vendorFilter);

  const cols=[
    {key:'id',label:'Order',render:o=><button className="btn ghost" onClick={()=>setSelected(o)}><span className="blue-t num">{o.id}</span></button>},
    {key:'vendor',label:'Vendor / Client',render:o=><><b>{o.vendor}</b><br/><span className="tiny">Client: {o.client}</span></>},
    {key:'sku',label:'SKU',render:o=><><b>{o.sku}</b><br/><span className="tiny">{o.type}</span></>},
    {key:'orderQtyPCS',label:'Placed to Make',render:o=><span className="num">{fN(o.orderQtyPCS)} PCS</span>},
    {key:'splitPlan',label:'Vendor Split Plan',render:o=><div style={{minWidth:260}}>{o.splits?.length?o.splits.map(sp=>{const done=sp.isDone||safeNum(sp.pendingPCS)<=0;const part=safeNum(sp.receivedPCS)>0&&!done;return <span key={sp.id} className={`badge ${done?'green':part?'amber':'blue'}`} style={{margin:'0 5px 5px 0'}}>{done?'✅ ':part?'↗ ':''}{sp.date}: {fN(sp.qtyPCS)} {done?'Done':part?`Rec ${fN(sp.receivedPCS)}`:'Pending'}</span>}):<span className="tiny">No split plan</span>}</div>},
    {key:'receivedPCS',label:'FG Received',render:o=><><span className="num green-t">{fN(o.receivedPCS)} PCS</span><br/><span className="tiny">{fN(o.receivedKG)} KG received</span></>},
    {key:'pendingFG',label:'Pending at Vendor',render:o=><><span className={`num ${o.pendingFG?'amber-t':'green-t'}`}>{fN(o.pendingFG)} PCS</span><Progress pct={o.progress} color={o.progress<40?'red':o.progress<80?'amber':'green'}/></>},
    {key:'dates',label:'Main Dates',render:o=><><span className="tiny">Vendor</span> {o.vendorDeliveryDate}<br/><span className="tiny">Client Ref</span> {o.clientDeliveryDate}</>},
    {key:'status',label:'Status',render:o=><StatusBadge status={o.displayStatus||o.status} pendingFG={o.pendingFG}/>},
    {key:'actions',label:'Actions',render:o=><div className="actions"><Button variant="outline" onClick={()=>setModal({type:'edit',order:o})}>Edit</Button><Button variant="secondary" onClick={()=>setModal({type:'receipt',order:o})}>FG Receipt</Button><Button variant="blue" onClick={()=>setModal({type:'dispatch',order:o})}>Dispatch</Button></div>},
  ];

  return <>
    <PageHead title="Vendor Order Management" sub="Monitor vendor orders, production progress and pending FG">
      <Button variant="primary" onClick={()=>setModal({type:'new'})}>+ New Vendor Order</Button>
    </PageHead>

    {/* View toggle + vendor filter */}
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:8}}>
      <div className="tabs" style={{padding:3}}>
        <button className={view==='vendor'?'active':''} style={{padding:'5px 12px',fontSize:12}} onClick={()=>setView('vendor')}>🏭 Vendor Summary</button>
        <button className={view==='orders'?'active':''} style={{padding:'5px 12px',fontSize:12}} onClick={()=>setView('orders')}>📋 All Orders</button>
      </div>
      {view==='orders'&&<div style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:11,fontWeight:700,color:'#64748b'}}>Filter vendor:</span>
        <select className="sel" style={{width:180,height:30,padding:'4px 8px',fontSize:12,borderRadius:7}} value={vendorFilter} onChange={e=>setVendorFilter(e.target.value)}>
          {allVendors.map(v=><option key={v}>{v}</option>)}
        </select>

        const activeOrders=v.orders.filter(o=>!['Closed','Cancelled'].includes(o.status));

        return <div key={v.vendor} style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,overflow:'hidden',boxShadow:'0 1px 4px rgba(15,23,42,.05)'}}>

            <div style={{display:'flex',alignItems:'center',gap:12}}>

              <div>
                <div style={{fontFamily:"'Sora',sans-serif",fontSize:15,fontWeight:800,color:'#0f172a'}}>{v.vendor}</div>
                <div style={{fontSize:10,color:'#64748b',marginTop:1}}>{v.skus.join(' · ')} &nbsp;·&nbsp; {v.orders.length} orders &nbsp;·&nbsp; {activeOrders.length} active</div>
              </div>
            </div>
            {/* Vendor KPI strip */}
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
