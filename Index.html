function MastersPage({skus,setSkus,vendors,setVendors,clients,setClients}){
  const [tab,setTab]=useState('skus');
  const [modal,setModal]=useState(null);
  const [editRow,setEditRow]=useState(null);

  const addNew=()=>{setEditRow(null);setModal(tab)};
  const edit=(type,row)=>{setEditRow(row);setModal(type)};
  const close=()=>{setModal(null);setEditRow(null)};

  const saveClient=(row)=>{
    if(editRow) setClients(p=>p.map(x=>x.id===editRow.id?{...x,...row,id:editRow.id}:x));
    else setClients(p=>[...p,{...row,id:genId('C',p)}]);
    close();
  };
  const saveVendor=(row)=>{
    if(editRow) setVendors(p=>p.map(x=>x.id===editRow.id?{...x,...row,id:editRow.id}:x));
    else setVendors(p=>[...p,{...row,id:genId('V',p)}]);
    close();
  };
  const saveSKU=(row)=>{
    if(editRow) setSkus(p=>p.map(x=>x.id===editRow.id?{...x,...row,id:editRow.id}:x));
    else setSkus(p=>[...p,{...row,id:genId('S',p)}]);
    close();
  };

  const removeCloud=async(table,id)=>{try{if(sb) await sb.from(table).delete().eq('id',id)}catch(e){console.error(e)}};
  const del=(type,row)=>{
    if(!window.confirm(`Delete ${row.name || row.id}?`)) return;
    if(type==='skus'){setSkus(p=>p.filter(x=>x.id!==row.id));removeCloud(CLOUD_TABLES.skus,row.id)}
    if(type==='vendors'){setVendors(p=>p.filter(x=>x.id!==row.id));removeCloud(CLOUD_TABLES.vendors,row.id)}
    if(type==='clients'){setClients(p=>p.filter(x=>x.id!==row.id));removeCloud(CLOUD_TABLES.clients,row.id)}
  };

  const actionCol=(type)=>({key:'actions',label:'Actions',render:r=><div className="actions" style={{marginTop:0}}><Button variant="outline" onClick={()=>edit(type,r)}>Edit</Button><Button variant="danger" onClick={()=>del(type,r)}>Delete</Button></div>});

  const skuCols=[
    {key:'id',label:'ID',render:s=><span className="num blue-t">{s.id}</span>},{key:'name',label:'SKU Name',render:s=><b>{s.name}</b>},{key:'client',label:'Client'},{key:'size',label:'Size'},{key:'ply',label:'Ply'},
    {key:'stdWeight',label:'Weight/PCS',render:s=>`${fN(s.stdWeight,3)} KG`},{key:'openingStockPCS',label:'Opening Stock',render:s=><span className="num green-t">{fN(s.openingStockPCS)}</span>},{key:'dailyUse',label:'Daily Use',render:s=>fN(s.dailyUse)},
    {key:'sellPCS',label:'Sell/PCS',render:s=>fC(s.sellPCS)},{key:'buyKG',label:'Buy/KG',render:s=>fC(s.buyKG)},{key:'mfgKG',label:'Mfg/KG',render:s=>fC(s.mfgKG)},{key:'status',label:'Status',render:s=><Badge color={s.status==='Active'?'green':'gray'}>{s.status||'Active'}</Badge>},actionCol('skus')
  ];
  const vendorCols=[
    {key:'id',label:'ID',render:v=><span className="num blue-t">{v.id}</span>},{key:'name',label:'Vendor / Job Worker',render:v=><b>{v.name}</b>},{key:'contact',label:'Contact'},{key:'mobile',label:'Mobile'},{key:'location',label:'Location'},
    {key:'gst',label:'GST'},{key:'rate',label:'Rate/KG',render:v=>fC(v.rate)},{key:'wastageAllowance',label:'Wastage %',render:v=>`${fN(v.wastageAllowance,2)}%`},{key:'status',label:'Status',render:v=><Badge color={v.status==='Active'?'green':'gray'}>{v.status||'Active'}</Badge>},actionCol('vendors')
  ];
  const clientCols=[
    {key:'id',label:'ID',render:c=><span className="num blue-t">{c.id}</span>},{key:'name',label:'Client',render:c=><b>{c.name}</b>},{key:'contact',label:'Contact'},{key:'mobile',label:'Mobile'},{key:'email',label:'Email'},{key:'gst',label:'GST'},{key:'terms',label:'Terms'},{key:'status',label:'Status',render:c=><Badge color={c.status==='Active'?'green':'gray'}>{c.status||'Active'}</Badge>},actionCol('clients')
  ];

  const sub={skus:'Add/edit box SKU, pricing, daily consumption and safety-stock settings',vendors:'Add/edit job workers, manufacturing rates, wastage and contact details',clients:'Add/edit clients, GST, contact and billing details'}[tab];
  return <>
    <PageHead title="Masters" sub={sub}>
      <div className="tabs"><button className={tab==='skus'?'active':''} onClick={()=>setTab('skus')}>SKU Master</button><button className={tab==='vendors'?'active':''} onClick={()=>setTab('vendors')}>Vendor Master</button><button className={tab==='clients'?'active':''} onClick={()=>setTab('clients')}>Client Master</button></div>
      <Button onClick={addNew}>+ Add {tab==='skus'?'SKU':tab==='vendors'?'Vendor':'Client'}</Button>
    </PageHead>
    {tab==='skus'&&<DataTable columns={skuCols} data={skus} searchText="Search SKU master..."/>}
    {tab==='vendors'&&<DataTable columns={vendorCols} data={vendors} searchText="Search vendor master..."/>}
    {tab==='clients'&&<DataTable columns={clientCols} data={clients} searchText="Search client master..."/>}
    {modal==='skus'&&<SKUMasterForm initial={editRow} clients={clients} onSave={saveSKU} onClose={close}/>} 
    {modal==='vendors'&&<VendorMasterForm initial={editRow} onSave={saveVendor} onClose={close}/>} 
    {modal==='clients'&&<ClientMasterForm initial={editRow} onSave={saveClient} onClose={close}/>} 
  </>
}

function Sidebar({page,setPage}){
  const items=[
    ['inventorySoftware','📦','Simple Tracker'],['customerOrders','📋','Customer Orders'],['orders','🏭','Vendor Orders'],['inventory','🏷️','Stock'],['calendar','🗓️','Calendar'],['masters','⚙️','Masters']
  ];
  return <aside className="sidebar"><div className="brand"><div className="logo">📦</div><h1>BGSG-BLR</h1><p>Contract manufacturing + trading control</p></div><div className="nav">{items.map(([id,ico,label])=><button key={id} className={page===id?'active':''} onClick={()=>setPage(id)}><span className="ico">{ico}</span>{label}</button>)}</div><div className="sidebar-footer">Made for Details</div></aside>
}

function App(){
  const [page,setPage]=useState('inventorySoftware');
  const [clients,setClients,clientsSync]=useSupabaseState(CLOUD_TABLES.clients,'bp_clients_v4',START_CLIENTS);
  const [vendors,setVendors,vendorsSync]=useSupabaseState(CLOUD_TABLES.vendors,'bp_vendors_v4',START_VENDORS);
  const [skus,setSkus,skusSync]=useSupabaseState(CLOUD_TABLES.skus,'bp_skus_v4',START_SKUS);
  const [orders,setOrders,ordersSync]=useSupabaseState(CLOUD_TABLES.orders,'bp_orders_v4',START_ORDERS);
  const [receipts,setReceipts,receiptsSync]=useSupabaseState(CLOUD_TABLES.receipts,'bp_receipts_v4',START_RECEIPTS);
  const [dispatches,setDispatches,dispatchesSync]=useSupabaseState(CLOUD_TABLES.dispatches,'bp_dispatches_v4',START_DISPATCHES);
  const [rmOrders,setRmOrders,rmOrdersSync]=useSupabaseState(CLOUD_TABLES.rmOrders,'bp_rm_orders_v4',START_RM_ORDERS);
  const [customerOrders,setCustomerOrders,customerOrdersSync]=useSupabaseState(CLOUD_TABLES.customerOrders,'bp_customer_orders_v1',START_CUSTOMER_ORDERS);
  const [customerSplits,setCustomerSplits,customerSplitsSync]=useSupabaseState(CLOUD_TABLES.customerSplits,'bp_customer_splits_v1',START_CUSTOMER_SPLITS);
  const [vendorSplits,setVendorSplits,vendorSplitsSync]=useSupabaseState(CLOUD_TABLES.vendorSplits,'bp_vendor_splits_v1',START_VENDOR_SPLITS);
  const metrics=useMemo(()=>makeMetrics(skus,orders,receipts,dispatches,rmOrders,customerOrders,customerSplits,vendorSplits),[skus,orders,receipts,dispatches,rmOrders,customerOrders,customerSplits,vendorSplits]);
  const backup={clients,vendors,skus,orders,receipts,dispatches,rmOrders,customerOrders,customerSplits,vendorSplits};
  const syncs=[clientsSync,vendorsSync,skusSync,ordersSync,receiptsSync,dispatchesSync,rmOrdersSync,customerOrdersSync,customerSplitsSync,vendorSplitsSync];
  const hasError=syncs.some(x=>String(x.status).toLowerCase().includes('error'));
  const syncErrors=syncs.filter(x=>String(x.status).toLowerCase().includes('error')).map(x=>`${x.table}: ${x.error}`).join('\n');
  const cloudText=!sb?'Local only':hasError?'Supabase sync issue':'Supabase cloud sync active';
  return <div className="app"><Sidebar page={page} setPage={setPage}/><main className="main">
    <div className="actions no-print" style={{justifyContent:'flex-end',marginBottom:12}}><span title={syncErrors} className={`badge ${hasError?'red':'green'}`}>{cloudText}</span>{hasError&&<Button variant="secondary" onClick={()=>alert(syncErrors || 'No error detail found')}>⚠ Sync Details</Button>}<Button variant="secondary" onClick={()=>downloadBackup(backup)}>💾 Backup JSON</Button><Button variant="secondary" onClick={()=>window.print()}>🖨 Print</Button></div>
    {page==='inventorySoftware'&&<InventorySoftwarePage metrics={metrics} setPage={setPage} skus={skus} clients={clients} vendors={vendors} customerOrders={customerOrders} setCustomerOrders={setCustomerOrders} customerSplits={customerSplits} setCustomerSplits={setCustomerSplits} orders={orders} setOrders={setOrders} vendorSplits={vendorSplits} setVendorSplits={setVendorSplits} receipts={receipts} setReceipts={setReceipts} dispatches={dispatches} setDispatches={setDispatches}/>} 
    {page==='dashboard'&&<Dashboard metrics={metrics} setPage={setPage}/>} 
    {page==='customerOrders'&&<CustomerOrdersPage skus={skus} clients={clients} customerOrders={customerOrders} setCustomerOrders={setCustomerOrders} customerSplits={customerSplits} setCustomerSplits={setCustomerSplits} dispatches={dispatches} setDispatches={setDispatches} metrics={metrics}/>} 
    {page==='orders'&&<OrdersPage skus={skus} vendors={vendors} clients={clients} orders={orders} setOrders={setOrders} receipts={receipts} setReceipts={setReceipts} dispatches={dispatches} setDispatches={setDispatches} vendorSplits={vendorSplits} setVendorSplits={setVendorSplits} customerOrders={customerOrders} setCustomerOrders={setCustomerOrders} customerSplits={customerSplits} setCustomerSplits={setCustomerSplits} metrics={metrics}/>} 
    {page==='inventory'&&<InventoryPage skus={skus} setSkus={setSkus} vendors={vendors} rmOrders={rmOrders} setRmOrders={setRmOrders} metrics={metrics}/>} 
    {page==='jobwork'&&<JobWorkPage orders={orders} receipts={receipts} setReceipts={setReceipts} metrics={metrics} skus={skus}/>} 
    {page==='dispatch'&&<DispatchPage skus={skus} clients={clients} setDispatches={setDispatches} metrics={metrics}/>} 
    {page==='pnl'&&<PnLPage metrics={metrics}/>} 
    {page==='calendar'&&<CalendarPage metrics={metrics}/>} 
    {page==='masters'&&<MastersPage skus={skus} setSkus={setSkus} vendors={vendors} setVendors={setVendors} clients={clients} setClients={setClients}/>} 
  </main></div>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
