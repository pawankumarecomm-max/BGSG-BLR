function useSupabaseState(table,key,initial){
  const localKey=`bp_${table}_cloud_v1`;
  const [state,setState]=useState(()=>{
    try{const raw=localStorage.getItem(localKey);return raw?JSON.parse(raw):initial}catch(e){return initial}
  });
  const [loaded,setLoaded]=useState(false);
  const [sync,setSync]=useState({status: sb?'Connecting':'Local only', error:''});

  useEffect(()=>{
    let alive=true;
    async function load(){
      if(!sb){ setLoaded(true); return; }
      try{
        setSync({status:'Loading cloud',error:''});
        const {data,error}=await sb.from(table).select('*').order('id',{ascending:true});
        if(error) throw error;
        if(!alive) return;
        if(data && data.length){
          setState(data);
          localStorage.setItem(localKey,JSON.stringify(data));
        }else{
          // Empty table: keep starter/local data and seed it once so the app opens with usable rows.
          const seed=state && state.length ? state : initial;
          if(seed.length){
            const {error:seedErr}=await sb.from(table).upsert(seed,{onConflict:'id'});
            if(seedErr) throw seedErr;
          }
          setState(seed);
        }
        setSync({status:'Cloud synced',error:''});
      }catch(err){
        console.error('Supabase load error for',table,err);
        if(alive) setSync({status:'Cloud error',error:err.message||String(err)});
      }finally{ if(alive) setLoaded(true); }
    }
    load();
    return()=>{alive=false};
  },[table]);

  useEffect(()=>{
    try{localStorage.setItem(localKey,JSON.stringify(state))}catch(e){}
    if(!sb || !loaded) return;
    const timer=setTimeout(async()=>{
      try{
        if(state.length){
          const {error}=await sb.from(table).upsert(state,{onConflict:'id'});
          if(error) throw error;
        }
        setSync({status:'Cloud synced',error:''});
      }catch(err){
        console.error('Supabase save error for',table,err);
        setSync({status:'Save error',error:err.message||String(err)});
      }
    },450);
    return()=>clearTimeout(timer);
  },[table,state,loaded]);

  return [state,setState,sync];
}
function genId(prefix,arr){
  const nums=arr.map(x=>parseInt(String(x.id||'').replace(prefix,''),10)).filter(Boolean);
  return `${prefix}${String(nums.length?Math.max(...nums)+1:1).padStart(3,'0')}`;
}
function exportCSV(data,filename){
  if(!data.length){alert('No rows to export');return}
  const keys=Object.keys(data[0]);
  const csv=[keys.join(','),...data.map(r=>keys.map(k=>`"${String(r[k]??'').replaceAll('"','""')}"`).join(','))].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=filename;a.click();
}

function Input({value,onChange,type='text',placeholder='',readOnly=false}){return <input className="inp" type={type} value={value??''} placeholder={placeholder} readOnly={readOnly} onChange={e=>onChange(e.target.value)}/>}
function Select({value,onChange,options,placeholder='— Select —'}){return <select className="sel" value={value??''} onChange={e=>onChange(e.target.value)}><option value="">{placeholder}</option>{options.map(o=><option key={o} value={o}>{o}</option>)}</select>}
function Progress({pct,color=''}){const p=Math.max(0,Math.min(100,safeNum(pct)));return <div className={`progress ${color}`}><span style={{width:`${p}%`}}></span></div>}

function DataTable({columns,data,searchText='Search...',children}){
  const [q,setQ]=useState('');
  const rows=data.filter(r=>JSON.stringify(r).toLowerCase().includes(q.toLowerCase()));
  return <>
    <div className="toolbar no-print"><div className="search"><span>🔍</span><input className="inp" placeholder={searchText} value={q} onChange={e=>setQ(e.target.value)}/></div>{children}<div style={{flex:1}}/><Button variant="secondary" onClick={()=>exportCSV(rows,'export.csv')}>⬇ Export</Button></div>
    <div className="table-wrap"><table className="table"><thead><tr>{columns.map(c=><th key={c.key}>{c.label}</th>)}</tr></thead><tbody>{rows.length?rows.map((row,i)=><tr key={row.id||i}>{columns.map(c=><td key={c.key} className={c.className||''}>{c.render?c.render(row):row[c.key]}</td>)}</tr>):<tr><td colSpan={columns.length} className="center muted" style={{padding:36}}>No records found</td></tr>}</tbody></table></div>
    <div className="tiny" style={{marginTop:8}}>{rows.length} rows shown</div>
  </>
}

function makeMetrics(skus,orders,receipts,dispatches,rmOrders=[]){
  const receiptByOrder={}; receipts.forEach(r=>{if(!receiptByOrder[r.orderId])receiptByOrder[r.orderId]={kg:0,pcs:0};receiptByOrder[r.orderId].kg+=safeNum(r.receivedKG);receiptByOrder[r.orderId].pcs+=safeNum(r.receivedPCS)});
  const dispatchByOrder={}; dispatches.forEach(d=>{if(d.orderId){if(!dispatchByOrder[d.orderId])dispatchByOrder[d.orderId]={kg:0,pcs:0};dispatchByOrder[d.orderId].kg+=safeNum(d.qtyKG);dispatchByOrder[d.orderId].pcs+=safeNum(d.qtyPCS)}});
  const receiptBySku={}; receipts.forEach(r=>{if(!receiptBySku[r.sku])receiptBySku[r.sku]={kg:0,pcs:0};receiptBySku[r.sku].kg+=safeNum(r.receivedKG);receiptBySku[r.sku].pcs+=safeNum(r.receivedPCS)});
  const dispatchBySku={}; dispatches.forEach(d=>{if(!dispatchBySku[d.sku])dispatchBySku[d.sku]={kg:0,pcs:0};dispatchBySku[d.sku].kg+=safeNum(d.qtyKG);dispatchBySku[d.sku].pcs+=safeNum(d.qtyPCS)});
  const rmBySku={}; const rmByVendor={};
  rmOrders.forEach(r=>{
    if(r.status==='Cancelled')return;
    const boxes=safeNum(r.rmForBoxes); const kg=safeNum(r.rmKG);
    if(!rmBySku[r.sku])rmBySku[r.sku]={boxes:0,kg:0,pendingBoxes:0,pendingKG:0,receivedBoxes:0,receivedKG:0,lines:[]};
    rmBySku[r.sku].boxes+=boxes; rmBySku[r.sku].kg+=kg; rmBySku[r.sku].lines.push(r);
    if(r.status==='Received'){rmBySku[r.sku].receivedBoxes+=boxes; rmBySku[r.sku].receivedKG+=kg;} else {rmBySku[r.sku].pendingBoxes+=boxes; rmBySku[r.sku].pendingKG+=kg;}
    if(!rmByVendor[r.vendor])rmByVendor[r.vendor]={boxes:0,kg:0,lines:[]};
    rmByVendor[r.vendor].boxes+=boxes; rmByVendor[r.vendor].kg+=kg; rmByVendor[r.vendor].lines.push(r);
  });
  const orderRows=orders.map(o=>{
    const r=receiptByOrder[o.id]||{kg:0,pcs:0}; const d=dispatchByOrder[o.id]||{kg:0,pcs:0};
    const pendingFG=Math.max(0,safeNum(o.orderQtyPCS)-r.pcs); const pendingDispatch=Math.max(0,safeNum(o.orderQtyPCS)-d.pcs);
    const progress=safeNum(o.orderQtyPCS)?r.pcs/safeNum(o.orderQtyPCS)*100:0;
    const wastageKG=Math.max(0,safeNum(o.issuedKG)-r.kg); const wastagePct=safeNum(o.issuedKG)?wastageKG/safeNum(o.issuedKG)*100:0;
    return {...o,receivedKG:r.kg,receivedPCS:r.pcs,dispatchedKG:d.kg,dispatchedPCS:d.pcs,pendingFG,pendingDispatch,progress,wastageKG,wastagePct};
  });
  const skuRows=skus.map(s=>{
    const rec=receiptBySku[s.name]||{kg:0,pcs:0}; const disp=dispatchBySku[s.name]||{kg:0,pcs:0};
    const onHandPCS=Math.max(0,safeNum(s.openingStockPCS)+rec.pcs-disp.pcs);
    const placedPCS=orderRows.filter(o=>o.sku===s.name && !['Closed','Cancelled'].includes(o.status)).reduce((a,o)=>a+o.pendingFG,0);
    const clientDemandPCS=orderRows.filter(o=>o.sku===s.name && !['Cancelled'].includes(o.status)).reduce((a,o)=>a+safeNum(o.orderQtyPCS),0);
    const dispatchedPCS=dispatches.filter(d=>d.sku===s.name).reduce((a,d)=>a+safeNum(d.qtyPCS),0);
    const pendingDispatchPCS=Math.max(0,clientDemandPCS-dispatchedPCS);
    const rm=rmBySku[s.name]||{boxes:0,kg:0,pendingBoxes:0,pendingKG:0,receivedBoxes:0,receivedKG:0,lines:[]};
    const daily=safeNum(s.dailyUse); const days=daily?onHandPCS/daily:0; const totalCover=daily?(onHandPCS+placedPCS)/daily:0; const futureCover=daily?(onHandPCS+placedPCS+rm.pendingBoxes)/daily:0; const safety=daily*7; const gap=onHandPCS-safety;
    let alert='Safe',color='green'; if(onHandPCS<=0){alert='No Stock';color='red'} else if(days<7){alert='Below 7 Days';color='red'} else if(days<12){alert='Watch';color='amber'}
    return {...s,onHandPCS,placedPCS,totalAvailablePCS:onHandPCS+placedPCS,futureAvailablePCS:onHandPCS+placedPCS+rm.pendingBoxes,clientDemandPCS,dispatchedPCS,pendingDispatchPCS,days,totalCover,futureCover,safety,gap,alert,color,rmOrderedBoxes:rm.boxes,rmOrderedKG:rm.kg,rmPendingBoxes:rm.pendingBoxes,rmPendingKG:rm.pendingKG,rmReceivedBoxes:rm.receivedBoxes,rmReceivedKG:rm.receivedKG,rmLines:rm.lines};
  });
  const dispatchPnL=dispatches.map(d=>{
    const sku=skus.find(s=>s.name===d.sku)||{}; const o=orders.find(x=>x.id===d.orderId)||{}; const rec=receiptByOrder[d.orderId]||{kg:0,pcs:0};
    const qtyPCS=safeNum(d.qtyPCS), qtyKG=safeNum(d.qtyKG)||qtyPCS*safeNum(sku.stdWeight);
    const sellRate=qtyPCS?safeNum(d.sellPCS||sku.sellPCS):safeNum(d.sellKG||sku.sellKG);
    const revenue=qtyPCS?sellRate*qtyPCS:sellRate*qtyKG;
    let materialCost=0, mfgCost=0;
    if(d.orderId && o.id){
      const costBasePCS=Math.max(safeNum(o.orderQtyPCS),safeNum(o.expectedPCS),rec.pcs,1);
      materialCost=(safeNum(o.issuedKG)*safeNum(o.buyKG))/costBasePCS*qtyPCS;
      mfgCost=(Math.max(rec.kg,qtyKG)*safeNum(o.mfgKG||sku.mfgKG))/Math.max(costBasePCS,1)*qtyPCS;
    }else{
      materialCost=qtyKG*safeNum(sku.buyKG);
      mfgCost=qtyKG*safeNum(sku.mfgKG);
    }
    const logistics=safeNum(d.logistics); const totalCost=materialCost+mfgCost+logistics; const profit=revenue-totalCost; const margin=revenue?profit/revenue*100:0;
    return {...d,revenue,materialCost,mfgCost,logistics,totalCost,profit,margin};
  });
  const totals={
    onHand:skuRows.reduce((a,s)=>a+s.onHandPCS,0), placed:skuRows.reduce((a,s)=>a+s.placedPCS,0), available:skuRows.reduce((a,s)=>a+s.totalAvailablePCS,0),
    daily:skuRows.reduce((a,s)=>a+safeNum(s.dailyUse),0), pendingDispatch:skuRows.reduce((a,s)=>a+s.pendingDispatchPCS,0), dispatched:dispatches.reduce((a,d)=>a+safeNum(d.qtyPCS),0),
    rmIssued:orders.reduce((a,o)=>a+safeNum(o.issuedKG),0), fgReceivedKG:receipts.reduce((a,r)=>a+safeNum(r.receivedKG),0), fgReceivedPCS:receipts.reduce((a,r)=>a+safeNum(r.receivedPCS),0),
    sales:dispatchPnL.reduce((a,r)=>a+r.revenue,0), cost:dispatchPnL.reduce((a,r)=>a+r.totalCost,0), profit:dispatchPnL.reduce((a,r)=>a+r.profit,0),
    rmOrderedBoxes:rmOrders.filter(r=>r.status!=='Cancelled').reduce((a,r)=>a+safeNum(r.rmForBoxes),0),
    rmPendingBoxes:rmOrders.filter(r=>r.status!=='Cancelled'&&r.status!=='Received').reduce((a,r)=>a+safeNum(r.rmForBoxes),0),
    rmReceivedBoxes:rmOrders.filter(r=>r.status==='Received').reduce((a,r)=>a+safeNum(r.rmForBoxes),0),
    rmOrderedKG:rmOrders.filter(r=>r.status!=='Cancelled').reduce((a,r)=>a+safeNum(r.rmKG),0),
  };
  return {receiptByOrder,dispatchByOrder,rmBySku,rmByVendor,orderRows,skuRows,dispatchPnL,totals};
}

function Dashboard({metrics,setPage}){
  const {totals,skuRows,orderRows,dispatchPnL}=metrics;
  const low=skuRows.filter(s=>s.color==='red');
  const overdue=orderRows.filter(o=>o.status!=='Closed' && o.vendorDeliveryDate<todayISO() && o.pendingFG>0);
  const active=orderRows.filter(o=>!['Closed','Cancelled'].includes(o.status));
  return <>
    <PageHead title="Operations Control Center" sub="One screen for vendor orders, stock, dispatch pending, RM vs FG and profit/loss">
      <Button variant="secondary" onClick={()=>setPage('orders')}>Manage Vendor Orders</Button>
      <Button variant="primary" onClick={()=>setPage('dispatch')}>Dispatch Control</Button>
    </PageHead>
    <div className="grid kpi-grid">
      <KPI label="Stock in Hand" value={fN(totals.onHand)} sub="Finished goods available" icon="📦" color="green"/>
      <KPI label="Placed to Make" value={fN(totals.placed)} sub={`Balance with vendors · RM from mills ${fN(totals.rmPendingBoxes||0)}`} icon="🏭" color="amber"/>
      <KPI label="Pending Dispatch" value={fN(totals.pendingDispatch)} sub="Client order balance" icon="🚚" color="red"/>
      <KPI label="Dispatched Qty" value={fN(totals.dispatched)} sub="PCS dispatched" icon="✅" color="blue"/>
      <KPI label="Net Profit" value={fC(totals.profit)} sub={`Sales ${fC(totals.sales)} · Cost ${fC(totals.cost)}`} icon="💰" color={totals.profit>=0?'green':'red'}/>
      <KPI label="RM vs FG" value={`${fN(totals.rmIssued)} KG`} sub={`Received ${fN(totals.fgReceivedKG)} KG / ${fN(totals.fgReceivedPCS)} PCS`} icon="⚖️" color="purple"/>
    </div>
    <div className="split">
      <Card title="Vendor Order Monitor" action={<Button variant="outline" onClick={()=>setPage('orders')}>Open</Button>}>
        <div className="table-wrap"><table className="table" style={{minWidth:780}}><thead><tr><th>Order</th><th>Vendor</th><th>SKU</th><th>Order Qty</th><th>FG Received</th><th>Progress</th><th>Client Date</th><th>Status</th></tr></thead><tbody>{active.slice(0,8).map(o=><tr key={o.id}><td className="num blue-t">{o.id}</td><td>{o.vendor}</td><td>{o.sku}</td><td className="num">{fN(o.orderQtyPCS)}</td><td>{fN(o.receivedPCS)} PCS<br/><span className="tiny">{fN(o.receivedKG)} KG</span></td><td><span className="num">{fP(o.progress)}</span><Progress pct={o.progress} color={o.progress<40?'red':o.progress<80?'amber':'green'}/></td><td>{o.clientDeliveryDate}</td><td><StatusBadge status={o.status} pendingFG={o.pendingFG}/></td></tr>)}</tbody></table></div>
      </Card>
      <Card title="Immediate Attention">
        <div style={{display:'grid',gap:10}}>
          <AlertLine title="Low stock SKUs" value={low.length} sub={low.map(s=>s.name).join(', ')||'All safe'} color={low.length?'red':'green'}/>
          <AlertLine title="Overdue vendor deliveries" value={overdue.length} sub={overdue.map(o=>`${o.id} ${o.vendor}`).join(', ')||'No overdue vendor delivery'} color={overdue.length?'red':'green'}/>
          <AlertLine title="Dispatch P&L rows" value={dispatchPnL.length} sub={`Current profit: ${fC(totals.profit)}`} color={totals.profit>=0?'green':'red'}/>
        </div>
      </Card>
    </div>
  </>
}
function AlertLine({title,value,sub,color}){return <div className={`kpi ${color}`} style={{padding:13}}><label>{title}</label><strong style={{fontSize:22}}>{value}</strong><small>{sub}</small></div>}
function StatusBadge({status,pendingFG}){let color='gray'; if(status==='Closed')color='green'; else if(status==='Ready to Dispatch')color='blue'; else if(status==='In Production')color='amber'; else if(status==='Delayed')color='red'; if(pendingFG===0 && status!=='Cancelled') color='green'; return <Badge color={color}>{pendingFG===0 && status!=='Cancelled'?'FG Complete':status}</Badge>}

function OrderForm({skus,vendors,clients,initial,onSave,onClose}){
  const blank={date:todayISO(),type:'Job Work',vendor:'',client:'',sku:'',orderQtyPCS:'',issuedKG:'',buyKG:'',mfgKG:'',expectedPCS:'',vendorDeliveryDate:addDays(5),clientDeliveryDate:addDays(7),status:'In Production',remarks:''};
  const [f,setF]=useState(initial||blank);
  const set=(k,v)=>setF(p=>{
    const u={...p,[k]:v};
    if(k==='sku'){
      const s=skus.find(x=>x.name===v); if(s){u.client=s.client;u.buyKG=s.buyKG;u.mfgKG=s.mfgKG;u.expectedPCS=u.orderQtyPCS||'';}
    }
    const s=skus.find(x=>x.name===u.sku);
    if((k==='orderQtyPCS'||k==='sku') && s && safeNum(u.orderQtyPCS)>0){
      const ideal=safeNum(s.idealWastage)/100; u.issuedKG=Math.round(safeNum(u.orderQtyPCS)*safeNum(s.stdWeight)/(1-ideal)); u.expectedPCS=u.orderQtyPCS;
    }
    return u;
  });
  const sku=skus.find(s=>s.name===f.sku)||{};
  const expectedKG=safeNum(f.orderQtyPCS)*safeNum(sku.stdWeight);
  const rmCost=safeNum(f.issuedKG)*safeNum(f.buyKG);
  const mfgCost=expectedKG*safeNum(f.mfgKG);
  return <Modal title={initial?'Edit Vendor Order':'New Vendor / Job Work Order'} onClose={onClose} wide>
    <div className="form-grid">
      <Field label="Order Date"><Input type="date" value={f.date} onChange={v=>set('date',v)}/></Field>
      <Field label="Order Type"><Select value={f.type} onChange={v=>set('type',v)} options={['Job Work','Direct Trading','Own Manufacturing']}/></Field>
      <Field label="Vendor"><Select value={f.vendor} onChange={v=>set('vendor',v)} options={vendors.map(v=>v.name)}/></Field>
      <Field label="Client"><Select value={f.client} onChange={v=>set('client',v)} options={clients.map(c=>c.name)}/></Field>
      <Field label="SKU"><Select value={f.sku} onChange={v=>set('sku',v)} options={skus.map(s=>s.name)}/></Field>
      <Field label="Order Qty / Client Requirement (PCS)"><Input type="number" value={f.orderQtyPCS} onChange={v=>set('orderQtyPCS',v)}/></Field>
      <Field label="Issued RM to Vendor (KG)"><Input type="number" value={f.issuedKG} onChange={v=>set('issuedKG',v)}/></Field>
      <Field label="Expected FG PCS"><Input type="number" value={f.expectedPCS} onChange={v=>set('expectedPCS',v)}/></Field>
      <Field label="Buying Cost / KG"><Input type="number" value={f.buyKG} onChange={v=>set('buyKG',v)}/></Field>
      <Field label="Job Work / Mfg Cost / KG"><Input type="number" value={f.mfgKG} onChange={v=>set('mfgKG',v)}/></Field>
      <Field label="Vendor Delivery Date"><Input type="date" value={f.vendorDeliveryDate} onChange={v=>set('vendorDeliveryDate',v)}/></Field>
      <Field label="Client Delivery Date"><Input type="date" value={f.clientDeliveryDate} onChange={v=>set('clientDeliveryDate',v)}/></Field>
      <Field label="Status"><Select value={f.status} onChange={v=>set('status',v)} options={['In Production','Ready to Dispatch','Part Dispatched','Closed','Delayed','Cancelled']}/></Field>
      <Field label="Remarks"><Input value={f.remarks} onChange={v=>set('remarks',v)}/></Field>
    </div>
    <div className="calc-strip"><div className="calc-item"><label>Auto RM Cost</label><strong>{fC(rmCost)}</strong></div><div className="calc-item"><label>Expected FG KG</label><strong>{fN(expectedKG)} KG</strong></div><div className="calc-item"><label>Mfg Cost</label><strong>{fC(mfgCost)}</strong></div><div className="calc-item"><label>Total Cost Before Dispatch</label><strong>{fC(rmCost+mfgCost)}</strong></div></div>
    <div className="actions" style={{justifyContent:'flex-end',marginTop:18}}><Button variant="secondary" onClick={onClose}>Cancel</Button><Button onClick={()=>onSave(f)}>{initial?'Update Order':'Save Order'}</Button></div>
  </Modal>
}

function ReceiptForm({order,skus,initial,onSave,onClose}){

  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const issued=safeNum(order?.issuedKG); const rkg=safeNum(f.receivedKG); const wast=issued?Math.max(0,issued-rkg):0; const wastPct=issued?wast/issued*100:0;
  return <Modal title={`FG Receipt - ${order?.id||''}`} onClose={onClose}>
    <div className="form-grid">
      <Field label="Receipt Date"><Input type="date" value={f.date} onChange={v=>set('date',v)}/></Field>

      <Field label="Vendor"><Input value={f.vendor} onChange={v=>set('vendor',v)} readOnly/></Field>

      <Field label="Remarks" full><Input value={f.remarks} onChange={v=>set('remarks',v)}/></Field>
    </div>
    <div className="calc-strip"><div className="calc-item"><label>Issued RM</label><strong>{fN(issued)} KG</strong></div><div className="calc-item"><label>Received FG</label><strong>{fN(rkg)} KG</strong></div><div className="calc-item"><label>Wastage KG</label><strong className={wastPct>5?'red-t':''}>{fN(wast)} KG</strong></div><div className="calc-item"><label>Wastage %</label><strong className={wastPct>5?'red-t':''}>{fP(wastPct)}</strong></div></div>

}

function DispatchForm({order,skus,clients,initial,onSave,onClose}){
  const sku=skus.find(s=>s.name===(order?.sku||initial?.sku))||{};
  const [f,setF]=useState(initial||{date:todayISO(),orderId:order?.id||'',client:order?.client||sku.client||'',sku:order?.sku||'',qtyPCS:'',qtyKG:'',sellPCS:sku.sellPCS||'',sellKG:sku.sellKG||'',logistics:'',invoice:'',remarks:''});
  const set=(k,v)=>setF(p=>{const u={...p,[k]:v}; if(k==='sku'){const s=skus.find(x=>x.name===v); if(s){u.client=s.client;u.sellPCS=s.sellPCS;u.sellKG=s.sellKG}} if(k==='qtyPCS'){const s=skus.find(x=>x.name===u.sku); if(s)u.qtyKG=(safeNum(v)*safeNum(s.stdWeight)).toFixed(0)} return u});
  const revenue=safeNum(f.qtyPCS)?safeNum(f.qtyPCS)*safeNum(f.sellPCS):safeNum(f.qtyKG)*safeNum(f.sellKG);
  return <Modal title="Record Dispatch" onClose={onClose}>
    <div className="form-grid">
      <Field label="Dispatch Date"><Input type="date" value={f.date} onChange={v=>set('date',v)}/></Field>
      <Field label="Against Order ID"><Input value={f.orderId} onChange={v=>set('orderId',v)} readOnly={!!order}/></Field>
      <Field label="Client"><Select value={f.client} onChange={v=>set('client',v)} options={clients.map(c=>c.name)}/></Field>
      <Field label="SKU"><Select value={f.sku} onChange={v=>set('sku',v)} options={skus.map(s=>s.name)}/></Field>
      <Field label="Dispatched Qty PCS"><Input type="number" value={f.qtyPCS} onChange={v=>set('qtyPCS',v)}/></Field>
      <Field label="Dispatched Qty KG"><Input type="number" value={f.qtyKG} onChange={v=>set('qtyKG',v)}/></Field>
      <Field label="Selling Price / PCS"><Input type="number" value={f.sellPCS} onChange={v=>set('sellPCS',v)}/></Field>
      <Field label="Selling Price / KG"><Input type="number" value={f.sellKG} onChange={v=>set('sellKG',v)}/></Field>
      <Field label="Logistics Cost"><Input type="number" value={f.logistics} onChange={v=>set('logistics',v)}/></Field>
      <Field label="Invoice No"><Input value={f.invoice} onChange={v=>set('invoice',v)}/></Field>
      <Field label="Remarks" full><Input value={f.remarks} onChange={v=>set('remarks',v)}/></Field>
    </div>
    <div className="calc-strip"><div className="calc-item"><label>Revenue</label><strong>{fC(revenue)}</strong></div><div className="calc-item"><label>Logistics</label><strong>{fC(f.logistics)}</strong></div><div className="calc-item"><label>Net Before Cost</label><strong>{fC(revenue-safeNum(f.logistics))}</strong></div><div className="calc-item"><label>Stock Impact</label><strong>-{fN(f.qtyPCS)} PCS</strong></div></div>
    <div className="actions" style={{justifyContent:'flex-end',marginTop:18}}><Button variant="secondary" onClick={onClose}>Cancel</Button><Button onClick={()=>onSave(f)}>Save Dispatch</Button></div>
  </Modal>
}

  const saveReceipt=(row)=>{setReceipts(p=>[{...row,id:genId('R',p)},...p]);setModal(null)};
  const saveDispatch=(row)=>{setDispatches(p=>[{...row,id:genId('D',p)},...p]);setModal(null)};
  const cols=[
    {key:'id',label:'Order',render:o=><button className="btn ghost" onClick={()=>setSelected(o)}><span className="blue-t num">{o.id}</span></button>},
    {key:'vendor',label:'Vendor / Client',render:o=><><b>{o.vendor}</b><br/><span className="tiny">Client: {o.client}</span></>},

function RMOrderForm({skus,vendors,initial,onSave,onClose}){
  const blank={date:todayISO(),mill:'',vendor:'',sku:'',rmForBoxes:'',rmKG:'',buyKG:'',expectedDate:addDays(4),status:'Ordered',remarks:''};
  const [f,setF]=useState({...blank,...(initial||{})});
  const set=(k,v)=>setF(p=>{
    const u={...p,[k]:v};
    const sku=skus.find(s=>s.name===u.sku);
    if(k==='sku' && sku){u.buyKG=sku.buyKG||u.buyKG;}
    if((k==='sku'||k==='rmForBoxes') && sku && safeNum(u.rmForBoxes)>0){
      const ideal=safeNum(sku.idealWastage)/100;
      u.rmKG=Math.round(safeNum(u.rmForBoxes)*safeNum(sku.stdWeight)/(1-ideal));
    }
    return u;
  });
  const rmValue=safeNum(f.rmKG)*safeNum(f.buyKG);
  return <Modal title={f.id?'Edit Mill RM Order':'Add RM Order to Mill'} onClose={onClose} wide>
    <div className="form-grid">
      <Field label="RM Order Date"><Input type="date" value={f.date} onChange={v=>set('date',v)}/></Field>

      <Field label="Dedicated Vendor / Job Worker"><Select value={f.vendor} onChange={v=>set('vendor',v)} options={vendors.map(v=>v.name)}/></Field>
      <Field label="SKU / Box for which RM is ordered"><Select value={f.sku} onChange={v=>set('sku',v)} options={skus.map(s=>s.name)}/></Field>
      <Field label="RM Ordered for Box Count (PCS)"><Input type="number" value={f.rmForBoxes} onChange={v=>set('rmForBoxes',v)} placeholder="e.g. 20000 boxes"/></Field>
      <Field label="Estimated RM KG"><Input type="number" value={f.rmKG} onChange={v=>set('rmKG',v)}/></Field>
      <Field label="Buying Cost / KG"><Input type="number" value={f.buyKG} onChange={v=>set('buyKG',v)}/></Field>

function CalendarPage({metrics}){
  const parseISO=(iso)=>{const [y,m,d]=String(iso||todayISO()).split('-').map(Number);return new Date(y,(m||1)-1,d||1)};
  const fmt=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const datePlus=(iso,days)=>{const d=parseISO(iso);d.setDate(d.getDate()+days);return fmt(d)};
  const dayName=(iso)=>parseISO(iso).toLocaleDateString('en-IN',{weekday:'short'});
  const pretty=(iso)=>parseISO(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
  const [startDate,setStartDate]=useState(todayISO());
  const [endDate,setEndDate]=useState(addDays(14));
  const [filter,setFilter]=useState('All');

  const dateList=useMemo(()=>{
    const start=parseISO(startDate); const selectedEnd=parseISO(endDate||startDate); const maxEnd=parseISO(datePlus(startDate,14));
    const finalEnd=selectedEnd<start?start:(selectedEnd>maxEnd?maxEnd:selectedEnd);
    const out=[]; const d=new Date(start);
    while(d<=finalEnd){out.push(fmt(d));d.setDate(d.getDate()+1)}
    return out;
  },[startDate,endDate]);

  const events=useMemo(()=>{
    const list=[];
    metrics.orderRows.filter(o=>!['Cancelled','Closed'].includes(o.status)).forEach(o=>{
      const receiveQty=safeNum(o.pendingFG)||safeNum(o.expectedPCS)||safeNum(o.orderQtyPCS);
      const dispatchQty=safeNum(o.pendingDispatch)||safeNum(o.orderQtyPCS);
      if(o.vendorDeliveryDate&&receiveQty>0){
        list.push({date:o.vendorDeliveryDate,kind:'receive',type:'Receive from Vendor',party:o.vendor,sku:o.sku,qty:receiveQty,sub:`${o.id} · ${o.vendor} · ${o.status}`,order:o});
      }
      if(o.clientDeliveryDate&&dispatchQty>0){
        list.push({date:o.clientDeliveryDate,kind:'dispatch',type:'Dispatch to Client',party:o.client,sku:o.sku,qty:dispatchQty,sub:`${o.id} · ${o.client} · pending dispatch`,order:o});
      }
    });
    return list;
  },[metrics.orderRows]);

  const visibleEvents=events.filter(e=>dateList.includes(e.date)&&(filter==='All'||e.type===filter)).sort((a,b)=>a.date.localeCompare(b.date)||a.kind.localeCompare(b.kind));
  const receiveCount=visibleEvents.filter(e=>e.kind==='receive').length;
  const dispatchCount=visibleEvents.filter(e=>e.kind==='dispatch').length;
  const reset15=()=>{const t=todayISO();setStartDate(t);setEndDate(addDays(14));};

  return <>
    <PageHead title="15 Days Delivery Planning" sub="Blue = Receive from Vendor · Green = Dispatch to Client · format shown as QTY - SKU Name">
      <input className="inp" style={{width:150}} type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}/>
      <input className="inp" style={{width:150}} type="date" value={endDate} min={startDate} max={datePlus(startDate,14)} onChange={e=>setEndDate(e.target.value)}/>
      <select className="sel" style={{width:190}} value={filter} onChange={e=>setFilter(e.target.value)}><option>All</option><option>Receive from Vendor</option><option>Dispatch to Client</option></select>
      <Button variant="secondary" onClick={reset15}>Today + 15 Days</Button>
      <Button variant="secondary" onClick={()=>exportCSV(visibleEvents,'15_day_delivery_plan.csv')}>⬇ Export Plan</Button>
    </PageHead>

    <div className="grid kpi-grid" style={{gridTemplateColumns:'repeat(4,minmax(180px,1fr))'}}>
      <KPI label="Planning Range" value={`${dateList.length} Days`} sub={`${pretty(dateList[0])} to ${pretty(dateList[dateList.length-1])}`} icon="🗓️" color="blue"/>
      <KPI label="Receive from Vendor" value={receiveCount} sub={`${fN(visibleEvents.filter(e=>e.kind==='receive').reduce((a,e)=>a+safeNum(e.qty),0))} PCS`} icon="📥" color="blue"/>
      <KPI label="Dispatch to Client" value={dispatchCount} sub={`${fN(visibleEvents.filter(e=>e.kind==='dispatch').reduce((a,e)=>a+safeNum(e.qty),0))} PCS`} icon="🚚" color="green"/>
      <KPI label="Total Tasks" value={visibleEvents.length} sub="Shown within selected 15-day window" icon="✅" color="purple"/>
    </div>

    <Card title="15-Day Planning Board" action={<div className="legend"><span><i className="legend-dot blue"></i> Receive from Vendor</span><span><i className="legend-dot green"></i> Dispatch to Client</span></div>}>
      <div className="plan-board">
        <div className="plan-grid" style={{gridTemplateColumns:`repeat(${dateList.length}, minmax(185px, 1fr))`}}>
          {dateList.map(date=>{
            const dayEvents=visibleEvents.filter(e=>e.date===date);
            return <div key={date} className="day plan-day">
              <div className="dnum">{dayName(date)} · {pretty(date)}</div>
              {dayEvents.length?dayEvents.map((e,i)=><span key={i} className={`chip ${e.kind}`} title={`${e.type} · ${e.party}`}>
                {fN(e.qty)} PCS - {e.sku}
                <small>{e.type}<br/>{e.party}</small>
              </span>):<span className="tiny">No plan</span>}
            </div>
          })}
        </div>
      </div>
    </Card>

    <div style={{height:16}}></div>
    <Card title="Planning List">
      <div className="table-wrap"><table className="table" style={{minWidth:820}}><thead><tr><th>Date</th><th>Type</th><th>QTY - SKU Name</th><th>Vendor / Client</th><th>Order</th><th>Status</th></tr></thead><tbody>{visibleEvents.length?visibleEvents.map((e,i)=><tr key={i}><td><b>{pretty(e.date)}</b><br/><span className="tiny">{dayName(e.date)}</span></td><td><Badge color={e.kind==='receive'?'blue':'green'}>{e.type}</Badge></td><td><span className={e.kind==='receive'?'blue-t num':'green-t num'}>{fN(e.qty)} PCS - {e.sku}</span></td><td>{e.party}</td><td>{e.order.id}</td><td><StatusBadge status={e.order.status} pendingFG={e.order.pendingFG}/></td></tr>):<tr><td colSpan="6" className="center muted" style={{padding:36}}>No receive/dispatch plan in this selected range</td></tr>}</tbody></table></div>
    </Card>
  </>
}


function MastersPage({skus,setSkus,vendors,setVendors,clients,setClients}){
  const [tab,setTab]=useState('skus');
  const skuCols=[{key:'id',label:'ID'},{key:'name',label:'SKU'},{key:'client',label:'Client'},{key:'size',label:'Size'},{key:'ply',label:'Ply'},{key:'weight',label:'Weight',render:s=>`${s.stdWeight} KG`},{key:'sell',label:'Sell',render:s=>`₹${s.sellPCS}/PCS`}];
  const vendorCols=[{key:'id',label:'ID'},{key:'name',label:'Vendor'},{key:'location',label:'Location'},{key:'rate',label:'Rate/KG',render:v=>fC(v.rate)},{key:'wastageAllowance',label:'Wastage %',render:v=>`${v.wastageAllowance}%`}];
  const clientCols=[{key:'id',label:'ID'},{key:'name',label:'Client'},{key:'contact',label:'Contact'},{key:'mobile',label:'Mobile'},{key:'gst',label:'GST'},{key:'terms',label:'Terms'}];
  return <>
    <PageHead title="Masters" sub="SKU, vendor and client master data used across orders, stock and P&L"><div className="tabs"><button className={tab==='skus'?'active':''} onClick={()=>setTab('skus')}>SKU</button><button className={tab==='vendors'?'active':''} onClick={()=>setTab('vendors')}>Vendors</button><button className={tab==='clients'?'active':''} onClick={()=>setTab('clients')}>Clients</button></div></PageHead>
    {tab==='skus'&&<DataTable columns={skuCols} data={skus} searchText="Search SKU..."/>}
    {tab==='vendors'&&<DataTable columns={vendorCols} data={vendors} searchText="Search vendor..."/>}
    {tab==='clients'&&<DataTable columns={clientCols} data={clients} searchText="Search client..."/>}
  </>
}

function Sidebar({page,setPage}){
  const items=[
    ['dashboard','📊','Command Center'],['orders','🏭','Vendor Orders'],['inventory','📦','Inventory Control'],['jobwork','⚖️','RM vs FG Job Work'],['dispatch','🚚','Dispatch Control'],['pnl','💰','Profit & Loss'],['calendar','🗓️','Delivery Calendar'],['masters','⚙️','Masters']
  ];
  return <aside className="sidebar"><div className="brand"><div className="logo">📦</div><h1>BGSG-BLR</h1><p>Contract manufacturing + trading control</p></div><div className="nav">{items.map(([id,ico,label])=><button key={id} className={page===id?'active':''} onClick={()=>setPage(id)}><span className="ico">{ico}</span>{label}</button>)}</div><div className="sidebar-footer">BGSG-BLR</div></aside>
}

function App(){
  const [page,setPage]=useState('dashboard');
  const [clients,setClients,clientsSync]=useSupabaseState(CLOUD_TABLES.clients,'bp_clients_v4',START_CLIENTS);
  const [vendors,setVendors,vendorsSync]=useSupabaseState(CLOUD_TABLES.vendors,'bp_vendors_v4',START_VENDORS);
  const [skus,setSkus,skusSync]=useSupabaseState(CLOUD_TABLES.skus,'bp_skus_v4',START_SKUS);
  const [orders,setOrders,ordersSync]=useSupabaseState(CLOUD_TABLES.orders,'bp_orders_v4',START_ORDERS);
  const [receipts,setReceipts,receiptsSync]=useSupabaseState(CLOUD_TABLES.receipts,'bp_receipts_v4',START_RECEIPTS);
  const [dispatches,setDispatches,dispatchesSync]=useSupabaseState(CLOUD_TABLES.dispatches,'bp_dispatches_v4',START_DISPATCHES);
  const [rmOrders,setRmOrders,rmOrdersSync]=useSupabaseState(CLOUD_TABLES.rmOrders,'bp_rm_orders_v4',START_RM_ORDERS);
  const metrics=useMemo(()=>makeMetrics(skus,orders,receipts,dispatches,rmOrders),[skus,orders,receipts,dispatches,rmOrders]);
  const backup={clients,vendors,skus,orders,receipts,dispatches,rmOrders};
  const syncs=[clientsSync,vendorsSync,skusSync,ordersSync,receiptsSync,dispatchesSync,rmOrdersSync];
  const hasError=syncs.some(x=>String(x.status).toLowerCase().includes('error'));
  const cloudText=!sb?'Local only':hasError?'Supabase sync issue':'Supabase cloud sync active';
  return <div className="app"><Sidebar page={page} setPage={setPage}/><main className="main">
    <div className="actions no-print" style={{justifyContent:'flex-end',marginBottom:12}}><span className={`badge ${hasError?'red':'green'}`}>{cloudText}</span><Button variant="secondary" onClick={()=>downloadBackup(backup)}>💾 Backup JSON</Button><Button variant="secondary" onClick={()=>window.print()}>🖨 Print</Button></div>
    {page==='dashboard'&&<Dashboard metrics={metrics} setPage={setPage}/>} 
    {page==='orders'&&<OrdersPage skus={skus} vendors={vendors} clients={clients} orders={orders} setOrders={setOrders} receipts={receipts} setReceipts={setReceipts} dispatches={dispatches} setDispatches={setDispatches} metrics={metrics}/>} 
    {page==='inventory'&&<InventoryPage skus={skus} setSkus={setSkus} vendors={vendors} rmOrders={rmOrders} setRmOrders={setRmOrders} metrics={metrics}/>} 
    {page==='jobwork'&&<JobWorkPage orders={orders} receipts={receipts} setReceipts={setReceipts} metrics={metrics} skus={skus}/>} 
    {page==='dispatch'&&<DispatchPage skus={skus} clients={clients} setDispatches={setDispatches} metrics={metrics}/>} 
    {page==='pnl'&&<PnLPage metrics={metrics}/>} 
    {page==='calendar'&&<CalendarPage metrics={metrics}/>} 
    {page==='masters'&&<MastersPage skus={skus} setSkus={setSkus} vendors={vendors} setVendors={setVendors} clients={clients} setClients={setClients}/>} 
  </main></div>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
